<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Division</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double&display=swap" rel="stylesheet">
    <style>
      body, .font-sans {
        font-family: 'Bitcount Grid Double', sans-serif !important;
      }
    </style>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icon Components ---
        const CheckCircle = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        const RefreshCw = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="23 4 23 10 17 10"></polyline>
                <polyline points="1 20 1 14 7 14"></polyline>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
        );

        const AlertCircle = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        // --- Main App Components ---
        const InteractiveCanvas = ({ dots, groups, selectedIds, divisor, dividend, success, onDotClick, onUngroup }) => {
          
          // Function to calculate exact coordinate for a dot dynamically
          const getDotPos = (dotId) => {
            const d = dots.find(dot => dot.id === dotId);
            if (!d) return { x: 0, y: 0 };
            
            const groupIndex = groups.findIndex(g => g.dotIds.includes(dotId));
            if (groupIndex !== -1) {
              // DOT IS GROUPED: Move to its specific slot in the array
              const group = groups[groupIndex];
              const colIndex = group.dotIds.indexOf(dotId);
              
              const dotSpacing = 65;
              const expectedTotalRows = Math.floor(dividend / divisor);
              const startX = 500 - ((divisor - 1) * dotSpacing) / 2;
              const startY = 300 - ((expectedTotalRows - 1) * dotSpacing) / 2;
              
              return {
                x: startX + colIndex * dotSpacing,
                y: startY + groupIndex * dotSpacing
              };
            }
            // DOT IS UNGROUPED: Stay at its initial edge spawn point
            return { x: d.baseX, y: d.baseY };
          };

          return (
            <div className="w-full max-w-lg relative bg-gray-100 rounded-2xl h-[340px] border-2 border-gray-200 shadow-inner overflow-hidden mb-4">
              <div className="absolute top-3 left-0 w-full text-center z-20 pointer-events-none">
                <span className="bg-white/90 px-4 py-2 rounded-full text-sm text-gray-700 font-bold shadow-sm backdrop-blur-sm transition-all">
                  {selectedIds.length > 0
                    ? <span className="text-purple-600">Selecting dots: {selectedIds.length} / {divisor}</span>
                    : <span>Click {divisor} dots to make a group</span>}
                </span>
              </div>

              <svg viewBox="0 0 1000 600" className="w-full h-full">
                {/* Draw Array Rows */}
                {groups.map((g, index) => {
                  const pts = g.dotIds.map(id => {
                    const pos = getDotPos(id);
                    return `${pos.x},${pos.y}`;
                  }).join(' ');
                  
                  const lastDotId = g.dotIds[g.dotIds.length - 1];
                  const lastPos = lastDotId ? getDotPos(lastDotId) : { x: 0, y: 0 };
                  const textX = lastPos.x + 55;
                  const textY = lastPos.y;
                  
                  return (
                    <g key={g.id}>
                      <polyline points={pts} fill="none" stroke="rgba(249, 115, 22, 0.25)" strokeWidth="50" strokeLinecap="round" strokeLinejoin="round" onClick={() => !success && onUngroup(g.id)} className="cursor-pointer hover:stroke-[rgba(249,115,22,0.4)] transition-all duration-300" />
                      <polyline points={pts} fill="none" stroke="#ea580c" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" className="pointer-events-none" />
                      <text x={textX} y={textY} textAnchor="start" dominantBaseline="central" className="font-black text-4xl pointer-events-none select-none" fill="#9a3412" stroke="white" strokeWidth="4" paintOrder="stroke">
                        {(index + 1) * divisor}
                      </text>
                    </g>
                  );
                })}

                {/* Draw Connection Lines */}
                {selectedIds.length > 1 && (
                  <polyline 
                    points={selectedIds.map(id => {
                      const pos = getDotPos(id);
                      return `${pos.x},${pos.y}`;
                    }).join(' ')} 
                    fill="none" stroke="#a855f7" strokeWidth="6" strokeDasharray="12 12" strokeLinecap="round" strokeLinejoin="round" className="pointer-events-none opacity-60"
                  />
                )}

                {/* Draw All Dots */}
                {dots.map(d => {
                  const isGrouped = groups.some(g => g.dotIds.includes(d.id));
                  const isSelected = selectedIds.includes(d.id);
                  const pos = getDotPos(d.id);
                  
                  return (
                    <g 
                      key={d.id} 
                      style={{ 
                        transform: `translate(${pos.x}px, ${pos.y}px)`, 
                        transition: 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)' 
                      }}
                      className={success ? '' : 'cursor-pointer hover:opacity-80'} 
                      onClick={() => {
                        if (success) return;
                        if (isGrouped) {
                          const group = groups.find(g => g.dotIds.includes(d.id));
                          onUngroup(group.id);
                        } else {
                          onDotClick(d.id);
                        }
                      }}
                    >
                      <circle cx="0" cy="0" r={isSelected ? 32 : 28} fill={isGrouped ? "#f97316" : isSelected ? "#a855f7" : "#3b82f6"} stroke={isGrouped ? "#c2410c" : isSelected ? "#7e22ce" : "#1d4ed8"} strokeWidth="4" className="transition-colors duration-200" />
                      <text x="0" y="4" textAnchor="middle" dominantBaseline="central" fontSize={isSelected ? "58px" : "50px"} className="pointer-events-none select-none transition-all duration-200">
                        {d.emoji}
                      </text>
                    </g>
                  );
                })}
              </svg>
            </div>
          );
        };

        function App() {
          const [dividend, setDividend] = useState(12);
          const [divisor, setDivisor] = useState(3);
          const [allowRemainders, setAllowRemainders] = useState(false);
          
          const [dots, setDots] = useState([]);
          const [groups, setGroups] = useState([]);
          const [selectedIds, setSelectedIds] = useState([]);
          
          const [quotient, setQuotient] = useState('');
          const [remainder, setRemainder] = useState('');
          const [success, setSuccess] = useState(false);
          const [error, setError] = useState(false);

          const EMOJIS = ['😀', '🤪', '😨', '😡', '😎', '😍', '🤩', '😭', '🤯', '🥶', '🤠', '🥳', '👽', '👻', '🤖', '🥺', '🥱', '🤬', '🥰', '😵‍💫'];

          const generateProblem = (useRemainders) => {
            const div = Math.floor(Math.random() * 4) + 2;
            let dvd;
            if (useRemainders) {
              dvd = (div * (Math.floor(Math.random() * 4) + 2)) + (Math.floor(Math.random() * (div - 1)) + 1);
            } else {
              dvd = div * (Math.floor(Math.random() * 4) + 2);
            }
            
            setDividend(dvd);
            setDivisor(div);
            setQuotient('');
            setRemainder('');
            setSuccess(false);
            setError(false);
            setGroups([]);
            setSelectedIds([]);

            const newDots = [];
            for (let i = 0; i < dvd; i++) {
              let baseX, baseY;
              let isOverlapping = true;
              let attempts = 0;

              // Keep trying to find a spot until it doesn't overlap with any existing dot
              while (isOverlapping && attempts < 200) {
                // Ensure dots strictly spawn on the outer edges so they never hide behind the array
                const side = Math.floor(Math.random() * 4);
                
                if (side === 0) { // Top Edge
                  baseX = 200 + Math.random() * 600;
                  baseY = 40 + Math.random() * 50;
                } else if (side === 1) { // Bottom Edge
                  baseX = 200 + Math.random() * 600;
                  baseY = 510 + Math.random() * 50;
                } else if (side === 2) { // Left Edge
                  baseX = 50 + Math.random() * 130;
                  baseY = 50 + Math.random() * 500;
                } else { // Right Edge
                  baseX = 820 + Math.random() * 130;
                  baseY = 50 + Math.random() * 500;
                }

                // Check distance against all previously placed dots
                isOverlapping = newDots.some(d => {
                  const dx = d.baseX - baseX;
                  const dy = d.baseY - baseY;
                  return Math.sqrt(dx * dx + dy * dy) < 70; // 70px minimum distance guarantees no overlap
                });

                attempts++;
              }
              
              newDots.push({
                id: `dot-${Date.now()}-${i}`, 
                baseX, 
                baseY, 
                emoji: EMOJIS[Math.floor(Math.random() * EMOJIS.length)]
              });
            }
            
            setDots(newDots);
          };

          useEffect(() => { 
            generateProblem(allowRemainders); 
          }, []); // eslint-disable-line react-hooks/exhaustive-deps

          const handleToggleRemainders = () => {
            const newVal = !allowRemainders;
            setAllowRemainders(newVal);
            generateProblem(newVal);
          };

          const handleDotClick = (id) => {
            if (selectedIds.includes(id)) {
              setSelectedIds(selectedIds.filter(i => i !== id));
            } else {
              setSelectedIds([...selectedIds, id]);
            }
          };

          useEffect(() => {
            if (selectedIds.length === divisor) {
              const sortedIds = [...selectedIds].sort((a, b) => {
                const dotA = dots.find(d => d.id === a);
                const dotB = dots.find(d => d.id === b);
                return (dotA?.baseX || 0) - (dotB?.baseX || 0);
              });
              
              setGroups(prev => [...prev, { id: Date.now(), dotIds: sortedIds }]);
              setSelectedIds([]);
            }
          }, [selectedIds, divisor, dots]);

          const checkAnswer = () => {
            const q = Math.floor(dividend / divisor);
            const r = dividend % divisor;
            
            const qCorrect = parseInt(quotient) === q;
            const rCorrect = allowRemainders ? (parseInt(remainder || '0') === r) : true;
            
            if (qCorrect && rCorrect) {
              setSuccess(true);
              setError(false);
            } else {
              setError(true);
              setSuccess(false);
            }
          };

          return (
            <div className="min-h-screen bg-gray-200 py-6 px-4 flex items-center justify-center font-sans">
              <div className="w-full max-w-xl bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col">
                
                <div className="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                  <div>
                    <h1 className="text-xl font-extrabold tracking-tight text-gray-900">Visual Division</h1>
                    <p className="text-purple-600 font-bold mt-0.5 text-xs">Form an array to divide.</p>
                  </div>
                  
                  <div className="flex items-center space-x-3">
                    <span className="text-sm font-bold text-gray-500">Remainders</span>
                    <button 
                      onClick={handleToggleRemainders}
                      className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none ${allowRemainders ? 'bg-purple-500' : 'bg-gray-300'}`}
                    >
                      <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${allowRemainders ? 'translate-x-6' : 'translate-x-1'}`} />
                    </button>
                  </div>
                </div>

                <div className="p-6 flex-grow flex flex-col items-center">
                  <div className="flex items-center justify-center space-x-3 text-3xl font-bold mb-6">
                    <div className="w-16 h-16 bg-blue-100 text-blue-700 flex items-center justify-center rounded-xl shadow-sm border-2 border-blue-200">
                      {dividend}
                    </div>
                    <div className="text-gray-400">÷</div>
                    <div className="w-16 h-16 bg-orange-100 text-orange-600 flex items-center justify-center rounded-xl shadow-sm border-2 border-orange-200">
                      {divisor}
                    </div>
                    <div className="text-gray-400">=</div>
                    
                    <input type="number" min="0" value={quotient} onChange={e => { setQuotient(e.target.value); setError(false); }} placeholder="?" disabled={success} className={`w-16 h-16 text-center rounded-xl border-2 focus:outline-none transition-colors ${error ? 'border-red-400 bg-red-50 text-red-600' : success ? 'border-green-400 bg-green-50 text-green-600' : 'border-gray-300 focus:border-purple-400 bg-gray-50'}`} />
                    
                    {allowRemainders && (
                      <>
                        <div className="text-2xl text-purple-500 ml-2 font-black">R</div>
                        <input type="number" min="0" value={remainder} onChange={e => { setRemainder(e.target.value); setError(false); }} disabled={success} className={`w-16 h-16 text-center rounded-xl border-2 focus:outline-none transition-colors ${error ? 'border-red-400 bg-red-50 text-red-600' : success ? 'border-green-400 bg-green-50 text-green-600' : 'border-gray-300 focus:border-purple-400 bg-gray-50'}`} />
                      </>
                    )}
                  </div>

                  <InteractiveCanvas dots={dots} groups={groups} selectedIds={selectedIds} divisor={divisor} dividend={dividend} success={success} onDotClick={handleDotClick} onUngroup={(id) => setGroups(groups.filter(g => g.id !== id))} />

                  <div className="w-full flex flex-col items-center min-h-[80px] justify-center">
                    {!success ? (
                      <div className="flex flex-col items-center">
                        <button onClick={checkAnswer} disabled={quotient === '' || (allowRemainders && remainder === '')} className="px-8 py-3 bg-blue-600 disabled:bg-gray-400 disabled:cursor-not-allowed text-white text-lg font-bold rounded-full shadow-md hover:bg-blue-700 hover:-translate-y-0.5 active:translate-y-0 transition-all">
                          Check Answer
                        </button>
                        {error && (
                          <div className="mt-3 flex items-center space-x-2 text-red-600 bg-red-50 px-4 py-2 rounded-lg border border-red-200 text-sm font-bold animate-pulse">
                            <AlertCircle className="w-5 h-5" />
                            <span>Not quite right. Try again!</span>
                          </div>
                        )}
                      </div>
                    ) : (
                      <div className="flex flex-col items-center">
                        <div className="flex items-center space-x-2 text-green-600 mb-3 bg-green-50 px-5 py-2 rounded-full border border-green-200 shadow-sm">
                          <CheckCircle className="w-6 h-6" />
                          <span className="text-lg font-extrabold">Correct! Great Job!</span>
                        </div>
                        <button onClick={() => generateProblem(allowRemainders)} className="flex items-center px-8 py-3 bg-green-500 text-white text-base font-bold rounded-full shadow-md hover:bg-green-600 hover:scale-105 transition-all">
                          <RefreshCw className="w-5 h-5 mr-2" />
                          Next Question
                        </button>
                      </div>
                    )}
                  </div>
                  
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
