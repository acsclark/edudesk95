<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imposter Artist</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* slate-900 */
        }
        
        /* Custom scrollbar to match the original design */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #475569;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- AI & Data Configuration ---
        const apiKey = ""; // Gemini API key provided by environment

        const FALLBACK_CATEGORIES = {
          "Animals": ["Elephant", "Giraffe", "Penguin", "Kangaroo", "Octopus", "Rhinoceros", "Flamingo", "Chameleon"],
          "Food": ["Hamburger", "Pizza", "Sushi", "Ice Cream Cone", "Taco", "Pineapple", "Croissant", "Spaghetti"],
          "Vehicles": ["Helicopter", "Submarine", "Hot Air Balloon", "Tractor", "Motorcycle", "Ambulance", "Rocket"],
          "Objects": ["Microscope", "Telescope", "Typewriter", "Gramophone", "Hourglass", "Compass", "Scissors"],
          "Places": ["Eiffel Tower", "Pyramids", "Igloo", "Lighthouse", "Volcano", "Castle", "Windmill"]
        };

        const getRandomFallback = () => {
          const categories = Object.keys(FALLBACK_CATEGORIES);
          const randomCategory = categories[Math.floor(Math.random() * categories.length)];
          const words = FALLBACK_CATEGORIES[randomCategory];
          const randomWord = words[Math.floor(Math.random() * words.length)];
          return { category: randomCategory, word: randomWord };
        };

        async function fetchSecretWord() {
          if (!apiKey) return getRandomFallback();

          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: "Generate a random, simple object, animal, or concept for a drawing game. Return ONLY valid JSON with two properties: 'category' (e.g., 'Animals', 'Food', 'Vehicles') and 'word' (e.g., 'Giraffe', 'Pizza', 'Helicopter'). Do not include markdown formatting or extra text." }] }]
              })
            });
            
            if (!response.ok) throw new Error("API request failed");
            
            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (text) {
              const cleanText = text.replace(/```json/g, '').replace(/```/g, '').trim();
              return JSON.parse(cleanText);
            }
          } catch (e) {
            console.warn("Failed to fetch from AI, using fallback.", e);
          }
          return getRandomFallback();
        }

        // --- Constants & Helpers ---
        const MIN_PLAYERS = 4;
        const MAX_PLAYERS = 12;
        const EMOJIS = ["🐶", "🐱", "🐭", "🐹", "🐰", "🦊", "🐻", "🐼", "🐨", "🐯", "🦁", "🐮", "🐷", "🐸", "🐵", "🐧", "🦉", "🦄", "🐝", "🐛", "🦋", "🐢", "🐙", "🦑"];
        const PLAYER_COLORS = ["#EF4444", "#3B82F6", "#10B981", "#F59E0B", "#8B5CF6", "#EC4899", "#14B8A6", "#F97316", "#6366F1", "#84CC16", "#06B6D4", "#D946EF"];

        // --- Main Component ---
        function ImposterArtistApp() {
          // Game State
          const [gameState, setGameState] = useState('setup'); // setup, role_viewing, drawing, voting, result
          const [players, setPlayers] = useState([
            { id: '1', name: 'Player 1', emoji: '🐶', color: PLAYER_COLORS[0], role: 'civilian' },
            { id: '2', name: 'Player 2', emoji: '🐱', color: PLAYER_COLORS[1], role: 'civilian' },
            { id: '3', name: 'Player 3', emoji: '🐭', color: PLAYER_COLORS[2], role: 'civilian' },
            { id: '4', name: 'Player 4', emoji: '🐹', color: PLAYER_COLORS[3], role: 'civilian' },
          ]);
          const [numImposters, setNumImposters] = useState(1);
          const [showClueToImposter, setShowClueToImposter] = useState(true);
          const [secretWordData, setSecretWordData] = useState({ category: '', word: '' });
          
          // Turn/Phase State
          const [currentPlayerIndex, setCurrentPlayerIndex] = useState(0);
          const [isSecretRevealed, setIsSecretRevealed] = useState(false);
          const [turnCount, setTurnCount] = useState(0);
          
          // Drawing State
          const [drawingPhase, setDrawingPhase] = useState('waiting'); // waiting, active, done
          const [timeLeft, setTimeLeft] = useState(5);
          const [paths, setPaths] = useState([]); // All completed lines
          
          // Voting State
          const [votes, setVotes] = useState({}); // { voterId: votedForId }

          // --- Setup Actions ---
          const addPlayer = () => {
            if (players.length < MAX_PLAYERS) {
              const newId = Math.random().toString(36).substring(2, 9);
              setPlayers([...players, { 
                id: newId, 
                name: `Player ${players.length + 1}`, 
                emoji: EMOJIS[players.length % EMOJIS.length],
                color: PLAYER_COLORS[players.length % PLAYER_COLORS.length],
                role: 'civilian'
              }]);
            }
          };

          const removePlayer = (id) => {
            if (players.length > MIN_PLAYERS) {
              setPlayers(players.filter(p => p.id !== id));
            }
          };

          const updatePlayer = (id, field, value) => {
            setPlayers(players.map(p => p.id === id ? { ...p, [field]: value } : p));
          };

          const startGame = async () => {
            // 1. Fetch Word
            const wordData = await fetchSecretWord();
            setSecretWordData(wordData);

            // 2. Assign Roles
            let updatedPlayers = [...players].map(p => ({ ...p, role: 'civilian' }));
            let impostersAssigned = 0;
            while (impostersAssigned < numImposters) {
              const randomIndex = Math.floor(Math.random() * updatedPlayers.length);
              if (updatedPlayers[randomIndex].role !== 'imposter') {
                updatedPlayers[randomIndex].role = 'imposter';
                impostersAssigned++;
              }
            }

            // Shuffle players to randomize turn order
            for (let i = updatedPlayers.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [updatedPlayers[i], updatedPlayers[j]] = [updatedPlayers[j], updatedPlayers[i]];
            }

            setPlayers(updatedPlayers);
            setCurrentPlayerIndex(0);
            setTurnCount(0);
            setPaths([]);
            setVotes({});
            setGameState('role_viewing');
            setIsSecretRevealed(false);
          };

          // --- Role Viewing Actions ---
          const handleRevealSecret = () => setIsSecretRevealed(true);
          const handleNextRole = () => {
            if (currentPlayerIndex < players.length - 1) {
              setCurrentPlayerIndex(currentPlayerIndex + 1);
              setIsSecretRevealed(false);
            } else {
              // Done viewing roles, start drawing
              setCurrentPlayerIndex(0);
              setGameState('drawing');
              setDrawingPhase('waiting');
            }
          };

          // --- Drawing Logic ---
          const canvasRef = useRef(null);
          const contextRef = useRef(null);
          const [isDrawingAction, setIsDrawingAction] = useState(false);
          const timerRef = useRef(null);

          // Initialize canvas
          useEffect(() => {
            if (gameState === 'drawing' && canvasRef.current) {
              const canvas = canvasRef.current;
              // Adjust resolution for sharpness
              const rect = canvas.getBoundingClientRect();
              canvas.width = rect.width * 2;
              canvas.height = rect.height * 2;
              
              const context = canvas.getContext("2d");
              context.scale(2, 2);
              context.lineCap = "round";
              context.lineJoin = "round";
              context.lineWidth = 4;
              contextRef.current = context;
              
              redrawCanvas();
            }
          }, [gameState, paths]);

          const redrawCanvas = useCallback(() => {
            if (!contextRef.current || !canvasRef.current) return;
            const canvas = canvasRef.current;
            contextRef.current.clearRect(0, 0, canvas.width, canvas.height);
            
            paths.forEach(path => {
              if (path.points.length === 0) return;
              contextRef.current.strokeStyle = path.color;
              contextRef.current.beginPath();
              contextRef.current.moveTo(path.points[0].x, path.points[0].y);
              for (let i = 1; i < path.points.length; i++) {
                contextRef.current.lineTo(path.points[i].x, path.points[i].y);
              }
              contextRef.current.stroke();
            });
          }, [paths]);

          const startDrawingTurn = () => {
            setDrawingPhase('active');
            setTimeLeft(5);
            timerRef.current = setInterval(() => {
              setTimeLeft(prev => {
                if (prev <= 1) {
                  clearInterval(timerRef.current);
                  endDrawingTurn();
                  return 0;
                }
                return prev - 1;
              });
            }, 1000);
          };

          const endDrawingTurn = useCallback(() => {
            clearInterval(timerRef.current);
            setDrawingPhase('done');
            setIsDrawingAction(false);
          }, []);

          const getCoordinates = (e) => {
            const canvas = canvasRef.current;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / (rect.width * 2);
            const scaleY = canvas.height / (rect.height * 2);

            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
              clientX = e.touches[0].clientX;
              clientY = e.touches[0].clientY;
            } else {
              clientX = e.clientX;
              clientY = e.clientY;
            }

            return {
              x: (clientX - rect.left) * scaleX,
              y: (clientY - rect.top) * scaleY
            };
          };

          // Canvas Event Handlers
          const startLine = (e) => {
            if (drawingPhase !== 'active') return;
            e.preventDefault(); // Prevent scrolling on touch
            
            const { x, y } = getCoordinates(e);
            contextRef.current.strokeStyle = players[currentPlayerIndex].color;
            contextRef.current.beginPath();
            contextRef.current.moveTo(x, y);
            setIsDrawingAction(true);

            // Initialize new path in state
            setPaths(prev => [...prev, { color: players[currentPlayerIndex].color, points: [{x, y}] }]);
          };

          const drawLine = (e) => {
            if (!isDrawingAction || drawingPhase !== 'active') return;
            e.preventDefault();

            const { x, y } = getCoordinates(e);
            contextRef.current.lineTo(x, y);
            contextRef.current.stroke();

            // Update current path points
            setPaths(prev => {
              const newPaths = [...prev];
              const currentPath = newPaths[newPaths.length - 1];
              currentPath.points.push({x, y});
              return newPaths;
            });
          };

          const endLine = () => {
            if (isDrawingAction) {
              contextRef.current.closePath();
              setIsDrawingAction(false);
              // Enforce ONE line rule: ending the line ends the turn
              endDrawingTurn();
            }
          };

          const handleNextTurn = () => {
            setTurnCount(prev => prev + 1);
            setCurrentPlayerIndex((currentPlayerIndex + 1) % players.length);
            setDrawingPhase('waiting');
          };

          const initiateVoting = () => {
            setCurrentPlayerIndex(0);
            setGameState('voting');
            setIsSecretRevealed(false); // Used here as a toggle to show the voting buttons for the current person
          };

          // --- Voting Actions ---
          const castVote = (votedId) => {
            setVotes(prev => ({ ...prev, [players[currentPlayerIndex].id]: votedId }));
            setIsSecretRevealed(false);
            
            if (currentPlayerIndex < players.length - 1) {
              setCurrentPlayerIndex(currentPlayerIndex + 1);
            } else {
              setGameState('result');
            }
          };

          // --- Result Calculation ---
          const getResults = () => {
            const voteCounts = {};
            Object.values(votes).forEach(id => {
              voteCounts[id] = (voteCounts[id] || 0) + 1;
            });

            let maxVotes = 0;
            let mostVotedIds = [];
            
            Object.entries(voteCounts).forEach(([id, count]) => {
              if (count > maxVotes) {
                maxVotes = count;
                mostVotedIds = [id];
              } else if (count === maxVotes) {
                mostVotedIds.push(id);
              }
            });

            const imposters = players.filter(p => p.role === 'imposter');
            const imposterIds = imposters.map(i => i.id);

            // Civilians win if the most voted person (or one of them if tied) is an imposter
            const civiliansWon = mostVotedIds.some(id => imposterIds.includes(id));

            return { voteCounts, mostVotedIds, imposters, civiliansWon };
          };

          // --- Render Helpers ---
          const currentPlayer = players[currentPlayerIndex];

          // Font setup styling
          const globalStyles = { fontFamily: '"Bitcount Grid Double", monospace, sans-serif' };

          // ================== VIEWS ==================

          if (gameState === 'setup') {
            return (
              <div className="h-screen w-full bg-slate-900 text-slate-100 flex flex-col items-center p-2 sm:p-4 overflow-hidden" style={globalStyles}>
                <div className="max-w-md w-full h-full flex flex-col space-y-2">
                  
                  <div className="text-center shrink-0 py-2">
                    <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500 tracking-tight leading-tight">
                      IMPOSTER ARTIST
                    </h1>
                    <p className="text-slate-400 text-xs">Spot the fake among the real artists.</p>
                  </div>

                  <div className="bg-slate-800 p-3 sm:p-4 rounded-xl shadow-xl border border-slate-700 flex flex-col flex-1 min-h-0">
                    <div className="flex justify-between items-center mb-2 shrink-0">
                      <h2 className="text-lg font-bold">Players ({players.length})</h2>
                      <button onClick={() => addPlayer()} disabled={players.length >= MAX_PLAYERS} className="bg-slate-700 hover:bg-slate-600 disabled:opacity-50 text-white px-2 py-1 rounded text-xs transition-colors">
                        + Add
                      </button>
                    </div>

                    <div className="space-y-2 flex-1 overflow-y-auto pr-1 custom-scrollbar min-h-0">
                      {players.map((p, idx) => (
                        <div key={p.id} className="flex items-center space-x-2 bg-slate-750 p-1.5 rounded-lg border border-slate-700/50">
                          <div className="relative">
                            <select 
                              value={p.emoji}
                              onChange={(e) => updatePlayer(p.id, 'emoji', e.target.value)}
                              className="appearance-none bg-slate-700 text-lg w-8 h-8 rounded flex items-center justify-center text-center cursor-pointer outline-none focus:ring-1 focus:ring-violet-500"
                            >
                              {EMOJIS.map(e => <option key={e} value={e}>{e}</option>)}
                            </select>
                          </div>
                          <input 
                            type="text" 
                            value={p.name}
                            onChange={(e) => updatePlayer(p.id, 'name', e.target.value)}
                            className="flex-1 bg-transparent border-b border-slate-600 focus:border-violet-500 px-1 py-0.5 outline-none text-sm transition-colors"
                            placeholder={`Player ${idx + 1}`}
                          />
                          {players.length > MIN_PLAYERS && (
                            <button onClick={() => removePlayer(p.id)} className="text-red-400 hover:text-red-300 p-1">
                              <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd" /></svg>
                            </button>
                          )}
                        </div>
                      ))}
                    </div>

                    <div className="mt-2 pt-2 border-t border-slate-700 flex flex-col space-y-3 shrink-0">
                      <div className="flex items-center justify-between">
                        <span className="text-sm font-medium text-slate-300">Imposters:</span>
                        <div className="flex bg-slate-900 rounded-md p-1 border border-slate-700">
                          <button onClick={() => setNumImposters(1)} className={`px-3 py-1 rounded text-xs font-bold transition-all ${numImposters === 1 ? 'bg-violet-500 text-white' : 'text-slate-400 hover:text-white'}`}>1</button>
                          <button onClick={() => setNumImposters(2)} disabled={players.length < 5} className={`px-3 py-1 rounded text-xs font-bold transition-all ${numImposters === 2 ? 'bg-violet-500 text-white' : 'text-slate-400 hover:text-white'} disabled:opacity-30`}>2</button>
                        </div>
                      </div>
                      
                      <div className="flex items-center justify-between">
                        <span className="text-sm font-medium text-slate-300">Clue on Imposter card:</span>
                        <label className="relative inline-flex items-center cursor-pointer">
                          <input type="checkbox" checked={showClueToImposter} onChange={(e) => setShowClueToImposter(e.target.checked)} className="sr-only peer" />
                          <div className="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-violet-500"></div>
                        </label>
                      </div>

                      <button 
                        onClick={startGame}
                        className="w-full bg-gradient-to-r from-violet-600 to-pink-600 hover:from-violet-500 hover:to-pink-500 text-white font-bold py-2.5 rounded-lg shadow-lg transform transition active:scale-95 text-sm uppercase tracking-widest"
                      >
                        Start Game
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          if (gameState === 'role_viewing') {
            return (
              <div className="h-screen w-full bg-slate-900 text-slate-100 flex flex-col items-center justify-center p-2 overflow-hidden" style={globalStyles}>
                <div className="max-w-xs w-full bg-slate-800 p-5 rounded-2xl shadow-2xl border border-slate-700 text-center">
                  
                  {!isSecretRevealed ? (
                    <div className="space-y-4 animate-in fade-in zoom-in duration-300">
                      <p className="text-slate-400 uppercase tracking-widest text-xs font-bold">Pass device to</p>
                      <div className="text-5xl mb-1">{currentPlayer.emoji}</div>
                      <h2 className="text-2xl font-black">{currentPlayer.name}</h2>
                      <p className="text-slate-500 text-xs">Make sure no one is looking!</p>
                      
                      <button 
                        onClick={handleRevealSecret}
                        className="w-full mt-4 bg-slate-100 text-slate-900 hover:bg-white font-bold py-2.5 rounded-lg shadow-lg transform transition active:scale-95 text-sm"
                      >
                        Show Secret
                      </button>
                    </div>
                  ) : (
                    <div className="space-y-4 animate-in flip-in-y duration-500">
                      <div className="text-3xl mb-2">{currentPlayer.role === 'imposter' ? '😈' : '🕵️'}</div>
                      
                      {currentPlayer.role === 'imposter' ? (
                        <div className="space-y-1">
                          <h2 className="text-2xl font-black text-red-500 tracking-wider">Imposter</h2>
                          <p className="text-slate-300 text-xs">Try to blend in!</p>
                          {showClueToImposter && (
                            <div className="bg-slate-900 p-2 rounded-lg mt-3 border border-slate-700">
                              <p className="text-[10px] text-slate-400 uppercase">The Category is</p>
                              <p className="text-lg font-bold text-violet-400 leading-tight">{secretWordData.category}</p>
                            </div>
                          )}
                        </div>
                      ) : (
                        <div className="space-y-1">
                          <h2 className="text-lg font-black text-emerald-400">Civilian</h2>
                          <p className="text-slate-300 text-xs">Draw to prove you know it.</p>
                          <div className="bg-slate-900 p-2 rounded-lg mt-3 border border-slate-700">
                            <p className="text-[10px] text-slate-400 uppercase">{secretWordData.category}</p>
                            <p className="text-xl font-black text-white tracking-wider leading-tight">{secretWordData.word}</p>
                          </div>
                        </div>
                      )}

                      <button 
                        onClick={handleNextRole}
                        className="w-full mt-4 bg-violet-600 hover:bg-violet-500 text-white font-bold py-2.5 rounded-lg shadow-lg transform transition active:scale-95 text-sm"
                      >
                        Hide & Continue
                      </button>
                    </div>
                  )}
                  
                  <div className="mt-4 flex justify-center space-x-1">
                    {players.map((_, idx) => (
                      <div key={idx} className={`h-1.5 w-1.5 rounded-full ${idx === currentPlayerIndex ? 'bg-violet-500' : idx < currentPlayerIndex ? 'bg-slate-600' : 'bg-slate-800'}`} />
                    ))}
                  </div>
                </div>
              </div>
            );
          }

          if (gameState === 'drawing') {
            const minTurnsMet = turnCount >= players.length * 2;
            
            return (
              <div className="h-screen w-full bg-slate-900 text-slate-100 flex flex-col overflow-hidden" style={globalStyles}>
                {/* Header */}
                <header className="bg-slate-800 border-b border-slate-700 p-2 flex justify-between items-center shadow-md z-10 shrink-0">
                  <div>
                    <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Category</p>
                    <p className="text-sm font-bold text-violet-400">{secretWordData.category}</p>
                  </div>
                  
                  <div className="text-right">
                     <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Artist</p>
                     <div className="flex items-center justify-end space-x-1">
                        <span className="text-sm">{currentPlayer.emoji}</span>
                        <span className="text-sm font-bold">{currentPlayer.name}</span>
                     </div>
                  </div>
                </header>

                {/* Canvas Area - Made to fit vertically and horizontally perfectly */}
                <div className="flex-1 relative p-2 flex items-center justify-center overflow-hidden min-h-0 bg-slate-900">
                  <div className="h-full max-w-full aspect-square bg-slate-50 rounded-xl shadow-2xl relative touch-none border-4" style={{ borderColor: drawingPhase === 'active' ? currentPlayer.color : '#334155' }}>
                    
                    <canvas
                      ref={canvasRef}
                      className={`absolute inset-0 w-full h-full cursor-crosshair ${drawingPhase !== 'active' ? 'opacity-80 pointer-events-none' : ''}`}
                      onPointerDown={startLine}
                      onPointerMove={drawLine}
                      onPointerUp={endLine}
                      onPointerOut={endLine}
                      onPointerCancel={endLine}
                    />

                    {/* Overlays */}
                    {drawingPhase === 'waiting' && (
                      <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm flex flex-col items-center justify-center z-20">
                        <div className="bg-slate-800 p-4 rounded-xl text-center shadow-2xl border border-slate-700 max-w-[80%] animate-in zoom-in duration-200">
                          <div className="text-4xl mb-2">{currentPlayer.emoji}</div>
                          <h3 className="text-lg font-black text-white mb-1">{currentPlayer.name}'s Turn</h3>
                          <p className="text-slate-400 mb-4 text-xs">5 secs. <strong className="text-white">ONE continuous line</strong>.</p>
                          <button 
                            onClick={startDrawingTurn}
                            className="w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-2 rounded-lg shadow-lg transform transition active:scale-95 text-sm"
                          >
                            Ready!
                          </button>
                        </div>
                      </div>
                    )}

                    {drawingPhase === 'active' && (
                      <div className="absolute top-2 right-2 z-20 pointer-events-none">
                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-xl font-black shadow-lg border-2 bg-slate-900/80 backdrop-blur ${timeLeft <= 2 ? 'text-red-500 border-red-500 animate-pulse' : 'text-white border-slate-600'}`}>
                          {timeLeft}
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                {/* Footer Controls */}
                <div className="p-2 bg-slate-800 border-t border-slate-700 flex justify-between items-center z-10 shrink-0 min-h-[60px]">
                  {drawingPhase === 'done' ? (
                     <div className="w-full flex justify-end space-x-2">
                       {minTurnsMet && (
                          <button 
                            onClick={initiateVoting}
                            className="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-3 rounded-lg shadow-lg transform transition active:scale-95 border border-red-700 text-sm"
                          >
                            Call Vote
                          </button>
                       )}
                       <button 
                         onClick={handleNextTurn}
                         className="flex-1 bg-slate-100 text-slate-900 hover:bg-white font-bold py-2 px-3 rounded-lg shadow-lg transform transition active:scale-95 text-sm"
                       >
                         Next Player
                       </button>
                     </div>
                  ) : (
                    <div className="w-full text-center text-slate-500 text-xs font-medium uppercase tracking-widest">
                      Round {Math.floor(turnCount / players.length) + 1}
                    </div>
                  )}
                </div>
              </div>
            );
          }

          if (gameState === 'voting') {
            return (
              <div className="h-screen w-full bg-slate-900 text-slate-100 flex flex-col items-center justify-center p-2 overflow-hidden" style={globalStyles}>
                <div className="max-w-xs w-full bg-slate-800 p-4 rounded-2xl shadow-2xl border border-slate-700 text-center flex flex-col max-h-full">
                  
                  {!isSecretRevealed ? (
                    <div className="space-y-4 animate-in fade-in duration-300 my-auto">
                      <p className="text-slate-400 uppercase tracking-widest text-xs font-bold">Voting Phase</p>
                      <div className="text-5xl mb-1">{currentPlayer.emoji}</div>
                      <h2 className="text-2xl font-black">{currentPlayer.name}</h2>
                      <p className="text-slate-500 text-xs">Your turn to vote. Pass secretly.</p>
                      
                      <button 
                        onClick={() => setIsSecretRevealed(true)}
                        className="w-full mt-4 bg-slate-100 text-slate-900 hover:bg-white font-bold py-2.5 rounded-lg shadow-lg transform transition active:scale-95 text-sm"
                      >
                        Ready to Vote
                      </button>
                    </div>
                  ) : (
                    <div className="flex flex-col h-full animate-in slide-in-from-bottom-4 duration-300 min-h-0">
                      <h2 className="text-lg font-bold mb-3 text-slate-300 shrink-0">Who is the Imposter?</h2>
                      
                      <div className="grid grid-cols-1 gap-2 flex-1 overflow-y-auto custom-scrollbar pr-1 min-h-0">
                        {players.filter(p => p.id !== currentPlayer.id).map(p => (
                          <button
                            key={p.id}
                            onClick={() => castVote(p.id)}
                            className="flex items-center justify-between bg-slate-700 hover:bg-slate-600 p-2.5 rounded-lg transition-colors text-left group"
                          >
                            <div className="flex items-center space-x-3">
                              <span className="text-2xl">{p.emoji}</span>
                              <span className="text-sm font-semibold">{p.name}</span>
                            </div>
                            <div className="w-5 h-5 rounded-full border-2 border-slate-500 group-hover:border-violet-400 flex items-center justify-center shrink-0">
                              <div className="w-2.5 h-2.5 rounded-full bg-violet-400 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            </div>
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  <div className="mt-4 flex justify-center space-x-1 shrink-0">
                    {players.map((_, idx) => (
                      <div key={idx} className={`h-1.5 w-1.5 rounded-full ${idx === currentPlayerIndex ? 'bg-red-500' : idx < currentPlayerIndex ? 'bg-slate-600' : 'bg-slate-800'}`} />
                    ))}
                  </div>
                </div>
              </div>
            );
          }

          if (gameState === 'result') {
            const { voteCounts, mostVotedIds, imposters, civiliansWon } = getResults();

            return (
              <div className="h-screen w-full bg-slate-900 text-slate-100 flex flex-col items-center justify-center p-2 overflow-hidden" style={globalStyles}>
                <div className="max-w-sm w-full flex flex-col space-y-4 animate-in zoom-in duration-500 max-h-full">
                  
                  <div className="text-center space-y-2 shrink-0">
                    <h1 className={`text-4xl font-black tracking-tight leading-tight ${civiliansWon ? 'text-emerald-400' : 'text-red-500'}`}>
                      {civiliansWon ? 'CIVILIANS WIN' : 'IMPOSTER WINS'}
                    </h1>
                    <p className="text-sm text-slate-300">
                      Word was: <strong className="text-white text-lg uppercase tracking-wider">{secretWordData.word}</strong>
                    </p>
                  </div>

                  <div className="bg-slate-800 p-4 rounded-2xl shadow-xl border border-slate-700 flex flex-col space-y-4 min-h-0 flex-1 overflow-y-auto custom-scrollbar">
                    
                    <div>
                      <h3 className="text-xs uppercase tracking-widest text-slate-400 font-bold mb-2">Imposter{imposters.length > 1 ? 's' : ''}</h3>
                      <div className="flex flex-wrap gap-2">
                        {imposters.map(imp => (
                          <div key={imp.id} className="bg-red-900/30 border border-red-500/30 px-3 py-1.5 rounded-lg flex items-center space-x-2">
                            <span className="text-xl">{imp.emoji}</span>
                            <span className="text-sm font-bold text-red-100">{imp.name}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="border-t border-slate-700 pt-3">
                      <h3 className="text-xs uppercase tracking-widest text-slate-400 font-bold mb-2">Votes</h3>
                      <div className="space-y-1.5">
                        {Object.entries(voteCounts).sort((a,b) => b[1] - a[1]).map(([id, count]) => {
                          const p = players.find(p => p.id === id);
                          const isMostVoted = mostVotedIds.includes(id);
                          const isImposter = p.role === 'imposter';
                          return (
                            <div key={id} className={`flex items-center justify-between p-2 rounded-md ${isMostVoted ? 'bg-slate-700' : ''}`}>
                              <div className="flex items-center space-x-2 truncate pr-2">
                                <span>{p.emoji}</span>
                                <span className={`text-xs font-semibold truncate ${isImposter ? 'text-red-400' : 'text-slate-200'}`}>
                                  {p.name} {isImposter && '(Imp)'}
                                </span>
                              </div>
                              <div className="flex space-x-0.5 items-center shrink-0">
                                {Array.from({ length: count }).map((_, i) => (
                                  <div key={i} className="w-1.5 h-4 bg-slate-400 rounded-sm"></div>
                                ))}
                                <span className="ml-1 text-xs font-bold w-3 text-right">{count}</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                  </div>

                  <button 
                    onClick={() => setGameState('setup')}
                    className="w-full bg-gradient-to-r from-violet-600 to-pink-600 hover:from-violet-500 hover:to-pink-500 text-white font-bold py-3 rounded-lg shadow-lg transform transition active:scale-95 text-sm shrink-0"
                  >
                    Play Again
                  </button>
                </div>
              </div>
            );
          }

          return null;
        }

        // Render the React application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ImposterArtistApp />);
    </script>
</body>
</html>
