<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Jeopardy (AI Enabled)</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React, ReactDOM, and Babel for standalone in-browser JSX compilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-blue-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Default Game Data ---
        const INITIAL_GAME_DATA = [
          {
            category: "Geography & Earth",
            clues: [
              { id: "g_100", value: 100, text: "A very large body of salt water.", keywords: ["ocean", "sea"], displayAnswer: "What is an ocean?" },
              { id: "g_200", value: 200, text: "A raised part of the earth's surface, much larger than a hill.", keywords: ["mountain", "mountains"], displayAnswer: "What is a mountain?" },
              { id: "g_300", value: 300, text: "A large area of flat land with few trees.", keywords: ["plain", "prairie", "plains"], displayAnswer: "What is a plain?" },
              { id: "g_400", value: 400, text: "A piece of land completely surrounded by water.", keywords: ["island"], displayAnswer: "What is an island?" },
              { id: "g_500", value: 500, text: "A piece of land surrounded by water on three sides.", keywords: ["peninsula"], displayAnswer: "What is a peninsula?" },
            ]
          },
          {
            category: "Math Terms",
            clues: [
              { id: "m_100", value: 100, text: "A math problem where you take one number away from another.", keywords: ["subtraction", "subtract"], displayAnswer: "What is subtraction?" },
              { id: "m_200", value: 200, text: "The answer you get when you add numbers together.", keywords: ["sum"], displayAnswer: "What is the sum?" },
              { id: "m_300", value: 300, text: "A shape with exactly three straight sides and three angles.", keywords: ["triangle"], displayAnswer: "What is a triangle?" },
              { id: "m_400", value: 400, text: "The amount of space inside a flat, two-dimensional shape.", keywords: ["area"], displayAnswer: "What is the area?" },
              { id: "m_500", value: 500, text: "The total distance around the outside edge of a shape.", keywords: ["perimeter"], displayAnswer: "What is the perimeter?" },
            ]
          },
          {
            category: "Emotions",
            clues: [
              { id: "e_100", value: 100, text: "Feeling unhappy or wanting to cry.", keywords: ["sad", "upset", "unhappy"], displayAnswer: "What is sad?" },
              { id: "e_200", value: 200, text: "Feeling very mad because someone was mean or unfair.", keywords: ["angry", "mad", "furious"], displayAnswer: "What is angry?" },
              { id: "e_300", value: 300, text: "Feeling worried, nervous, or uneasy about something that might happen.", keywords: ["anxious", "nervous", "worried"], displayAnswer: "What is anxious?" },
              { id: "e_400", value: 400, text: "Feeling very happy and pleased about something you did well.", keywords: ["proud"], displayAnswer: "What is proud?" },
              { id: "e_500", value: 500, text: "Feeling annoyed or upset because you can't do or change something.", keywords: ["frustrated"], displayAnswer: "What is frustrated?" },
            ]
          },
          {
            category: "Animal Kingdom",
            clues: [
              { id: "ak_100", value: 100, text: "An animal that has scales, breathes through gills, and swims in the water.", keywords: ["fish"], displayAnswer: "What is a fish?" },
              { id: "ak_200", value: 200, text: "An animal that has feathers, wings, and lays eggs.", keywords: ["bird"], displayAnswer: "What is a bird?" },
              { id: "ak_300", value: 300, text: "A warm-blooded animal that has hair or fur and feeds its babies milk.", keywords: ["mammal"], displayAnswer: "What is a mammal?" },
              { id: "ak_400", value: 400, text: "An animal's natural ability to blend in with its surroundings.", keywords: ["camouflage"], displayAnswer: "What is camouflage?" },
              { id: "ak_500", value: 500, text: "An animal that can live both in water and on land, like a frog.", keywords: ["amphibian"], displayAnswer: "What is an amphibian?" },
            ]
          },
          {
            category: "Story Elements",
            clues: [
              { id: "se_100", value: 100, text: "The name of a book, usually found on the front cover.", keywords: ["title"], displayAnswer: "What is the title?" },
              { id: "se_200", value: 200, text: "The person who wrote the story or book.", keywords: ["author"], displayAnswer: "Who is the author?" },
              { id: "se_300", value: 300, text: "The people, animals, or creatures in a story.", keywords: ["character", "characters"], displayAnswer: "What are characters?" },
              { id: "se_400", value: 400, text: "The time and place where a story happens.", keywords: ["setting"], displayAnswer: "What is the setting?" },
              { id: "se_500", value: 500, text: "The main problem or struggle that the characters face.", keywords: ["conflict", "problem"], displayAnswer: "What is the conflict?" },
            ]
          }
        ];

        function App() {
          const [gameData, setGameData] = useState(INITIAL_GAME_DATA);
          const [scores, setScores] = useState({ p1: 0, p2: 0 });
          const [activePlayer, setActivePlayer] = useState(1);
          const [completedClues, setCompletedClues] = useState(new Set());
          const [activeClue, setActiveClue] = useState(null);
          const [userAnswer, setUserAnswer] = useState("");
          const [feedback, setFeedback] = useState(null);
          const inputRef = useRef(null);

          // --- Groq AI Generator State ---
          const [showGroqModal, setShowGroqModal] = useState(false);
          const [groqApiKey, setGroqApiKey] = useState(localStorage.getItem('groqApiKey') || '');
          const [groqTopic, setGroqTopic] = useState('');
          const [isGenerating, setIsGenerating] = useState(false);
          const [groqError, setGroqError] = useState('');

          useEffect(() => {
            if (activeClue && !feedback && inputRef.current) {
              inputRef.current.focus();
            }
          }, [activeClue, feedback]);

          const handleClueClick = (clue) => {
            if (!completedClues.has(clue.id)) {
              setActiveClue(clue);
              setUserAnswer("");
              setFeedback(null);
            }
          };

          const handleCloseModal = () => {
            setActiveClue(null);
            setFeedback(null);
            setActivePlayer(prev => (prev === 1 ? 2 : 1));
          };

          const processAnswer = (e) => {
            e.preventDefault();
            if (!userAnswer.trim()) return;

            const lowerInput = userAnswer.trim().toLowerCase();
            const validPrefixes = ["what is", "what are", "who is", "who are", "what's", "who's", "whats", "whos", "what was", "who was"];
            let hasPrefix = false;
            let strippedInput = lowerInput;

            for (const prefix of validPrefixes) {
              if (lowerInput.startsWith(prefix)) {
                hasPrefix = true;
                strippedInput = lowerInput.slice(prefix.length).replace(/[?!.]/g, '').trim();
                break;
              }
            }

            if (!hasPrefix) {
              setFeedback({
                type: "warning",
                message: "Oops! Remember to answer in the form of a question! (e.g., 'What is...', 'Who is...')",
              });
              return;
            }

            const isCorrect = activeClue.keywords.some(kw => strippedInput.includes(kw.toLowerCase()));

            if (isCorrect) {
              setScores(prev => ({ ...prev, [`p${activePlayer}`]: prev[`p${activePlayer}`] + activeClue.value }));
              setFeedback({ type: "correct", message: "Correct!", points: `+${activeClue.value}`, actualAnswer: activeClue.displayAnswer });
            } else {
              setScores(prev => ({ ...prev, [`p${activePlayer}`]: prev[`p${activePlayer}`] - activeClue.value }));
              setFeedback({ type: "incorrect", message: "Incorrect.", points: `-${activeClue.value}`, actualAnswer: activeClue.displayAnswer });
            }
            setCompletedClues(prev => new Set(prev).add(activeClue.id));
          };

          const handlePass = () => {
            setFeedback({ type: "passed", message: "You passed.", points: "0", actualAnswer: activeClue.displayAnswer });
            setCompletedClues(prev => new Set(prev).add(activeClue.id));
          };

          const resetGame = () => {
            setScores({ p1: 0, p2: 0 });
            setCompletedClues(new Set());
            setActiveClue(null);
            setActivePlayer(1);
          };

          // --- Groq AI API Call ---
          const generateWithGroq = async (e) => {
            e.preventDefault();
            setIsGenerating(true);
            setGroqError('');

            const promptText = `You are an educational assistant. Create a Jeopardy game board for the topic/grade level: "${groqTopic}".
            Output a JSON object with a single root key "categories" which is an array of exactly 5 category objects.
            Each category object must have a "category" string (the category title), and a "clues" array of exactly 5 clue objects.
            Each clue object must have:
            - "value": Number (must be exactly 100, 200, 300, 400, or 500 depending on difficulty)
            - "text": String (the clue definition/question)
            - "keywords": Array of Strings (1-3 words that are acceptable correct answers)
            - "displayAnswer": String (The full correct response in question form, e.g. "What is an ocean?")`;

            try {
              const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${groqApiKey}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: 'llama3-8b-8192',
                  messages: [
                    { role: 'system', content: 'You output only valid JSON matching the exact schema requested.' },
                    { role: 'user', content: promptText }
                  ],
                  response_format: { type: "json_object" }
                })
              });

              if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || 'Failed to fetch from Groq API');
              }

              const data = await response.json();
              const jsonContent = JSON.parse(data.choices[0].message.content);

              if (!jsonContent.categories || jsonContent.categories.length !== 5) {
                throw new Error('AI did not return exactly 5 categories. Please try again.');
              }

              // Robust data cleaning mapping to guarantee UI doesn't crash on bad AI output
              const cleanedData = jsonContent.categories.map((cat, i) => {
                const sortedClues = [...cat.clues].sort((a, b) => a.value - b.value);
                return {
                  category: cat.category || `Category ${i + 1}`,
                  clues: [100, 200, 300, 400, 500].map((val, j) => {
                    const existingClue = sortedClues[j] || {};
                    return {
                      id: `cat${i}_val${val}_${Date.now()}`, // Force uniqueness
                      value: val,
                      text: existingClue.text || 'Fallback Clue',
                      keywords: Array.isArray(existingClue.keywords) ? existingClue.keywords : ['answer'],
                      displayAnswer: existingClue.displayAnswer || 'What is the answer?'
                    };
                  })
                };
              });

              setGameData(cleanedData);
              resetGame();
              setShowGroqModal(false);
            } catch (err) {
              setGroqError(err.message);
            } finally {
              setIsGenerating(false);
            }
          };

          return (
            <div className="min-h-screen font-sans text-white selection:bg-yellow-400 selection:text-blue-900 flex flex-col">
              
              {/* Header */}
              <header className="bg-blue-900 shadow-md p-4 flex flex-col md:flex-row justify-between items-center border-b-4 border-blue-800 gap-4">
                <div className="flex flex-col items-center md:items-start">
                  <h1 className="text-3xl md:text-4xl font-black uppercase tracking-widest text-yellow-400 drop-shadow-sm text-center md:text-left">
                    Vocab Jeopardy
                  </h1>
                  <button 
                    onClick={() => setShowGroqModal(true)}
                    className="mt-2 text-sm bg-purple-700 hover:bg-purple-600 text-white font-bold py-1 px-4 rounded-full transition-colors border border-purple-500 shadow flex items-center gap-2"
                  >
                    <span>✨</span> Generate New Round (Groq API)
                  </button>
                </div>
                
                <div className="flex gap-4">
                  <div className={`flex flex-col items-center px-6 py-2 rounded-lg border-2 transition-all duration-300 ${activePlayer === 1 ? "border-yellow-400 bg-blue-800 shadow-[0_0_15px_rgba(250,204,21,0.3)] scale-105" : "border-blue-700 bg-blue-950 opacity-70"}`}>
                    <span className="text-sm font-bold uppercase tracking-wider text-blue-200">Player 1</span>
                    <span className={`text-2xl font-bold ${scores.p1 < 0 ? "text-red-400" : "text-yellow-400"}`}>${scores.p1}</span>
                  </div>
                  <div className={`flex flex-col items-center px-6 py-2 rounded-lg border-2 transition-all duration-300 ${activePlayer === 2 ? "border-yellow-400 bg-blue-800 shadow-[0_0_15px_rgba(250,204,21,0.3)] scale-105" : "border-blue-700 bg-blue-950 opacity-70"}`}>
                    <span className="text-sm font-bold uppercase tracking-wider text-blue-200">Player 2</span>
                    <span className={`text-2xl font-bold ${scores.p2 < 0 ? "text-red-400" : "text-yellow-400"}`}>${scores.p2}</span>
                  </div>
                </div>
              </header>

              {/* Main Board Container */}
              <main className="p-4 md:p-8 flex-grow flex items-center justify-center overflow-x-auto">
                <div className="min-w-[800px] w-full max-w-7xl">
                  {/* Categories Row */}
                  <div className="grid grid-cols-5 gap-2 mb-2">
                    {gameData.map((col, i) => (
                      <div key={i} className="bg-blue-800 p-4 text-center border-4 border-blue-900 rounded-sm shadow-md flex items-center justify-center h-20">
                        <h2 className="font-bold text-lg md:text-xl uppercase tracking-wide text-white drop-shadow-md leading-tight">
                          {col.category}
                        </h2>
                      </div>
                    ))}
                  </div>

                  {/* Clues Grid */}
                  <div className="grid grid-cols-5 gap-2">
                    {[0, 1, 2, 3, 4].map(rowIndex => (
                      <React.Fragment key={rowIndex}>
                        {gameData.map((col, colIndex) => {
                          const clue = col.clues[rowIndex];
                          const isCompleted = completedClues.has(clue.id);

                          return (
                            <button
                              key={clue.id}
                              onClick={() => handleClueClick(clue)}
                              disabled={isCompleted}
                              className={`
                                h-24 md:h-32 text-center rounded-sm transition-all duration-300
                                ${isCompleted 
                                  ? 'bg-blue-900/50 border-2 border-blue-900 cursor-not-allowed opacity-50' 
                                  : 'bg-blue-600 border-4 border-blue-700 hover:bg-blue-500 hover:scale-[1.02] shadow-lg cursor-pointer'
                                }
                                flex items-center justify-center
                              `}
                            >
                              {!isCompleted && (
                                <span className="text-3xl md:text-4xl font-black text-yellow-400 drop-shadow-[0_2px_2px_rgba(0,0,0,0.5)]">
                                  ${clue.value}
                                </span>
                              )}
                            </button>
                          );
                        })}
                      </React.Fragment>
                    ))}
                  </div>
                </div>
              </main>

              {/* Active Clue Modal */}
              {activeClue && (
                <div className="fixed inset-0 bg-blue-950/90 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                  <div className="bg-blue-800 border-4 border-yellow-400 rounded-xl shadow-2xl max-w-3xl w-full flex flex-col overflow-hidden duration-200">
                    <div className="bg-blue-900 px-6 py-4 flex justify-between items-center border-b-2 border-yellow-400/30">
                      <span className="text-yellow-400 font-bold uppercase tracking-widest text-lg">For ${activeClue.value}</span>
                      <span className="bg-yellow-400 text-blue-900 font-black px-4 py-1 rounded-full text-sm uppercase tracking-wider">Player {activePlayer}'s Turn</span>
                    </div>

                    <div className="p-8 md:p-12 flex-grow flex flex-col items-center justify-center text-center">
                      <h2 className="text-3xl md:text-5xl font-bold mb-10 leading-tight drop-shadow-md text-white" style={{ textShadow: '2px 2px 4px rgba(0,0,0,0.5)' }}>
                        {activeClue.text}
                      </h2>

                      {!feedback ? (
                        <form onSubmit={processAnswer} className="w-full max-w-xl">
                          <div className="relative">
                            <input
                              ref={inputRef}
                              type="text"
                              value={userAnswer}
                              onChange={(e) => setUserAnswer(e.target.value)}
                              placeholder={`Player ${activePlayer}, type your answer...`}
                              className="w-full bg-blue-950 border-b-4 border-yellow-400 px-6 py-4 text-xl md:text-2xl text-white placeholder-blue-400/50 focus:outline-none focus:bg-blue-900 transition-colors rounded-t-lg"
                              autoComplete="off"
                            />
                            <div className="text-sm text-yellow-400/70 mt-2 text-left flex items-center gap-2">
                              Remember to answer in the form of a question!
                            </div>
                          </div>
                          
                          <div className="mt-8 flex gap-4 justify-center">
                            <button type="submit" className="bg-yellow-400 text-blue-950 font-black text-xl px-8 py-3 rounded-lg hover:bg-yellow-300 transition-all shadow-lg active:scale-95">Submit</button>
                            <button type="button" onClick={handlePass} className="bg-blue-700 text-white font-bold text-xl px-8 py-3 rounded-lg hover:bg-blue-600 transition-all shadow-lg active:scale-95 border border-blue-500">Pass</button>
                          </div>
                        </form>
                      ) : (
                        <div className="w-full flex flex-col items-center duration-300">
                          {feedback.type === 'warning' ? (
                            <div className="bg-orange-500/20 border-2 border-orange-400 p-6 rounded-lg w-full max-w-xl">
                              <p className="text-xl text-orange-300 font-bold mb-6">{feedback.message}</p>
                              <button onClick={() => setFeedback(null)} className="bg-orange-500 text-white font-bold px-6 py-2 rounded hover:bg-orange-400 transition-colors">Try Again</button>
                            </div>
                          ) : (
                            <div className={`p-8 rounded-xl w-full max-w-xl border-4 ${feedback.type === 'correct' ? 'bg-green-900/40 border-green-500' : feedback.type === 'passed' ? 'bg-gray-800/40 border-gray-500' : 'bg-red-900/40 border-red-500'}`}>
                              <h3 className={`text-4xl font-black mb-2 ${feedback.type === 'correct' ? 'text-green-400' : feedback.type === 'passed' ? 'text-gray-300' : 'text-red-400'}`}>
                                {feedback.message} {feedback.points !== "0" && `(${feedback.points})`}
                              </h3>
                              <p className="text-blue-200 mt-6 text-lg">The correct response was:</p>
                              <p className="text-2xl md:text-3xl font-bold text-yellow-400 mt-2">{feedback.actualAnswer}</p>
                              <button onClick={handleCloseModal} className="mt-8 bg-white/10 hover:bg-white/20 text-white border-2 border-white/30 font-bold px-8 py-3 rounded-lg transition-colors">Back to Board (Switch Turns)</button>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* Groq AI Modal */}
              {showGroqModal && (
                <div className="fixed inset-0 bg-blue-950/90 backdrop-blur-sm flex items-center justify-center z-[200] p-4">
                  <div className="bg-blue-900 border-4 border-purple-500 rounded-xl shadow-2xl max-w-lg w-full p-8 text-white">
                    <h2 className="text-3xl font-black text-purple-400 mb-2 flex items-center gap-2">
                      <span>✨</span> AI Board Generator
                    </h2>
                    <p className="text-blue-200 mb-6 text-sm">Create a brand new Jeopardy board instantly using the Groq API (Llama 3 Model).</p>
                    
                    <form onSubmit={generateWithGroq} className="space-y-4">
                      <div>
                        <label className="block text-sm font-bold text-blue-300 mb-1">Groq API Key</label>
                        <input 
                          type="password" 
                          value={groqApiKey} 
                          onChange={(e) => { setGroqApiKey(e.target.value); localStorage.setItem('groqApiKey', e.target.value); }}
                          placeholder="gsk_..."
                          className="w-full bg-blue-950 border-2 border-blue-700 rounded p-3 text-white focus:outline-none focus:border-purple-400"
                          required
                        />
                        <p className="text-xs text-blue-400 mt-1">Stored locally in your browser.</p>
                      </div>
                      <div>
                        <label className="block text-sm font-bold text-blue-300 mb-1">Topic or Grade Level</label>
                        <input 
                          type="text" 
                          value={groqTopic} 
                          onChange={(e) => setGroqTopic(e.target.value)}
                          placeholder="e.g., 6th Grade Science, Ancient Egypt..."
                          className="w-full bg-blue-950 border-2 border-blue-700 rounded p-3 text-white focus:outline-none focus:border-purple-400"
                          required
                        />
                      </div>
                      
                      {groqError && (
                        <div className="bg-red-900/50 border border-red-500 text-red-300 p-3 rounded text-sm">
                          {groqError}
                        </div>
                      )}

                      <div className="pt-4 flex gap-3 justify-end">
                        <button 
                          type="button" 
                          onClick={() => setShowGroqModal(false)}
                          className="px-5 py-2 rounded font-bold text-blue-300 hover:text-white transition-colors"
                          disabled={isGenerating}
                        >
                          Cancel
                        </button>
                        <button 
                          type="submit" 
                          className="bg-purple-600 hover:bg-purple-500 disabled:bg-purple-800 disabled:text-purple-400 text-white font-bold px-6 py-2 rounded transition-colors flex items-center gap-2"
                          disabled={isGenerating}
                        >
                          {isGenerating ? 'Generating...' : 'Generate Round'}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
              
              {/* Game Over Screen */}
              {completedClues.size === 25 && (
                <div className="fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-[100] p-4 text-center">
                  <h2 className="text-6xl md:text-8xl font-black text-yellow-400 mb-6 drop-shadow-lg">GAME OVER!</h2>
                  <div className="flex gap-8 mb-10">
                    <div className={`p-6 rounded-2xl border-4 ${scores.p1 > scores.p2 ? "bg-yellow-400/20 border-yellow-400" : "bg-blue-900 border-blue-700"}`}>
                      <h3 className="text-2xl text-blue-200 uppercase tracking-widest mb-2">Player 1</h3>
                      <p className={`text-5xl font-black ${scores.p1 < 0 ? "text-red-400" : "text-white"}`}>${scores.p1}</p>
                    </div>
                    <div className={`p-6 rounded-2xl border-4 ${scores.p2 > scores.p1 ? "bg-yellow-400/20 border-yellow-400" : "bg-blue-900 border-blue-700"}`}>
                      <h3 className="text-2xl text-blue-200 uppercase tracking-widest mb-2">Player 2</h3>
                      <p className={`text-5xl font-black ${scores.p2 < 0 ? "text-red-400" : "text-white"}`}>${scores.p2}</p>
                    </div>
                  </div>
                  <button onClick={resetGame} className="bg-yellow-400 text-blue-950 font-black text-2xl px-10 py-4 rounded-xl hover:bg-yellow-300 transition-transform hover:scale-105 shadow-[0_0_20px_rgba(250,204,21,0.4)]">Play Again</button>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
