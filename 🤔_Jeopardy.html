<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Jeopardy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .jeopardy-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; }
        .modal-enter { animation: modalEnter 0.2s ease-out forwards; }
        @keyframes modalEnter { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
        .screen { display:none; }
        .screen.active { display:flex; }
        .spinner { width:52px; height:52px; border:5px solid rgba(250,204,21,0.15); border-top-color:#facc15; border-radius:50%; animation:spin 0.75s linear infinite; margin:0 auto; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .topic-input:focus, #groq-api-key:focus { outline:none; border-color:#facc15; box-shadow:0 0 0 3px rgba(250,204,21,0.18); }
    </style>
</head>
<body class="text-white min-h-screen">

<!-- ══════════════════════════════════════════
     SCREEN 1 — STARTUP / MODE SELECT
══════════════════════════════════════════ -->
<div id="screen-start" class="screen active flex-col items-center justify-center min-h-screen px-4 py-10"
     style="background:radial-gradient(ellipse at 50% 0%, #1e3a8a 0%, #020617 65%);">

    <h1 class="text-5xl md:text-7xl font-black uppercase tracking-widest text-yellow-400 mb-2 text-center drop-shadow-lg">
        Vocab Jeopardy
    </h1>
    <p class="text-blue-300 text-lg mb-12 tracking-wider text-center">Choose how to play</p>

    <div class="flex flex-col md:flex-row gap-6 w-full max-w-2xl">

        <!-- Default Game Card -->
        <button onclick="startDefaultGame()"
            class="flex-1 bg-blue-800 border-4 border-blue-600 hover:border-yellow-400 rounded-2xl p-8 flex flex-col items-center gap-4 transition-all hover:scale-105 hover:bg-blue-700 group shadow-xl cursor-pointer">
            <div class="text-5xl">🎮</div>
            <h2 class="text-2xl font-black uppercase tracking-wide text-white group-hover:text-yellow-400 transition-colors">Play Default</h2>
            <p class="text-blue-300 text-sm text-center">Play with the built-in categories: Geography, Math, Emotions, Animals &amp; Story Elements</p>
        </button>

        <!-- Generate with Groq Card -->
        <button onclick="showScreen('screen-groq')"
            class="flex-1 bg-blue-800 border-4 border-blue-600 hover:border-yellow-400 rounded-2xl p-8 flex flex-col items-center gap-4 transition-all hover:scale-105 hover:bg-blue-700 group shadow-xl cursor-pointer">
            <div class="text-5xl">✨</div>
            <h2 class="text-2xl font-black uppercase tracking-wide text-white group-hover:text-yellow-400 transition-colors">Generate Topics</h2>
            <p class="text-blue-300 text-sm text-center">Enter 5 custom topics and let Groq AI create brand-new questions for your game</p>
        </button>

    </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 2 — GROQ SETUP
══════════════════════════════════════════ -->
<div id="screen-groq" class="screen flex-col items-center justify-center min-h-screen px-4 py-10 relative"
     style="background:radial-gradient(ellipse at 50% 0%, #1e3a8a 0%, #020617 65%);">

    <button onclick="showScreen('screen-start')"
        class="absolute top-5 left-5 text-blue-400 hover:text-yellow-400 font-bold text-sm uppercase tracking-wider transition-colors">
        ← Back
    </button>

    <h1 class="text-4xl md:text-5xl font-black uppercase tracking-widest text-yellow-400 mb-2 text-center">Generate Questions</h1>
    <p class="text-blue-300 mb-8 text-center text-sm">Powered by Groq AI — questions match default difficulty</p>

    <div class="w-full max-w-lg bg-blue-900/60 border border-blue-700 rounded-2xl p-6 md:p-8 shadow-2xl">

        <!-- API Key -->
        <div class="mb-6">
            <label class="block text-yellow-400 font-bold uppercase tracking-wider text-xs mb-2">Groq API Key</label>
            <input id="groq-api-key" type="password" placeholder="gsk_..."
                class="w-full bg-blue-950 border-2 border-blue-700 rounded-lg px-4 py-3 text-white placeholder-blue-500 transition-all"
                autocomplete="off" />
            <p class="text-blue-400 text-xs mt-1">
                Your key is never stored — only used for this request.
                Get one free at <a href="https://console.groq.com" target="_blank" class="text-yellow-400 underline hover:text-yellow-300">console.groq.com</a>
            </p>
        </div>

        <!-- 5 Topic Inputs -->
        <div class="mb-6">
            <label class="block text-yellow-400 font-bold uppercase tracking-wider text-xs mb-3">Enter 5 Topics</label>
            <div class="flex flex-col gap-3" id="topic-fields">
                <input type="text" class="topic-input w-full bg-blue-950 border-2 border-blue-700 rounded-lg px-4 py-3 text-white placeholder-blue-500 transition-all" placeholder="Topic 1 — e.g. Space Exploration" />
                <input type="text" class="topic-input w-full bg-blue-950 border-2 border-blue-700 rounded-lg px-4 py-3 text-white placeholder-blue-500 transition-all" placeholder="Topic 2 — e.g. World History" />
                <input type="text" class="topic-input w-full bg-blue-950 border-2 border-blue-700 rounded-lg px-4 py-3 text-white placeholder-blue-500 transition-all" placeholder="Topic 3 — e.g. Science" />
                <input type="text" class="topic-input w-full bg-blue-950 border-2 border-blue-700 rounded-lg px-4 py-3 text-white placeholder-blue-500 transition-all" placeholder="Topic 4 — e.g. Music" />
                <input type="text" class="topic-input w-full bg-blue-950 border-2 border-blue-700 rounded-lg px-4 py-3 text-white placeholder-blue-500 transition-all" placeholder="Topic 5 — e.g. Sports" />
            </div>
        </div>

        <!-- Error Message -->
        <div id="groq-error" class="hidden mb-4 bg-red-900/40 border border-red-500 text-red-300 rounded-lg px-4 py-3 text-sm"></div>

        <!-- Generate Button -->
        <button onclick="generateWithGroq()"
            class="w-full bg-yellow-400 text-blue-950 font-black text-lg py-4 rounded-xl hover:bg-yellow-300 transition-all shadow-lg active:scale-95 uppercase tracking-wide cursor-pointer">
            Generate &amp; Play ✨
        </button>

    </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 3 — LOADING
══════════════════════════════════════════ -->
<div id="screen-loading" class="screen flex-col items-center justify-center min-h-screen px-4 text-center">
    <div class="spinner mb-8"></div>
    <h2 class="text-3xl font-black text-yellow-400 uppercase tracking-widest mb-3">Generating Questions</h2>
    <p id="loading-status" class="text-blue-300 text-base max-w-sm">Sending your topics to Groq AI...</p>
    <div class="mt-8 flex gap-2 items-center justify-center">
        <div class="w-2 h-2 rounded-full bg-yellow-400 animate-bounce" style="animation-delay:0s"></div>
        <div class="w-2 h-2 rounded-full bg-yellow-400 animate-bounce" style="animation-delay:0.15s"></div>
        <div class="w-2 h-2 rounded-full bg-yellow-400 animate-bounce" style="animation-delay:0.3s"></div>
    </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 4 — GAME BOARD
══════════════════════════════════════════ -->
<div id="screen-game" class="screen flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-blue-900 shadow-md p-4 flex flex-col md:flex-row justify-between items-center border-b-4 border-blue-800 gap-4">
        <div class="flex items-center gap-4">
            <h1 class="text-3xl md:text-4xl font-black uppercase tracking-widest text-yellow-400 drop-shadow-sm">
                Vocab Jeopardy
            </h1>
            <button onclick="returnToStart()"
                class="hidden md:inline-flex items-center gap-1 text-blue-400 hover:text-yellow-400 text-xs font-bold uppercase tracking-wider transition-colors border border-blue-700 hover:border-yellow-400 rounded-lg px-3 py-2">
                ← New Game
            </button>
        </div>
        <div class="flex gap-4" id="score-container"></div>
    </header>

    <!-- Board -->
    <main class="p-4 md:p-8 flex-grow flex items-center justify-center overflow-x-auto">
        <div class="min-w-[800px] w-full max-w-7xl">
            <div class="jeopardy-grid mb-2" id="category-headers"></div>
            <div class="jeopardy-grid" id="clue-grid"></div>
        </div>
    </main>

    <!-- Clue Modal -->
    <div id="modal-backdrop" class="fixed inset-0 bg-blue-950/90 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-blue-800 border-4 border-yellow-400 rounded-xl shadow-2xl max-w-3xl w-full flex flex-col overflow-hidden modal-enter">
            <div class="bg-blue-900 px-6 py-4 flex justify-between items-center border-b-2 border-yellow-400/30">
                <span id="modal-value" class="text-yellow-400 font-bold uppercase tracking-widest text-lg"></span>
                <span id="modal-turn" class="bg-yellow-400 text-blue-900 font-black px-4 py-1 rounded-full text-sm uppercase tracking-wider"></span>
            </div>
            <div class="p-8 md:p-12 flex-grow flex flex-col items-center justify-center text-center">
                <h2 id="modal-text" class="text-3xl md:text-5xl font-bold mb-10 text-white drop-shadow-md"></h2>
                <div id="input-section" class="w-full max-w-xl">
                    <form id="answer-form">
                        <input id="answer-input" type="text" placeholder="Type your answer..."
                            class="w-full bg-blue-950 border-b-4 border-yellow-400 px-6 py-4 text-xl md:text-2xl text-white placeholder-blue-400/50 focus:outline-none focus:bg-blue-900 transition-colors rounded-t-lg"
                            autocomplete="off" />
                        <div class="mt-8 flex gap-4 justify-center">
                            <button type="submit" class="bg-yellow-400 text-blue-950 font-black text-xl px-8 py-3 rounded-lg hover:bg-yellow-300 transition-all shadow-lg active:scale-95">Submit</button>
                            <button type="button" id="pass-btn" class="bg-blue-700 text-white font-bold text-xl px-8 py-3 rounded-lg hover:bg-blue-600 transition-all shadow-lg active:scale-95 border border-blue-500">Pass</button>
                        </div>
                    </form>
                </div>
                <div id="feedback-section" class="hidden w-full max-w-xl"></div>
            </div>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over" class="fixed inset-0 bg-black/95 hidden flex-col items-center justify-center z-[100] p-4 text-center">
        <h2 class="text-6xl md:text-8xl font-black text-yellow-400 mb-6 drop-shadow-lg">GAME OVER!</h2>
        <div id="final-results" class="flex gap-8 mb-10 flex-wrap justify-center"></div>
        <div class="flex gap-4 flex-wrap justify-center">
            <button onclick="returnToStart()" class="bg-blue-700 text-white font-black text-xl px-8 py-4 rounded-xl hover:bg-blue-600 transition-transform hover:scale-105 border border-blue-500">Main Menu</button>
            <button onclick="replayCurrentGame()" class="bg-yellow-400 text-blue-950 font-black text-xl px-8 py-4 rounded-xl hover:bg-yellow-300 transition-transform hover:scale-105">Play Again</button>
        </div>
    </div>

</div><!-- end screen-game -->

<!-- ══════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════ -->
<script>
// ─── Default Game Data ────────────────────────────────────────────────────
const DEFAULT_GAME_DATA = [
    {
        category: "Geography & Earth",
        clues: [
            { id:"g_100", value:100, text:"A very large body of salt water.", keywords:["ocean","sea"], displayAnswer:"What is an ocean?" },
            { id:"g_200", value:200, text:"A raised part of the earth's surface, much larger than a hill.", keywords:["mountain","mountains"], displayAnswer:"What is a mountain?" },
            { id:"g_300", value:300, text:"A large area of flat land with few trees.", keywords:["plain","prairie","plains"], displayAnswer:"What is a plain?" },
            { id:"g_400", value:400, text:"A piece of land completely surrounded by water.", keywords:["island"], displayAnswer:"What is an island?" },
            { id:"g_500", value:500, text:"A piece of land surrounded by water on three sides.", keywords:["peninsula"], displayAnswer:"What is a peninsula?" }
        ]
    },
    {
        category: "Math Terms",
        clues: [
            { id:"m_100", value:100, text:"A math problem where you take one number away from another.", keywords:["subtraction","subtract"], displayAnswer:"What is subtraction?" },
            { id:"m_200", value:200, text:"The answer you get when you add numbers together.", keywords:["sum"], displayAnswer:"What is the sum?" },
            { id:"m_300", value:300, text:"A shape with exactly three straight sides and three angles.", keywords:["triangle"], displayAnswer:"What is a triangle?" },
            { id:"m_400", value:400, text:"The amount of space inside a flat, two-dimensional shape.", keywords:["area"], displayAnswer:"What is the area?" },
            { id:"m_500", value:500, text:"The total distance around the outside edge of a shape.", keywords:["perimeter"], displayAnswer:"What is the perimeter?" }
        ]
    },
    {
        category: "Emotions",
        clues: [
            { id:"e_100", value:100, text:"Feeling unhappy or wanting to cry.", keywords:["sad","upset","unhappy"], displayAnswer:"What is sad?" },
            { id:"e_200", value:200, text:"Feeling very mad because someone was mean or unfair.", keywords:["angry","mad","furious"], displayAnswer:"What is angry?" },
            { id:"e_300", value:300, text:"Feeling worried, nervous, or uneasy about something that might happen.", keywords:["anxious","nervous","worried"], displayAnswer:"What is anxious?" },
            { id:"e_400", value:400, text:"Feeling very happy and pleased about something you did well.", keywords:["proud"], displayAnswer:"What is proud?" },
            { id:"e_500", value:500, text:"Feeling annoyed or upset because you can't do or change something.", keywords:["frustrated"], displayAnswer:"What is frustrated?" }
        ]
    },
    {
        category: "Animal Kingdom",
        clues: [
            { id:"ak_100", value:100, text:"An animal that has scales, breathes through gills, and swims in the water.", keywords:["fish"], displayAnswer:"What is a fish?" },
            { id:"ak_200", value:200, text:"An animal that has feathers, wings, and lays eggs.", keywords:["bird"], displayAnswer:"What is a bird?" },
            { id:"ak_300", value:300, text:"A warm-blooded animal that has hair or fur and feeds its babies milk.", keywords:["mammal"], displayAnswer:"What is a mammal?" },
            { id:"ak_400", value:400, text:"An animal's natural ability to blend in with its surroundings.", keywords:["camouflage"], displayAnswer:"What is camouflage?" },
            { id:"ak_500", value:500, text:"An animal that can live both in water and on land, like a frog.", keywords:["amphibian"], displayAnswer:"What is an amphibian?" }
        ]
    },
    {
        category: "Story Elements",
        clues: [
            { id:"se_100", value:100, text:"The name of a book, usually found on the front cover.", keywords:["title"], displayAnswer:"What is the title?" },
            { id:"se_200", value:200, text:"The person who wrote the story or book.", keywords:["author"], displayAnswer:"Who is the author?" },
            { id:"se_300", value:300, text:"The people, animals, or creatures in a story.", keywords:["character","characters"], displayAnswer:"What are characters?" },
            { id:"se_400", value:400, text:"The time and place where a story happens.", keywords:["setting"], displayAnswer:"What is the setting?" },
            { id:"se_500", value:500, text:"The main problem or struggle that the characters face.", keywords:["conflict","problem"], displayAnswer:"What is the conflict?" }
        ]
    }
];

// ─── App State ────────────────────────────────────────────────────────────
let GAME_DATA = DEFAULT_GAME_DATA;
let state = { scores:{p1:0, p2:0}, activePlayer:1, completedClues:new Set(), activeClue:null };

// ─── Screen Management ────────────────────────────────────────────────────
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function returnToStart() {
    document.getElementById('game-over').classList.replace('flex', 'hidden');
    showScreen('screen-start');
}

// ─── Default Game ─────────────────────────────────────────────────────────
function startDefaultGame() {
    GAME_DATA = DEFAULT_GAME_DATA;
    launchGame();
}

// ─── Replay (same board, reset scores) ───────────────────────────────────
function replayCurrentGame() {
    state = { scores:{p1:0, p2:0}, activePlayer:1, completedClues:new Set(), activeClue:null };
    document.getElementById('game-over').classList.replace('flex', 'hidden');
    renderScores();
    initBoard();
}

// ─── Groq API Generation ──────────────────────────────────────────────────
async function generateWithGroq() {
    const apiKey = document.getElementById('groq-api-key').value.trim();
    const topicInputs = document.querySelectorAll('#topic-fields .topic-input');
    const topics = Array.from(topicInputs).map(i => i.value.trim()).filter(Boolean);
    const errEl = document.getElementById('groq-error');
    errEl.classList.add('hidden');

    if (!apiKey) { return showGroqError('Please enter your Groq API key.'); }
    if (!apiKey.startsWith('gsk_')) { return showGroqError("That doesn't look like a valid Groq API key (should start with gsk_)."); }
    if (topics.length < 5) { return showGroqError('Please fill in all 5 topic fields.'); }

    showScreen('screen-loading');
    setLoadingMsg('Sending your topics to Groq AI...');

    const prompt = `You are a Jeopardy clue writer for a school vocabulary game aimed at elementary/middle school students (ages 8-13).

Generate a Jeopardy board with exactly 5 categories based on these topics:
${topics.map((t,i) => `${i+1}. ${t}`).join('\n')}

For each category create exactly 5 clues at increasing difficulty ($100, $200, $300, $400, $500).

Difficulty guide — match this style closely:
- $100: Very simple one-sentence definition a young child would know (e.g. "A very large body of salt water.")
- $200: Simple but slightly more specific concept
- $300: Moderate — requires knowing a key vocabulary term
- $400: Harder — a specific fact or nuanced term
- $500: Challenging — a precise vocabulary word or concept that requires study

Rules:
- Each clue is a short 1-2 sentence description (what Jeopardy shows — players respond as a question)
- keywords array: 1-4 strings that must appear somewhere in a correct answer
- displayAnswer: "What is X?" or "Who is X?" format
- Keep clues educational and age-appropriate

Respond ONLY with a raw JSON array — no markdown, no code fences, no explanation. Must exactly match:
[
  {
    "category": "Category Name",
    "clues": [
      {"id":"t1_100","value":100,"text":"Clue text.","keywords":["word"],"displayAnswer":"What is word?"},
      {"id":"t1_200","value":200,"text":"Clue text.","keywords":["word"],"displayAnswer":"What is word?"},
      {"id":"t1_300","value":300,"text":"Clue text.","keywords":["word"],"displayAnswer":"What is word?"},
      {"id":"t1_400","value":400,"text":"Clue text.","keywords":["word"],"displayAnswer":"What is word?"},
      {"id":"t1_500","value":500,"text":"Clue text.","keywords":["word"],"displayAnswer":"What is word?"}
    ]
  }
]
Use id prefixes t1_ t2_ t3_ t4_ t5_ for the five categories. Return ONLY the JSON array.`;

    try {
        setLoadingMsg('Waiting for Groq to generate 25 clues...');

        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                messages: [{ role: 'user', content: prompt }],
                temperature: 0.7,
                max_tokens: 3500
            })
        });

        if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            const msg = errData?.error?.message || `HTTP ${response.status}`;
            throw new Error(msg);
        }

        setLoadingMsg('Parsing generated questions...');
        const data = await response.json();
        let raw = (data.choices?.[0]?.message?.content || '').trim();

        // Strip any accidental markdown code fences
        raw = raw.replace(/```json/gi, '').replace(/```/g, '').trim();

        // Extract the JSON array
        const startIdx = raw.indexOf('[');
        const endIdx = raw.lastIndexOf(']');
        if (startIdx === -1 || endIdx === -1) throw new Error('No JSON array found in the API response. Please try again.');
        raw = raw.slice(startIdx, endIdx + 1);

        const parsed = JSON.parse(raw);

        // Validate
        if (!Array.isArray(parsed) || parsed.length !== 5)
            throw new Error('Expected exactly 5 categories in the response. Please try again.');
        for (const cat of parsed) {
            if (!cat.category || !Array.isArray(cat.clues) || cat.clues.length !== 5)
                throw new Error(`Category "${cat.category || '?'}" is missing clues. Please try again.`);
            for (const clue of cat.clues) {
                if (!clue.text || !Array.isArray(clue.keywords) || !clue.displayAnswer)
                    throw new Error(`A clue in "${cat.category}" is malformed. Please try again.`);
            }
        }

        GAME_DATA = parsed;
        setLoadingMsg('Questions ready!');
        setTimeout(() => launchGame(), 400);

    } catch (err) {
        showScreen('screen-groq');
        showGroqError('Error: ' + err.message);
    }
}

function showGroqError(msg) {
    const el = document.getElementById('groq-error');
    el.textContent = msg;
    el.classList.remove('hidden');
}

function setLoadingMsg(msg) {
    document.getElementById('loading-status').textContent = msg;
}

// ─── Launch / Reset Game ──────────────────────────────────────────────────
function launchGame() {
    state = { scores:{p1:0, p2:0}, activePlayer:1, completedClues:new Set(), activeClue:null };
    showScreen('screen-game');
    renderScores();
    initBoard();
}

// ─── Board ────────────────────────────────────────────────────────────────
function initBoard() {
    const headers = document.getElementById('category-headers');
    const grid = document.getElementById('clue-grid');

    headers.innerHTML = GAME_DATA.map(col => `
        <div class="bg-blue-800 p-4 text-center border-4 border-blue-900 rounded-sm shadow-md flex items-center justify-center h-20">
            <h2 class="font-bold text-base md:text-lg uppercase tracking-wide text-white drop-shadow-md leading-tight">${escHtml(col.category)}</h2>
        </div>
    `).join('');

    grid.innerHTML = '';
    for (let row = 0; row < 5; row++) {
        GAME_DATA.forEach(col => {
            const clue = col.clues[row];
            const btn = document.createElement('button');
            btn.id = `btn-${clue.id}`;
            btn.className = 'h-24 md:h-32 text-center rounded-sm transition-all duration-300 bg-blue-600 border-4 border-blue-700 hover:bg-blue-500 hover:scale-[1.02] shadow-lg flex items-center justify-center w-full cursor-pointer';
            btn.innerHTML = `<span class="text-3xl md:text-4xl font-black text-yellow-400 drop-shadow-[0_2px_2px_rgba(0,0,0,0.5)]">$${clue.value}</span>`;
            btn.onclick = () => openClue(clue);
            grid.appendChild(btn);
        });
    }
}

function renderScores() {
    document.getElementById('score-container').innerHTML = [1, 2].map(p => `
        <div class="flex flex-col items-center px-6 py-2 rounded-lg border-2 transition-all duration-300 ${
            state.activePlayer === p
            ? 'border-yellow-400 bg-blue-800 shadow-[0_0_15px_rgba(250,204,21,0.3)] scale-105'
            : 'border-blue-700 bg-blue-950 opacity-70'
        }">
            <span class="text-sm font-bold uppercase tracking-wider text-blue-200">Player ${p}</span>
            <span class="text-2xl font-bold ${state.scores[`p${p}`] < 0 ? 'text-red-400' : 'text-yellow-400'}">
                $${state.scores[`p${p}`]}
            </span>
        </div>
    `).join('');
}

// ─── Clue Modal ───────────────────────────────────────────────────────────
function openClue(clue) {
    state.activeClue = clue;
    document.getElementById('modal-value').innerText = `For $${clue.value}`;
    document.getElementById('modal-turn').innerText = `Player ${state.activePlayer}'s Turn`;
    document.getElementById('modal-text').innerText = clue.text;
    document.getElementById('answer-input').value = '';
    document.getElementById('input-section').classList.remove('hidden');
    document.getElementById('feedback-section').classList.add('hidden');
    document.getElementById('modal-backdrop').classList.replace('hidden', 'flex');
    setTimeout(() => document.getElementById('answer-input').focus(), 50);
}

function showFeedback(type, message, points, actualAnswer) {
    const section = document.getElementById('feedback-section');
    document.getElementById('input-section').classList.add('hidden');
    section.classList.remove('hidden');

    if (type === 'warning') {
        section.innerHTML = `
            <div class="bg-orange-500/20 border-2 border-orange-400 p-6 rounded-lg w-full">
                <p class="text-xl text-orange-300 font-bold mb-6">${message}</p>
                <button onclick="retry()" class="bg-orange-500 text-white font-bold px-6 py-2 rounded hover:bg-orange-400 cursor-pointer">Try Again</button>
            </div>`;
    } else {
        const isCorrect = type === 'correct';
        section.innerHTML = `
            <div class="p-8 rounded-xl w-full border-4 ${isCorrect ? 'bg-green-900/40 border-green-500' : 'bg-red-900/40 border-red-500'}">
                <h3 class="text-4xl font-black mb-2 ${isCorrect ? 'text-green-400' : 'text-red-400'}">
                    ${message} ${points !== '0' ? `(${points})` : ''}
                </h3>
                <p class="text-blue-200 mt-6 text-lg">Correct response:</p>
                <p class="text-2xl md:text-3xl font-bold text-yellow-400 mt-2">${escHtml(actualAnswer)}</p>
                <button onclick="closeModal()" class="mt-8 bg-white/10 hover:bg-white/20 text-white border-2 border-white/30 font-bold px-8 py-3 rounded-lg cursor-pointer">Next Turn</button>
            </div>`;
    }
}

function retry() {
    document.getElementById('feedback-section').classList.add('hidden');
    document.getElementById('input-section').classList.remove('hidden');
    document.getElementById('answer-input').focus();
}

function closeModal() {
    const btn = document.getElementById(`btn-${state.activeClue.id}`);
    if (btn) {
        btn.disabled = true;
        btn.classList.replace('bg-blue-600', 'bg-blue-900/50');
        btn.classList.replace('border-blue-700', 'border-blue-900');
        btn.style.opacity = '0.5';
        btn.innerHTML = '';
    }
    state.completedClues.add(state.activeClue.id);
    state.activeClue = null;
    state.activePlayer = state.activePlayer === 1 ? 2 : 1;
    document.getElementById('modal-backdrop').classList.replace('flex', 'hidden');
    renderScores();
    checkGameOver();
}

function checkGameOver() {
    if (state.completedClues.size === 25) {
        const max = Math.max(state.scores.p1, state.scores.p2);
        document.getElementById('final-results').innerHTML = [1, 2].map(p => `
            <div class="p-6 rounded-2xl border-4 ${state.scores[`p${p}`] === max && state.scores.p1 !== state.scores.p2 ? 'bg-yellow-400/20 border-yellow-400' : 'bg-blue-900 border-blue-700'}">
                <h3 class="text-2xl text-blue-200 uppercase tracking-widest mb-2">Player ${p}</h3>
                <p class="text-5xl font-black ${state.scores[`p${p}`] < 0 ? 'text-red-400' : 'text-white'}">$${state.scores[`p${p}`]}</p>
                ${state.scores[`p${p}`] === max && state.scores.p1 !== state.scores.p2 ? '<div class="text-yellow-400 font-bold mt-2 uppercase">Winner!</div>' : ''}
            </div>
        `).join('');
        document.getElementById('game-over').classList.replace('hidden', 'flex');
    }
}

// ─── Answer Submission ────────────────────────────────────────────────────
document.getElementById('answer-form').onsubmit = (e) => {
    e.preventDefault();
    const input = document.getElementById('answer-input').value.trim().toLowerCase();
    if (!input) return;

    const prefixes = ["what is","what are","who is","who are","what's","who's","whats","whos","what was","who was"];
    let hasPrefix = false;
    let stripped = input;

    for (const p of prefixes) {
        if (input.startsWith(p)) {
            hasPrefix = true;
            stripped = input.slice(p.length).replace(/[?!.,]/g,'').trim();
            break;
        }
    }

    if (!hasPrefix) {
        showFeedback('warning', "Oops! Remember to answer in the form of a question! (e.g., 'What is...')");
        return;
    }

    const isCorrect = state.activeClue.keywords.some(kw => stripped.includes(kw.toLowerCase()));
    const val = state.activeClue.value;

    if (isCorrect) {
        state.scores[`p${state.activePlayer}`] += val;
        showFeedback('correct', 'Correct!', `+${val}`, state.activeClue.displayAnswer);
    } else {
        state.scores[`p${state.activePlayer}`] -= val;
        showFeedback('incorrect', 'Incorrect.', `-${val}`, state.activeClue.displayAnswer);
    }
};

document.getElementById('pass-btn').onclick = () => {
    showFeedback('passed', 'You passed.', '0', state.activeClue.displayAnswer);
};

// ─── Utility ──────────────────────────────────────────────────────────────
function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
