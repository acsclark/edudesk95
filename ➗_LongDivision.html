<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Quest: Long Division Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-color: #16213e;
            --accent-primary: #4cc9f0; 
            --accent-secondary: #f72585; 
            --accent-success: #4ade80; 
            --text-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: var(--bg-color);
            background-image: radial-gradient(#2a2a4e 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 10px;
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
        }

        h1 {
            font-size: 2.8rem;
            text-shadow: 3px 3px var(--accent-secondary);
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            text-align: center;
        }

        .app-container {
            background-color: var(--panel-color);
            padding: 15px;
            border: 4px solid var(--accent-primary);
            border-radius: 4px;
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 980px;
            height: 90vh; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .settings-panel {
            background: rgba(0,0,0,0.3);
            border: 2px dashed var(--accent-primary);
            padding: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 1.2rem;
            flex-wrap: wrap;
            gap: 5px;
        }

        select, input[type="number"] {
            font-family: 'VT323', monospace;
            background: #0f3460;
            color: white;
            border: 2px solid var(--accent-primary);
            padding: 3px 8px;
            outline: none;
            font-size: 1.2rem;
        }

        /* CRITICAL FIX: Universal removal of Chrome/Safari/Firefox number input arrows */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        .main-gameplay-layout {
            display: flex;
            flex: 1;
            gap: 15px;
            min-height: 0; 
        }

        .left-inventory-panel {
            width: 180px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border: 2px solid #333;
            border-radius: 4px;
        }

        .chart-title {
            color: var(--accent-primary);
            font-size: 1.4rem;
            margin: 0 0 8px 0;
            text-align: center;
            text-transform: uppercase;
        }

        .multiples-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .multiple-box {
            height: 52px;
            background-color: #1a1a2e;
            border: 2px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            cursor: pointer;
        }

        .multiple-box .box-count {
            background-color: #333;
            width: 100%;
            font-size: 12px;
            color: #aaa;
            text-align: center;
            padding: 1px 0;
        }

        .multiple-box .box-value {
            font-size: 1.8rem;
            color: var(--accent-primary);
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .multiple-box.active { border-color: var(--accent-success); box-shadow: 0 0 8px var(--accent-success); }
        .multiple-box.active .box-count { background-color: var(--accent-success); color: #000; }
        .multiple-box.active .box-value { color: #fff; }
        .multiple-box.filled { border-color: var(--accent-primary); }

        .right-arena-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }

        .top-banner-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .equation-preview {
            font-size: 2.2rem;
            color: var(--accent-primary);
            background-color: #000;
            padding: 8px 16px;
            border: 2px solid var(--accent-secondary);
            white-space: nowrap;
        }

        .scanning-equation {
            font-size: 1.8rem;
            color: var(--accent-secondary);
            text-transform: uppercase;
            text-align: right;
            flex: 1;
            height: 28px;
        }

        .instruction-box {
            background-color: #0f3460;
            border-left: 6px solid var(--accent-secondary);
            padding: 10px;
            font-size: 1.4rem;
            min-height: 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            text-align: center;
            margin-bottom: 8px;
        }

        .canvas-container {
            position: relative;
            background: #000;
            border: 3px solid #333;
            width: 100%;
            height: 200px;
            margin-bottom: 8px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #inline-input {
            position: absolute;
            z-index: 10;
            font-size: 38px;
            font-family: 'VT323', monospace;
            width: 44px;
            height: 44px;
            text-align: center;
            border: 3px solid var(--accent-success);
            background-color: #000;
            color: var(--accent-success);
            outline: none;
            display: none;
            padding: 0; /* Clear padding to maximize typing space */
        }

        .carried-input {
            position: absolute;
            width: 24px;
            height: 24px;
            font-size: 20px;
            font-family: 'VT323', monospace;
            color: var(--accent-secondary);
            border: 2px solid var(--accent-secondary);
            background-color: #1a1a2e;
            text-align: center;
            outline: none;
        }

        #interactive-remainder-zone {
            position: absolute;
            z-index: 20;
            background-color: var(--panel-color);
            border: 3px solid var(--accent-secondary);
            padding: 8px;
            width: 220px;
            display: none;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 15px var(--accent-secondary);
        }

        .star-container {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin: 5px 0;
            flex-wrap: wrap;
        }

        .interactive-star {
            font-size: 22px;
            cursor: pointer;
        }

        #setup-input-area {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            margin-bottom: 5px;
        }

        .bottom-action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }

        .feedback {
            font-size: 1.6rem;
            color: var(--accent-primary);
            text-transform: uppercase;
            flex: 1;
            text-align: left;
        }

        button {
            font-family: 'VT323', monospace;
            font-size: 1.6rem;
            padding: 8px 22px;
            cursor: pointer;
            border: none;
            color: white;
            background-color: var(--accent-secondary);
            box-shadow: 0 4px 0px #9e0059;
            transition: all 0.1s;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #9e0059;
        }

        button.btn-check { background-color: var(--accent-success); box-shadow: 0 4px 0px #166534; }

        #bookwork-zone {
            background-color: #000;
            border: 3px solid var(--accent-primary);
            padding: 10px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .bookwork-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            overflow-y: auto;
            flex: 1;
            margin-bottom: 8px;
        }
        .bookwork-item {
            padding: 6px;
            background-color: #0f3460;
            border-bottom: 2px solid #1a1a2e;
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

    <h1>MATH QUEST 🎯</h1>
    
    <div class="app-container">
        <div class="settings-panel">
            <div>
                LVL: 
                <select id="level-select" onchange="initGame()">
                    <option value="scaffold" selected>HELP MODE</option>
                    <option value="gotit">INDEPENDENT</option>
                    <option value="bookwork">10-QUEST BOOK</option>
                </select>
            </div>
            <div>
                DIGITS: 
                <select id="digit-select" onchange="initGame()">
                    <option value="4" selected>4D</option>
                    <option value="5">5D</option>
                    <option value="6">6D</option>
                    <option value="7">7D</option>
                    <option value="8">8D</option>
                </select>
            </div>
            <label>
                <input type="checkbox" id="remainder-toggle" checked onchange="initGame()"> REMAINDERS
            </label>
        </div>

        <div class="main-gameplay-layout">
            
            <div class="left-inventory-panel" id="chart-wrapper-zone">
                <p class="chart-title">Inventory</p>
                <div class="multiples-container" id="multiples-strip"></div>
            </div>

            <div class="right-arena-panel">
                
                <div class="top-banner-row">
                    <div id="equation-display" class="equation-preview">0000 ÷ 0 = ?</div>
                    <div id="scanning-equation" class="scanning-equation"></div>
                </div>
                
                <div id="instruction" class="instruction-box">LOADING MAP...</div>

                <div class="canvas-container" id="canvas-workspace">
                    <div id="interactive-remainder-zone">
                        <div style="font-size: 1.1rem; color: var(--accent-secondary);">ENERGY LEAK!</div>
                        <div id="rem-num-track" style="font-size: 1.8rem;">0</div>
                        <div class="star-container" id="rem-star-box"></div>
                        <button id="rem-clicker-btn" onclick="handleRemCountUpClick()" style="font-size: 1.1rem; padding: 4px 8px;">COUNT +1</button>
                    </div>
                    <div id="remainder-inputs-overlay"></div>
                    <canvas id="mathCanvas" width="720" height="200"></canvas>
                    <input type="number" id="inline-input" placeholder="?">
                </div>

                <div id="bookwork-zone" style="display: none;">
                    <div class="bookwork-grid" id="bookwork-problems-list"></div>
                    <button class="btn-check" id="bookwork-toggle-btn" onclick="toggleBookworkAnswers()" style="width:100%; margin:0;">REVEAL CODES</button>
                </div>

                <div id="setup-input-area" class="setup-input-zone">
                    <span id="setup-prompt" style="font-size: 1.6rem;">COUNT: </span>
                    <input type="number" id="setup-input" style="width: 100px; font-size: 1.6rem;">
                </div>
            </div>
        </div>

        <div class="bottom-action-bar">
            <div id="feedback" class="feedback"></div>
            <div id="control-pane">
                <button class="btn-check" id="action-btn" onclick="handleSubmit()">SUBMIT</button>
            </div>
        </div>
    </div>

    <script>
        let appMode = "counting"; 
        let divisor = 0;
        let dividendDigits = [];
        let quotientDigits = [];
        let remainders = []; 
        let currentMultipleStep = 1; 
        let currentStep = 0;          
        let currentFocusValue = 0;
        let targetQ = 0;
        let targetR = 0;
        let divisionPhase = "input";       
        let isAnimating = false;
        let remCurrentVal = 0;
        let remStarsBuilt = 0;
        let remStarsCounted = 0;
        let bookworkProblemsArray = [];
        let showingBookworkAnswers = false;

        const canvas = document.getElementById('mathCanvas');
        const ctx = canvas.getContext('2d');
        const inlineInput = document.getElementById('inline-input');
        const carriedOverlay = document.getElementById('remainder-inputs-overlay');
        const setupInputArea = document.getElementById('setup-input-area');
        const setupInputField = document.getElementById('setup-input');
        const canvasWorkspace = document.getElementById('canvas-workspace');
        const scanningEq = document.getElementById('scanning-equation');
        const remZone = document.getElementById('interactive-remainder-zone');
        const remNumTrack = document.getElementById('rem-num-track');
        const remStarBox = document.getElementById('rem-star-box');

        const startX = 120; 
        const digitSpacing = 65;
        const quotientY = 55;   
        const lineY = 85;       
        const dividendY = 140;  

        function buildVisualChartContainers() {
            const strip = document.getElementById('multiples-strip');
            strip.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                strip.innerHTML += `
                    <div class="multiple-box" id="m${i}" onclick="handleChartBoxClick(${i})">
                        <div class="box-count">x${i}</div>
                        <div class="box-value" id="mv${i}">?</div>
                    </div>
                `;
            }
        }

        function handleChartBoxClick(index) {
            if (isAnimating) return;
            let targetBoxVal = document.getElementById(`mv${index}`);
            if (targetBoxVal && targetBoxVal.innerText !== "?") {
                let computedValue = divisor * index;
                scanningEq.innerHTML = `${index} x ${divisor} = ${computedValue}`;
                scanningEq.style.opacity = "1";
                scanningEq.style.color = "var(--accent-primary)";
            }
        }

        function initGame() {
            const selectedDigits = parseInt(document.getElementById('digit-select').value);
            const allowRemainder = document.getElementById('remainder-toggle').checked;
            const currentLevelMode = document.getElementById('level-select').value;

            document.getElementById('control-pane').innerHTML = `<button class="btn-check" id="action-btn" onclick="handleSubmit()">SUBMIT</button>`;

            if (currentLevelMode === "bookwork") {
                document.getElementById('equation-display').style.display = "none";
                document.getElementById('instruction').style.display = "none";
                document.getElementById('chart-wrapper-zone').style.display = "none";
                setupInputArea.style.display = "none";
                canvasWorkspace.style.display = "none";
                document.getElementById('feedback').innerText = '';
                document.getElementById('bookwork-zone').style.display = "block";
                generateBookworkProblemsList(selectedDigits, allowRemainder);
                return;
            }

            document.getElementById('equation-display').style.display = "block";
            document.getElementById('instruction').style.display = "flex";
            document.getElementById('chart-wrapper-zone').style.display = "flex";
            document.getElementById('canvas-workspace').style.display = "block";
            document.getElementById('bookwork-zone').style.display = "none";

            divisor = Math.floor(Math.random() * 8) + 2; 
            let minRange = Math.pow(10, selectedDigits - 1);
            let maxRange = Math.pow(10, selectedDigits) - 1;
            let randomDividend = Math.floor(Math.random() * (maxRange - minRange + 1)) + minRange;

            if (!allowRemainder) {
                randomDividend = randomDividend - (randomDividend % divisor);
                if (randomDividend < minRange) randomDividend += divisor;
            }

            dividendDigits = randomDividend.toString().split('').map(Number);
            quotientDigits = new Array(dividendDigits.length).fill(null);
            remainders = new Array(dividendDigits.length + 1).fill(0);

            appMode = "counting";
            currentMultipleStep = 1;
            currentStep = 0;
            divisionPhase = "input";
            isAnimating = false;

            document.getElementById('feedback').innerText = '';
            setupInputArea.style.display = "block";
            remZone.style.display = "none";
            scanningEq.style.opacity = "0"; 
            carriedOverlay.innerHTML = ''; 
            
            document.getElementById('equation-display').innerHTML = `${dividendDigits.join('')} &divide; ${divisor}`;

            buildVisualChartContainers();
            updateCountingUI();
        }

        function generateBookworkProblemsList(digits, allowRemainder) {
            bookworkProblemsArray = [];
            showingBookworkAnswers = false;
            document.getElementById('bookwork-toggle-btn').innerText = "REVEAL CODES";
            const container = document.getElementById('bookwork-problems-list');
            container.innerHTML = '';
            let minRange = Math.pow(10, digits - 1);
            let maxRange = Math.pow(10, digits) - 1;

            for (let i = 1; i <= 10; i++) {
                let currentDivisor = Math.floor(Math.random() * 8) + 2;
                let currentDividend = Math.floor(Math.random() * (maxRange - minRange + 1)) + minRange;
                if (!allowRemainder) {
                    currentDividend = currentDividend - (currentDividend % currentDivisor);
                    if (currentDividend < minRange) currentDividend += currentDivisor;
                }
                bookworkProblemsArray.push({
                    dividend: currentDividend, divisor: currentDivisor,
                    q: Math.floor(currentDividend / currentDivisor), r: currentDividend % currentDivisor
                });
                container.innerHTML += `<div class="bookwork-item"><span>Q${i}: ${currentDividend} &divide; ${currentDivisor}</span><span id="bw-ans-field-${i}" style="color:#555">????</span></div>`;
            }
        }

        function toggleBookworkAnswers() {
            showingBookworkAnswers = !showingBookworkAnswers;
            bookworkProblemsArray.forEach((item, index) => {
                let field = document.getElementById(`bw-ans-field-${index + 1}`);
                field.innerText = showingBookworkAnswers ? (item.q + (item.r > 0 ? " R" + item.r : "")) : "????";
                field.style.color = showingBookworkAnswers ? "var(--accent-success)" : "#555";
            });
            document.getElementById('bookwork-toggle-btn').innerText = showingBookworkAnswers ? "HIDE CODES" : "REVEAL CODES";
        }

        function updateCountingUI() {
            for (let i = 1; i <= 9; i++) {
                let box = document.getElementById(`m${i}`);
                box.className = (i < currentMultipleStep) ? "multiple-box filled" : (i === currentMultipleStep) ? "multiple-box active" : "multiple-box";
            }
            document.getElementById('instruction').innerHTML = `<div>LOAD THE INVENTORY GRID!</div><div>ENTER THE MULTIPLE OF <span style='color:var(--accent-primary)'>${divisor}</span></div>`;
            document.getElementById('setup-prompt').innerHTML = `${divisor} x ${currentMultipleStep} = `;
            setupInputField.value = "";
            setupInputField.focus();
        }

        function switchFromCountingToDivision() {
            appMode = "division";
            setupInputArea.style.display = "none";
            carriedOverlay.innerHTML = '';
            if (document.getElementById('level-select').value === "gotit") {
                for(let i = 1; i < dividendDigits.length; i++) {
                    carriedOverlay.innerHTML += `<input type="text" maxlength="1" class="carried-input" style="left:${(startX + i * digitSpacing) - 22}px; top:${dividendY - 40}px;" id="carry-box-${i}">`;
                }
            }
            divisionPhase = "input";
            updateDivisionUI();
        }

        function calculateCurrentTarget() {
            currentFocusValue = remainders[currentStep] * 10 + dividendDigits[currentStep];
            targetQ = Math.floor(currentFocusValue / divisor);
            targetR = currentFocusValue % divisor;
        }

        function updateDivisionUI() {
            if (currentStep < dividendDigits.length && divisionPhase === "input") {
                calculateCurrentTarget();
            }
            
            drawCanvas();
            const instr = document.getElementById('instruction');
            const btn = document.getElementById('action-btn');
            const mode = document.getElementById('level-select').value;

            if (currentStep < dividendDigits.length) {
                if (divisionPhase === "input") {
                    if (btn) { btn.innerText = "SUBMIT"; btn.style.display = "none"; }
                    manageInlineInput(false); 
                    if (mode === "gotit") {
                        instr.innerHTML = `<div>SOLVE ZONE ${currentStep + 1}</div><div>HOW MANY TIMES DOES ${divisor} FIT IN?</div>`;
                        manageInlineInput(true);
                        if (btn) btn.style.display = "inline-block";
                    } else {
                        runComparisonAnimation();
                    }
                } else if (divisionPhase === "reveal") {
                    manageInlineInput(false);
                    if (btn) btn.style.display = "none"; 
                    if (mode === "gotit") {
                        currentStep++; divisionPhase = "input";
                        updateDivisionUI();
                    } else {
                        setupInteractiveRemainderWorkspace();
                    }
                }
            } else {
                let finalWholeQ = Math.floor(dividendDigits.join('') / divisor);
                let finalR = dividendDigits.join('') % divisor;
                document.getElementById('equation-display').innerHTML = `${dividendDigits.join('')} &divide; ${divisor} = ${finalWholeQ}${finalR > 0 ? " R"+finalR : ""}`;
                remZone.style.display = "none"; scanningEq.style.opacity = "0"; carriedOverlay.innerHTML = ''; 
                instr.innerHTML = `<div style="color:var(--accent-success)">LEVEL COMPLETE! DIVISION MASTER!</div>`;
                document.getElementById('control-pane').innerHTML = `<button class="btn-check" style="background-color:var(--accent-primary); box-shadow:0 4px 0 #0f3460" onclick="initGame()">RESET</button>`;
            }
        }

        function runComparisonAnimation() {
            isAnimating = true;
            document.getElementById('instruction').innerHTML = `<div>SCANNING MATRIX ${currentStep + 1}...</div><div>CHECKING VALUE: <span style="color:var(--accent-secondary)">${currentFocusValue}</span>...</div>`;
            scanningEq.style.opacity = "1";
            for (let i = 1; i <= 9; i++) document.getElementById(`m${i}`).className = "multiple-box filled";
            
            if (currentFocusValue === 0) {
                scanningEq.innerHTML = `0 x ${divisor} = 0`;
                finishAnimation(0);
                return;
            }

            let stepIndex = 1;
            function scanNextBox() {
                if (stepIndex > 9) { finishAnimation(9); return; }
                let currentBox = document.getElementById(`m${stepIndex}`);
                let chartValue = divisor * stepIndex;
                currentBox.className = "multiple-box active";
                scanningEq.innerHTML = `${stepIndex} x ${divisor} = ${chartValue}`;

                if (currentFocusValue < chartValue) {
                    currentBox.style.borderColor = "var(--accent-secondary)";
                    scanningEq.style.color = "var(--accent-secondary)";
                    setTimeout(() => finishAnimation(stepIndex - 1), 600);
                } else {
                    setTimeout(() => {
                        currentBox.className = "multiple-box filled";
                        stepIndex++; scanNextBox();
                    }, 400);
                }
            }
            scanNextBox();
        }

        function finishAnimation(bestFitIndex) {
            isAnimating = false;
            for (let i = 1; i <= 9; i++) document.getElementById(`m${i}`).className = "multiple-box filled";
            if (bestFitIndex > 0) document.getElementById(`m${bestFitIndex}`).className = "multiple-box active";
            
            scanningEq.innerHTML = `${bestFitIndex} x ${divisor} = ${divisor * bestFitIndex}`;
            scanningEq.style.color = "var(--accent-success)";
            document.getElementById('instruction').innerHTML = `<div>TARGET CAPTURED: FITS <span style="color:var(--accent-success)">${bestFitIndex}</span> TIMES!</div><div>TAP ROOF ENTRY BOX!</div>`;
            manageInlineInput(true);
            const btn = document.getElementById('action-btn');
            if (btn) { btn.innerText = "SUBMIT"; btn.style.display = "inline-block"; }
        }

        function setupInteractiveRemainderWorkspace() {
            const btn = document.getElementById('action-btn');
            if (targetR === 0) {
                document.getElementById('instruction').innerHTML = `<div style="color:var(--accent-success)">PERFECT STRIKE! NO REMAINDERS.</div>`;
                if (btn) {
                    btn.style.display = "inline-block";
                    btn.innerText = "CONTINUE";
                }
                return;
            }
            remZone.style.display = "flex";
            remZone.style.left = (startX + currentStep * digitSpacing - 60) + "px";
            remZone.style.top = (quotientY + 20) + "px";
            remCurrentVal = divisor * targetQ;
            remStarsBuilt = 0; remStarsCounted = 0;
            remNumTrack.innerText = remCurrentVal;
            remStarBox.innerHTML = '';
            document.getElementById('instruction').innerHTML = `<div>ENERGY ESCAPE! COUNT UP FROM ${remCurrentVal} TO ${currentFocusValue}!</div>`;
        }

        function handleRemCountUpClick() {
            if (remCurrentVal >= currentFocusValue) return;
            remCurrentVal++; remStarsBuilt++;
            remNumTrack.innerText = remCurrentVal;
            remStarBox.innerHTML += `<span class="interactive-star" id="star-${remStarsBuilt}" onclick="handleStarClick(${remStarsBuilt})">⭐</span>`;
            if (remCurrentVal === currentFocusValue) {
                document.getElementById('instruction').innerHTML = `<div>COLLECT THE REMAINDER PARTICLES!</div>`;
            }
        }

        function handleStarClick(idx) {
            let s = document.getElementById(`star-${idx}`);
            if (s.innerText === "🌟") return;
            remStarsCounted++;
            s.innerText = "🌟";
            if (remStarsCounted === targetR) {
                setTimeout(() => {
                    remZone.style.display = "none";
                    document.getElementById('instruction').innerHTML = `<div>CORE STABILIZED! +${targetR} DRIFTED NEXT DOOR.</div>`;
                    const btn = document.getElementById('action-btn');
                    if (btn) {
                        btn.style.display = "inline-block";
                        btn.innerText = "CONTINUE";
                    }
                }, 500);
            }
        }

        function manageInlineInput(show) {
            if (show && currentStep < dividendDigits.length && divisionPhase === "input") {
                inlineInput.style.left = (startX + currentStep * digitSpacing - 4) + "px";
                inlineInput.style.top = (quotientY - 24) + "px";
                inlineInput.style.display = "block";
                inlineInput.value = ""; inlineInput.focus();
            } else { inlineInput.style.display = "none"; }
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = '48px "VT323"'; 
            
            ctx.strokeStyle = 'var(--accent-primary)';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(startX - 20, lineY);
            ctx.lineTo(startX + dividendDigits.length * digitSpacing + 10, lineY); 
            ctx.moveTo(startX - 18, lineY);
            ctx.quadraticCurveTo(startX - 35, lineY + 20, startX - 25, lineY + 55);                     
            ctx.stroke();

            ctx.fillStyle = 'var(--accent-primary)';
            ctx.fillText(divisor, startX - 60, lineY + 42);

            for (let i = 0; i < dividendDigits.length; i++) {
                let posX = startX + i * digitSpacing;
                if (document.getElementById('level-select').value === "scaffold" && i > 0 && remainders[i] > 0) {
                    ctx.fillStyle = 'var(--accent-secondary)';
                    ctx.font = '28px "VT323"';
                    ctx.fillText(remainders[i], posX - 22, dividendY - 22);
                }
                ctx.fillStyle = '#fff';
                ctx.font = '48px "VT323"';
                ctx.fillText(dividendDigits[i], posX, dividendY);
            }

            for (let i = 0; i < dividendDigits.length; i++) {
                if (quotientDigits[i] !== null) {
                    ctx.fillStyle = 'var(--accent-success)';
                    ctx.fillText(quotientDigits[i], startX + i * digitSpacing, quotientY);
                }
            }

            if (currentStep === dividendDigits.length && remainders[dividendDigits.length] > 0) {
                ctx.fillStyle = 'var(--accent-secondary)';
                ctx.font = '32px "VT323"';
                ctx.fillText(`R ${remainders[dividendDigits.length]}`, startX + dividendDigits.length * digitSpacing, quotientY);
            }

            if (currentStep < dividendDigits.length) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.setLineDash([4, 4]);
                ctx.strokeRect(startX + currentStep * digitSpacing - 15, quotientY - 35, 50, 120);
                ctx.setLineDash([]);
            }
        }

        function handleSubmit() {
            if (isAnimating) return; 
            const feedback = document.getElementById('feedback');
            feedback.style.color = "var(--accent-secondary)";

            if (appMode === "counting") {
                let val = parseInt(setupInputField.value);
                if (val === divisor * currentMultipleStep) {
                    document.getElementById(`mv${currentMultipleStep}`).innerText = val;
                    setupInputField.value = "";
                    if (currentMultipleStep < 9) { currentMultipleStep++; updateCountingUI(); }
                    else { 
                        feedback.style.color = "var(--accent-success)";
                        feedback.innerText = "GRID EQUIPPED!";
                        setTimeout(switchFromCountingToDivision, 800); 
                    }
                } else { 
                    feedback.innerText = "COUNT CORRUPTED!"; 
                    setupInputField.value = ""; setupInputField.focus();
                }
            } else {
                if (divisionPhase === "input") {
                    if (parseInt(inlineInput.value) === targetQ) {
                        quotientDigits[currentStep] = targetQ; remainders[currentStep + 1] = targetR;
                        scanningEq.style.opacity = "0"; divisionPhase = "reveal"; updateDivisionUI();
                        feedback.innerText = "";
                    } else { 
                        feedback.innerText = "CALCULATION ERROR!"; 
                    }
                } else { 
                    currentStep++; 
                    divisionPhase = "input"; 
                    updateDivisionUI(); 
                }
            }
        }

        window.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSubmit(); });
        window.onload = () => { setTimeout(initGame, 100); };
    </script>
</body>
</html>
