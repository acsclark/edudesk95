<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woodcraft Builder</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            keyframes: {
              'bounce-small': {
                '0%, 100%': { transform: 'translateY(-5%)', animationTimingFunction: 'cubic-bezier(0.8,0,1,1)' },
                '50%': { transform: 'none', animationTimingFunction: 'cubic-bezier(0,0,0.2,1)' },
              },
              'pop-in': {
                '0%': { transform: 'scale(0.8)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              'spin-fast': {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' }
              },
              'whack-float': {
                '0%': { transform: 'translateY(0) scale(0.5)', opacity: '1' },
                '100%': { transform: 'translateY(-40px) scale(1.3) rotate(-10deg)', opacity: '0' }
              }
            },
            animation: {
              'bounce-small': 'bounce-small 1s infinite',
              'pop-in': 'pop-in 0.3s ease-out forwards',
              'spin-fast': 'spin-fast 0.1s linear infinite',
              'whack-float': 'whack-float 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            }
          }
        }
      }
    </script>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Wood pegboard background pattern */
        .pegboard-bg {
            background-color: #eab308; /* yellow-500 base */
            background-image: 
                radial-gradient(#ca8a04 20%, transparent 20%),
                linear-gradient(#fef08a, #ca8a04);
            background-size: 24px 24px, 100% 100%;
            background-blend-mode: multiply;
        }

        /* Diagonal safety stripes */
        .safety-stripes {
            background: repeating-linear-gradient(
                45deg,
                #fbbf24,
                #fbbf24 15px,
                #1e1b4b 15px,
                #1e1b4b 30px
            );
        }

        /* Satisfying physical screen rumble shake keyframe animation */
        @keyframes desk-shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            15% { transform: translate(-8px, -6px) rotate(-1.5deg); }
            30% { transform: translate(8px, 6px) rotate(1.5deg); }
            45% { transform: translate(-6px, 4px) rotate(-1deg); }
            60% { transform: translate(6px, -4px) rotate(1deg); }
            75% { transform: translate(-3px, -2px) rotate(-0.5deg); }
            90% { transform: translate(2px, 2px) rotate(0.5deg); }
        }
        
        .shake-active {
            animation: desk-shake 0.28s cubic-bezier(.36,.07,.19,.97) both;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- Inline SVG Icons ---
        const X = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        );
        const CheckCircle = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
        );
        const RotateCcw = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
            </svg>
        );
        const HelpCircle = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        );
        const Home = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
        );

        // --- Constants & Data ---
        const CM_TO_PX = 10;
        const MODAL_SCALE = 1.5; 

        const MATERIAL_NAMES = {
            'wood': 'Timber Block',
            'pipe': 'Chrome Pipe',
            'chain': 'Iron Chain',
            'plastic': 'Plastic Board'
        };

        const MATERIAL_STYLES = {
            'wood': { fill: 'url(#wood-texture)', stroke: '#8B4513' },
            'chain': { fill: 'url(#chain-pattern)', stroke: '#0f172a' },
            'pipe': { fill: 'url(#pipe-grad)', stroke: '#1e293b' },
            'plastic': { fill: 'url(#plastic-grad)', stroke: '#991b1b' }
        };

        const OUTLINE_STYLES = {
            'wood': { fill: '#fef3c7', stroke: '#d97706', text: '#b45309' },      // Light Amber
            'pipe': { fill: '#ecfeff', stroke: '#06b6d4', text: '#083344' },      // Light Cyan/Teal
            'chain': { fill: '#f1f5f9', stroke: '#475569', text: '#0f172a' },     // Slate Gray
            'plastic': { fill: '#fef2f2', stroke: '#f87171', text: '#dc2626' }    // Light Red
        };

        const RAW_MATERIALS = [
            { type: 'wood', label: 'Timber Block', w: 10, h: 2, y: 535 },
            { type: 'pipe', label: 'Chrome Pipe', w: 10, h: 2, y: 575 },
            { type: 'chain', label: 'Iron Chain', w: 10, h: 2, y: 615 },
            { type: 'plastic', label: 'Plastic Board', w: 10, h: 2, y: 655 }
        ];

        const LEVELS = [
          {
            title: "Playhouse",
            difficulty: "Easy",
            targets: [
              { id: 'floor', cx: 400, cy: 450, w: 24, h: 2, label: 'Floor', rot: 0, type: 'wood' },
              { id: 'wall-left', cx: 290, cy: 360, w: 2, h: 16, label: 'Left Wall', rot: 0, type: 'wood' },
              { id: 'wall-right', cx: 510, cy: 360, w: 2, h: 16, label: 'Right Wall', rot: 0, type: 'wood' },
              { id: 'roof-left', cx: 340, cy: 235, w: 15, h: 2, label: 'Left Roof', rot: -36.87, type: 'wood' },
              { id: 'roof-right', cx: 460, cy: 235, w: 15, h: 2, label: 'Right Roof', rot: 36.87, type: 'wood' },
            ]
          },
          {
            title: "Park Swing Set",
            difficulty: "Medium",
            targets: [
              { id: 'top', cx: 350, cy: 150, w: 36, h: 2, label: 'Top Bar', rot: 0, type: 'pipe' },
              { id: 'legL', cx: 200, cy: 260, w: 2, h: 22, label: 'Left Leg', rot: 0, type: 'wood' },
              { id: 'legR', cx: 500, cy: 260, w: 2, h: 22, label: 'Right Leg', rot: 0, type: 'wood' },
              { id: 'chainL', cx: 300, cy: 220, w: 2, h: 14, label: 'Left Chain', rot: 0, type: 'chain' },
              { id: 'chainR', cx: 400, cy: 220, w: 2, h: 14, label: 'Right Chain', rot: 0, type: 'chain' },
              { id: 'seat', cx: 350, cy: 290, w: 12, h: 2, label: 'Swing Seat', rot: 0, type: 'plastic' }
            ]
          },
          {
            title: "Windmill Toy",
            difficulty: "Hard",
            targets: [
              { id: 'base', cx: 400, cy: 450, w: 28, h: 2, label: 'Base Plate', rot: 0, type: 'wood' },
              { id: 'towerL', cx: 345, cy: 320, w: 2, h: 28, label: 'Left Column', rot: -15, type: 'wood' },
              { id: 'towerR', cx: 455, cy: 320, w: 2, h: 28, label: 'Right Column', rot: 15, type: 'wood' },
              { id: 'axle', cx: 400, cy: 180, w: 10, h: 2, label: 'Axle Hub', rot: 0, type: 'pipe' },
              { id: 'blade1', cx: 400, cy: 120, w: 2, h: 10, label: 'Top Blade', rot: 0, type: 'plastic' },
              { id: 'blade2', cx: 460, cy: 180, w: 10, h: 2, label: 'Right Blade', rot: 0, type: 'plastic' },
              { id: 'blade3', cx: 400, cy: 240, w: 2, h: 10, label: 'Bottom Blade', rot: 0, type: 'plastic' },
              { id: 'blade4', cx: 340, cy: 180, w: 10, h: 2, label: 'Left Blade', rot: 0, type: 'plastic' },
              { id: 'chain', cx: 400, cy: 300, w: 2, h: 12, label: 'Pulley Chain', rot: 0, type: 'chain' }
            ]
          }
        ];

        // --- Main Component ---
        function App() {
          const [view, setView] = useState('menu'); // 'menu' or 'play'
          const [levelIdx, setLevelIdx] = useState(0);
          const [cutParts, setCutParts] = useState([]); // Parts player has made
          const [placedParts, setPlacedParts] = useState({});
          const [nails, setNails] = useState({}); 
          const [whacks, setWhacks] = useState([]); // Visual floaties [{ id, x, y, word }]
          const [isShaking, setIsShaking] = useState(false); // Screen shake visual state
          
          const [measuringBlueprint, setMeasuringBlueprint] = useState(null); 
          const [fabricatingMaterial, setFabricatingMaterial] = useState(null); 
          
          const [dragState, setDragState] = useState(null);
          const [message, setMessage] = useState('');
          const [showHelp, setShowHelp] = useState(false);
          
          const svgRef = useRef(null);

          const resetLevel = () => {
            setCutParts([]);
            setPlacedParts({});
            setNails({});
            setMessage('');
            setWhacks([]);
            setIsShaking(false);
          };

          useEffect(() => {
            if (view === 'play') {
                resetLevel();
            }
          }, [levelIdx, view]);

          // Screen Shake Trigger
          const triggerScreenShake = () => {
              setIsShaking(true);
              setTimeout(() => {
                  setIsShaking(false);
              }, 280); // matches CSS animation duration
          };

          const getSvgPoint = (e) => {
            const svg = svgRef.current;
            if (!svg) return { x: 0, y: 0 };
            const pt = svg.createSVGPoint();
            pt.x = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            pt.y = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            return pt.matrixTransform(svg.getScreenCTM().inverse());
          };

          // --- Interaction Handlers ---

          const handlePointerDownBlueprint = (e, target) => {
            e.stopPropagation();
            if (!placedParts[target.id]) {
                setMeasuringBlueprint({ id: target.id, length: Math.max(target.w, target.h), type: target.type });
            }
          };

          const handlePointerDownRawMaterial = (e, material) => {
            e.stopPropagation();
            setFabricatingMaterial(material.type);
          };

          const handlePointerDownCutPart = (e, item) => {
            e.stopPropagation();
            e.target.setPointerCapture(e.pointerId);
            const svgPoint = getSvgPoint(e);
            setDragState({
              id: item.id,
              offsetX: svgPoint.x - item.x,
              offsetY: svgPoint.y - item.y
            });
          };

          const handlePointerDownPlaced = (e, targetId) => {
            e.stopPropagation();
            const svgPoint = getSvgPoint(e);
            
            // Spawn dynamic hammer word bubble
            const whackWords = ["BAM!", "WHACK!", "POW!", "CLANK!", "BOOM!"];
            const randomWord = whackWords[Math.floor(Math.random() * whackWords.length)];
            const newWhack = {
               id: Date.now() + Math.random(),
               x: svgPoint.x,
               y: svgPoint.y,
               word: randomWord
            };
            setWhacks(prev => [...prev, newWhack]);
            triggerScreenShake(); // Shake desk on hammer whack!

            // Clean up the whack animation word after 800ms
            setTimeout(() => {
                setWhacks(prev => prev.filter(w => w.id !== newWhack.id));
            }, 800);

            setNails(prev => {
              const currentNails = prev[targetId] || [];
              if (currentNails.length < 4) {
                return { ...prev, [targetId]: [...currentNails, svgPoint] };
              }
              return prev;
            });
          };

          const handlePointerMove = (e) => {
            if (dragState) {
              const svgPoint = getSvgPoint(e);
              setCutParts(prev => prev.map(item => 
                item.id === dragState.id 
                  ? { ...item, x: svgPoint.x - dragState.offsetX, y: svgPoint.y - dragState.offsetY }
                  : item
              ));
            }
          };

          const handlePointerUp = (e) => {
            if (dragState) {
              const draggedItem = cutParts.find(i => i.id === dragState.id);
              let snapped = false;

              // Find the closest unplaced target to prevent overlap issues
              let closestTarget = null;
              let minDist = 999999;
              for (const target of LEVELS[levelIdx].targets) {
                if (placedParts[target.id]) continue;

                const dist = Math.hypot(draggedItem.x - target.cx, draggedItem.y - target.cy);
                if (dist < minDist) {
                    minDist = dist;
                    closestTarget = target;
                }
              }

              // Evaluate drop against the absolute closest target
              if (closestTarget && minDist < 60) {
                  const targetLength = Math.max(closestTarget.w, closestTarget.h);
                  
                  if (draggedItem.type !== closestTarget.type) {
                    // Prettify material name for kids
                    const neededName = MATERIAL_NAMES[closestTarget.type] || closestTarget.type;
                    const usedName = MATERIAL_NAMES[draggedItem.type] || draggedItem.type;
                    showMessage(`Wrong material! This spot needs ${neededName}, but you tried using ${usedName}.`);
                    setCutParts(prev => prev.filter(i => i.id !== draggedItem.id));
                    snapped = true;
                  } else if (draggedItem.length === targetLength) {
                    // Success!
                    setPlacedParts(prev => ({ ...prev, [closestTarget.id]: draggedItem }));
                    setCutParts(prev => prev.filter(i => i.id !== draggedItem.id));
                    showMessage('Perfect fit! Awesome job!');
                    triggerScreenShake(); // Shake desk on successful fit!
                    snapped = true;
                  } else {
                    showMessage(`Oops, wrong size! Gap needs ${targetLength}cm, but your piece is ${draggedItem.length}cm.`);
                    setCutParts(prev => prev.filter(i => i.id !== draggedItem.id));
                    snapped = true;
                  }
              }

              if (!snapped) {
                setCutParts(prev => prev.map(item => 
                  item.id === dragState.id 
                    ? { ...item, x: item.invX, y: item.invY }
                    : item
                ));
              }

              setDragState(null);
            }
          };

          const handleFabricationComplete = (length, type) => {
              setFabricatingMaterial(null);
              const existingCount = cutParts.length;
              const col = existingCount % 3;
              const row = Math.floor(existingCount / 3);
              
              const newPart = {
                  id: `cut-${Date.now()}`,
                  type: type,
                  length: length,
                  w: length,
                  h: 2,
                  invX: 450 + (col * 110),
                  invY: 570 + (row * 35),
                  x: 450 + (col * 110),
                  y: 570 + (row * 35)
              };
              setCutParts(prev => [...prev, newPart]);
              showMessage(`Nice cut! You made a ${length}cm ${MATERIAL_NAMES[type]}!`);
          };

          const showMessage = (msg) => {
            setMessage(msg);
            setTimeout(() => setMessage(''), 4500);
          };

          const isComplete = Object.keys(placedParts).length === LEVELS[levelIdx].targets.length;

          if (view === 'menu') {
            return (
              <div className="flex flex-col items-center justify-center h-screen pegboard-bg font-sans selection:bg-transparent text-stone-800 p-4">
                
                {/* Decorative Chalk drawings on board */}
                <div className="absolute inset-0 pointer-events-none opacity-20 flex justify-between p-12">
                    <svg className="w-48 h-48 stroke-white stroke-2 fill-none"><path d="M10,80 Q50,20 90,80 T170,80" /><rect x="50" y="80" width="70" height="70" /><polygon points="40,80 130,80 85,40" /></svg>
                    <svg className="w-48 h-48 stroke-white stroke-2 fill-none"><circle cx="80" cy="80" r="40" /><line x1="80" y1="20" x2="80" y2="40" /><line x1="80" y1="120" x2="80" y2="140" /><line x1="20" y1="80" x2="40" y2="80" /><line x1="120" y1="80" x2="140" y2="80" /></svg>
                </div>

                <div className="bg-amber-50 p-10 rounded-[32px] shadow-[0_20px_0_rgba(120,53,4,0.3)] border-8 border-amber-900 text-center max-w-4xl relative z-10">
                    
                    {/* Safety Decal Warning Bar */}
                    <div className="h-6 safety-stripes rounded-full mb-6 flex items-center justify-center text-[10px] text-white font-black uppercase tracking-widest px-8">
                        Safety First! Wear Your Safety Goggles!
                    </div>

                    <h1 className="text-6xl font-black text-amber-950 mb-2 tracking-wider uppercase drop-shadow">WOODCRAFT WORKSHOP</h1>
                    <p className="text-amber-800 font-bold mb-10 text-xl tracking-wide">Measure, Draw, Cut, and build awesome things!</p>
                    
                    <div className="flex flex-wrap justify-center gap-8">
                        {LEVELS.map((lvl, idx) => (
                            <button 
                                key={idx} 
                                onClick={() => { setLevelIdx(idx); setView('play'); }}
                                className="bg-white hover:bg-yellow-50 p-6 rounded-3xl shadow-[0_12px_0_#d97706] hover:translate-y-2 hover:shadow-[0_4px_0_#d97706] active:translate-y-3 active:shadow-none border-4 border-amber-900 transition-all flex flex-col items-center gap-3 w-56 group relative overflow-hidden"
                            >
                                {/* Wooden texture card visual */}
                                <div className="absolute top-0 inset-x-0 h-2 bg-amber-700 opacity-60"></div>
                                <h2 className="text-2xl font-black text-amber-950 group-hover:text-amber-700 transition-colors">{lvl.title}</h2>
                                <span className={`px-4 py-1.5 rounded-full text-sm font-black uppercase tracking-widest ${
                                    lvl.difficulty === 'Easy' ? 'bg-green-200 text-green-800' : 
                                    lvl.difficulty === 'Medium' ? 'bg-yellow-200 text-yellow-800' : 
                                    'bg-red-200 text-red-800'
                                }`}>
                                    {lvl.difficulty}
                                </span>
                            </button>
                        ))}
                    </div>
                </div>
              </div>
            );
          }

          return (
            <div className="flex flex-col h-screen bg-stone-200 font-sans selection:bg-transparent touch-none text-stone-800 relative">
              
              {/* Top Warning Stripes bar */}
              <div className="h-2 safety-stripes w-full"></div>

              {/* Header / Title area */}
              <div className="bg-amber-950 text-amber-50 p-4 shadow-lg flex items-center justify-between z-10 relative">
                <div className="flex items-center gap-3">
                  {/* Decorative Cog logo */}
                  <svg className="w-10 h-10 fill-amber-500 animate-spin-fast" style={{animationDuration: '10s'}} viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 1 15.5 12A3.5 3.5 0 0 1 12 15.5M19.4 13a1.6 1.6 0 0 0 .1-1v-1a1.6 1.6 0 0 0-.1-1l2.1-1.7a.5.5 0 0 0 .1-.6l-2-3.5a.5.5 0 0 0-.6-.2l-2.5 1a1.6 1.6 0 0 0-1.7-1L14.3 2a.5.5 0 0 0-.5-.4h-4a.5.5 0 0 0-.5.4l-.4 2.7a1.6 1.6 0 0 0-1.7 1l-2.5-1a.5.5 0 0 0-.6.2l-2 3.5a.5.5 0 0 0 .1.6L4.6 9a1.6 1.6 0 0 0-.1 1v1a1.6 1.6 0 0 0 .1 1l-2.1 1.7a.5.5 0 0 0-.1.6l2 3.5a.5.5 0 0 0 .6.2l2.5-1a1.6 1.6 0 0 0 1.7 1l.4 2.7a.5.5 0 0 0 .5.4h4a.5.5 0 0 0 .5-.4l.4-2.7a1.6 1.6 0 0 0 1.7-1l2.5 1a.5.5 0 0 0 .6.2l2-3.5a.5.5 0 0 0-.1-.6Z"/></svg>
                  <div>
                    <h1 className="text-2xl font-black tracking-wider uppercase">WOODCRAFT</h1>
                    <div className="flex items-center gap-3">
                      <p className="text-amber-400 text-sm font-bold tracking-wide">Project: {LEVELS[levelIdx].title}</p>
                      <span className="text-xs bg-amber-800 text-amber-200 px-2 py-0.5 rounded font-black uppercase tracking-widest">{LEVELS[levelIdx].difficulty}</span>
                    </div>
                  </div>
                </div>

                <div className="flex items-center gap-2">
                    <button onClick={() => setView('menu')} className="flex items-center gap-1.5 text-white text-sm font-black hover:bg-amber-800 transition-colors bg-amber-900 px-4 py-2.5 rounded-2xl shadow-inner border border-amber-800">
                      <Home size={16} /> Menu
                    </button>
                    <button onClick={resetLevel} className="flex items-center gap-1.5 text-white text-sm font-black hover:bg-amber-800 transition-colors bg-amber-900 px-4 py-2.5 rounded-2xl shadow-inner border border-amber-800">
                      <RotateCcw size={16} /> Reset
                    </button>
                    <button 
                      onClick={() => setShowHelp(!showHelp)}
                      className={`p-2.5 rounded-2xl transition-colors ${showHelp ? 'bg-amber-100 text-amber-950' : 'bg-amber-900 text-amber-200 hover:bg-amber-800'}`}
                    >
                      <HelpCircle size={22} />
                    </button>
                </div>
              </div>

              {/* Help Panel */}
              {showHelp && (
                 <div className="absolute top-24 right-4 bg-white p-5 rounded-[24px] shadow-2xl border-4 border-amber-600 text-sm w-80 z-20 animate-pop-in">
                    <h3 className="font-black text-amber-950 text-xl mb-3 flex justify-between items-center">
                        How to play
                        <button onClick={() => setShowHelp(false)} className="text-stone-400 hover:text-stone-700"><X size={18}/></button>
                    </h3>
                    <ul className="space-y-3 text-stone-700 font-bold">
                        <li className="flex gap-2"><span className="text-blue-500">📏</span> Click any dashed blueprint outline to see what size you need.</li>
                        <li className="flex gap-2"><span className="text-orange-500">🪚</span> Click a raw material in the bottom-left yard to measure, mark, and cut.</li>
                        <li className="flex gap-2"><span className="text-green-500">🚚</span> Drag cut pieces from the bottom-right yard into the blueprint.</li>
                        <li className="flex gap-2"><span className="text-stone-600">🔨</span> Click on placed pieces to drive nails or bolts into them!</li>
                    </ul>
                 </div>
              )}

              {/* Main Game Area */}
              <div className="flex-1 relative overflow-hidden flex items-center justify-center p-4">
                
                {/* Messages */}
                {message && (
                  <div className="absolute top-6 left-1/2 -translate-x-1/2 bg-yellow-400 px-6 py-3.5 rounded-2xl shadow-xl border-4 border-amber-950 text-amber-950 font-black z-20 animate-bounce text-center max-w-lg text-lg">
                    {message}
                  </div>
                )}

                {/* Completion State */}
                {isComplete && (
                  <div className="absolute inset-0 bg-stone-900/60 backdrop-blur-sm z-30 flex items-center justify-center">
                    <div className="bg-white p-10 rounded-[32px] shadow-2xl text-center border-8 border-green-500 transform scale-110 transition-transform max-w-lg">
                      <CheckCircle className="w-24 h-24 text-green-500 mx-auto mb-4" />
                      <h2 className="text-5xl font-black text-stone-850 mb-2">PROJECT COMPLETE!</h2>
                      <p className="text-xl font-bold text-stone-600 mb-8">Excellent craftsmanship, little builder!</p>
                      
                      <div className="flex justify-center gap-4">
                          <button 
                            onClick={() => setView('menu')}
                            className="bg-stone-500 text-white px-6 py-3 rounded-2xl font-black hover:bg-stone-600 transition-colors shadow-[0_4px_0_rgba(0,0,0,0.3)] text-lg"
                          >
                            Workshop Desk
                          </button>
                          {levelIdx < LEVELS.length - 1 && (
                            <button 
                              onClick={() => { setLevelIdx(prev => prev + 1); resetLevel(); }}
                              className="bg-green-500 text-white px-6 py-3 rounded-2xl font-black hover:bg-green-600 transition-colors shadow-[0_4px_0_rgba(0,0,0,0.3)] text-lg"
                            >
                              Next Project!
                            </button>
                          )}
                      </div>
                    </div>
                  </div>
                )}

                {/* The SVG Canvas (Draft Board Visual) */}
                <div className={`w-full max-w-5xl aspect-[4/3] bg-sky-950 rounded-3xl shadow-inner border-[12px] border-amber-900 overflow-hidden relative transition-transform ${isShaking ? 'shake-active' : ''}`}>
                  
                  {/* Subtle Blueprint Paper grid overlay */}
                  <div className="absolute inset-0 opacity-20 pointer-events-none" style={{
                      backgroundImage: 'linear-gradient(#38bdf8 1px, transparent 1px), linear-gradient(90deg, #38bdf8 1px, transparent 1px)',
                      backgroundSize: '20px 20px'
                  }}></div>

                  <svg 
                    ref={svgRef}
                    viewBox="0 0 800 700" 
                    className="w-full h-full relative z-10"
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onPointerLeave={handlePointerUp}
                  >
                    <defs>
                      {/* Wood Pattern */}
                      <pattern id="wood-texture" patternUnits="userSpaceOnUse" width="100" height="100">
                        <rect width="100" height="100" fill="#f59e0b" />
                        <path d="M0 10 Q 25 5 50 15 T 100 10 M0 30 Q 30 35 60 25 T 100 30 M0 50 Q 20 45 50 55 T 100 50 M0 70 Q 40 75 70 65 T 100 70 M0 90 Q 25 85 50 95 T 100 90" fill="none" stroke="#b45309" strokeWidth="1.5" opacity="0.6"/>
                      </pattern>

                      {/* Chains */}
                      <pattern id="chain-pattern" patternUnits="userSpaceOnUse" width="20" height="20">
                        <rect width="20" height="20" fill="#475569" />
                        <rect x="3" y="5" width="14" height="10" rx="5" fill="none" stroke="#0f172a" strokeWidth="2.5"/>
                        <rect x="4" y="6" width="12" height="8" rx="4" fill="none" stroke="#e2e8f0" strokeWidth="1.2"/>
                        <circle cx="10" cy="10" r="3" fill="#1e293b" stroke="#64748b" strokeWidth="1" />
                      </pattern>

                      {/* Metal Pipes */}
                      <linearGradient id="pipe-grad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#bae6fd" />
                        <stop offset="25%" stopColor="#f8fafc" />
                        <stop offset="50%" stopColor="#0284c7" />
                        <stop offset="75%" stopColor="#0369a1" />
                        <stop offset="100%" stopColor="#0c4a6e" />
                      </linearGradient>

                      {/* Plastic Material */}
                      <linearGradient id="plastic-grad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#fca5a5" />
                        <stop offset="50%" stopColor="#ef4444" />
                        <stop offset="100%" stopColor="#991b1b" />
                      </linearGradient>
                      
                      <filter id="shadow">
                        <feDropShadow dx="2" dy="4" stdDeviation="3" floodOpacity="0.3"/>
                      </filter>
                    </defs>

                    {/* --- WORKSHOP BINS (Bottom Area) --- */}
                    <rect x="0" y="500" width="800" height="200" fill="#78350f" stroke="#451a03" strokeWidth="6" />
                    {/* Metal division grid on bench */}
                    <line x1="300" y1="500" x2="300" y2="700" stroke="#451a03" strokeWidth="6" />
                    
                    {/* Raw Materials Bin (Left Crate) */}
                    <rect x="10" y="510" width="280" height="180" fill="#b45309" rx="8" opacity="0.4" />
                    <text x="150" y="525" textAnchor="middle" fill="#fef3c7" className="font-black text-sm uppercase tracking-widest">Raw Supplies</text>
                    
                    {RAW_MATERIALS.map((mat, i) => (
                       <g 
                          key={mat.type} 
                          transform={`translate(25, ${mat.y})`}
                          className="cursor-pointer hover:scale-102 transition-transform"
                          onClick={(e) => handlePointerDownRawMaterial(e, mat)}
                        >
                          {/* Expanded width to 240 to cleanly contain the longest raw material name without clipping */}
                          <rect width="240" height="28" fill="#fef08a" stroke="#ca8a04" strokeWidth="2" rx="6" filter="url(#shadow)" />
                          <rect width={mat.w * CM_TO_PX} height={mat.h * CM_TO_PX} x="8" y="4" fill={MATERIAL_STYLES[mat.type].fill} stroke={MATERIAL_STYLES[mat.type].stroke} strokeWidth="1.5" rx="1.5" />
                          <text x="125" y="19" fill="#451a03" fontSize="12" fontWeight="black" className="uppercase tracking-wide">{mat.label}</text>
                       </g>
                    ))}

                    {/* Cut Parts Bin (Right Crate) */}
                    <rect x="310" y="510" width="480" height="180" fill="#1e293b" rx="8" opacity="0.4" />
                    <text x="550" y="525" textAnchor="middle" fill="#cbd5e1" className="font-black text-sm uppercase tracking-widest">Cut Parts Tray</text>

                    {/* --- Draw Targets (Outlines) --- */}
                    {LEVELS[levelIdx].targets.map(target => {
                      const outStyle = OUTLINE_STYLES[target.type] || OUTLINE_STYLES['wood'];
                      return (
                        <g 
                          key={target.id} 
                          transform={`translate(${target.cx}, ${target.cy}) rotate(${target.rot}) translate(${-target.w * CM_TO_PX / 2}, ${-target.h * CM_TO_PX / 2})`}
                          className="cursor-pointer"
                          onPointerDown={(e) => handlePointerDownBlueprint(e, target)}
                        >
                          {!placedParts[target.id] && (
                            <>
                              <rect 
                                width={target.w * CM_TO_PX} 
                                height={target.h * CM_TO_PX} 
                                fill={outStyle.fill} 
                                stroke={outStyle.stroke} 
                                strokeWidth="3" 
                                strokeDasharray="6 4"
                                rx="4"
                              />
                              <g className="opacity-0 hover:opacity-100 transition-opacity">
                                 <rect width={target.w * CM_TO_PX} height={target.h * CM_TO_PX} fill={outStyle.stroke} opacity="0.3" rx="4" />
                                 <text x={(target.w * CM_TO_PX)/2} y={(target.h * CM_TO_PX)/2 + 5} textAnchor="middle" fill={outStyle.text} className="text-xs font-black uppercase tracking-wider">Measure</text>
                              </g>
                            </>
                          )}
                        </g>
                      )
                    })}

                    {/* --- Draw Placed Parts --- */}
                    {LEVELS[levelIdx].targets.map(target => {
                      const part = placedParts[target.id];
                      if (!part) return null;
                      
                      return (
                        <g 
                          key={`placed-${target.id}`}
                          transform={`translate(${target.cx}, ${target.cy}) rotate(${target.rot}) translate(${-target.w * CM_TO_PX / 2}, ${-target.h * CM_TO_PX / 2})`}
                          onPointerDown={(e) => handlePointerDownPlaced(e, target.id)}
                          className="cursor-crosshair group"
                        >
                          <rect 
                            width={target.w * CM_TO_PX} 
                            height={target.h * CM_TO_PX} 
                            fill={MATERIAL_STYLES[part.type].fill} 
                            stroke={MATERIAL_STYLES[part.type].stroke} 
                            strokeWidth="3" 
                            rx="4"
                            filter="url(#shadow)"
                          />
                          <rect 
                            width={target.w * CM_TO_PX} 
                            height={target.h * CM_TO_PX} 
                            fill="rgba(255,255,255,0.15)"
                            className="opacity-0 group-hover:opacity-100 transition-opacity" 
                            rx="4"
                          />
                        </g>
                      )
                    })}

                    {/* --- Draw Nails --- */}
                    {Object.entries(nails).map(([targetId, nailPoints]) => (
                      <g key={`nails-${targetId}`}>
                        {nailPoints.map((point, i) => (
                          <g key={i} transform={`translate(${point.x}, ${point.y})`}>
                            {/* Bolt / Nail metal style */}
                            <circle r="6" fill="#64748b" stroke="#334155" strokeWidth="1.5" />
                            <circle r="3" fill="#e2e8f0" cx="-1" cy="-1" />
                            <line x1="-3" y1="-3" x2="3" y2="3" stroke="#334155" strokeWidth="1.5" />
                          </g>
                        ))}
                      </g>
                    ))}

                    {/* --- Draw Fabricated Cut Parts --- */}
                    {cutParts.map((item) => {
                      const isDragging = dragState?.id === item.id;
                      
                      return (
                        <g 
                          key={item.id}
                          transform={`translate(${item.x}, ${item.y}) translate(${-item.w * CM_TO_PX / 2}, ${-item.h * CM_TO_PX / 2})`}
                          onPointerDown={(e) => handlePointerDownCutPart(e, item)}
                          className={`
                            ${isDragging ? 'cursor-grabbing opacity-90' : 'cursor-grab'} 
                            ${!isDragging && 'transition-transform duration-200'}
                          `}
                          filter={isDragging ? 'url(#shadow)' : ''}
                        >
                          {isDragging && <rect width={item.w * CM_TO_PX} height={item.h * CM_TO_PX} fill="black" opacity="0.15" transform="translate(4, 8)" rx="4"/>}
                          
                          <rect 
                            width={item.w * CM_TO_PX} 
                            height={item.h * CM_TO_PX} 
                            fill={MATERIAL_STYLES[item.type].fill} 
                            stroke={MATERIAL_STYLES[item.type].stroke} 
                            strokeWidth="3" 
                            rx="4"
                          />
                          <text x={(item.w * CM_TO_PX)/2} y={(item.h * CM_TO_PX) + 16} textAnchor="middle" fill="#cbd5e1" fontSize="11" fontWeight="black">{item.length}cm</text>
                          
                          {/* Super satisfying reticle crosshair in the absolute middle of the material block during dragging */}
                          {isDragging && (
                            <g transform={`translate(${(item.w * CM_TO_PX) / 2}, ${(item.h * CM_TO_PX) / 2})`}>
                                <circle r="12" fill="none" stroke="#2563eb" strokeWidth="2.5" strokeDasharray="3 2" />
                                <circle r="3.5" fill="#2563eb" />
                                <line x1="-18" y1="0" x2="18" y2="0" stroke="#2563eb" strokeWidth="2.5" />
                                <line x1="0" y1="-18" x2="0" y2="18" stroke="#2563eb" strokeWidth="2.5" />
                            </g>
                          )}
                        </g>
                      )
                    })}

                    {/* --- Render Interactive Cartoon Hit Words --- */}
                    {whacks.map(whack => (
                        <g key={whack.id} transform={`translate(${whack.x}, ${whack.y})`}>
                            <g className="animate-whack-float">
                                {/* Spikey Speech Bubble */}
                                <polygon points="-30,-10 -15,-15 0,-30 15,-15 30,-10 15,5 20,20 0,10 -20,20 -15,5" fill="#facc15" stroke="#78350f" strokeWidth="3" />
                                <text textAnchor="middle" y="3" fill="#78350f" fontSize="14" fontWeight="black">{whack.word}</text>
                            </g>
                        </g>
                    ))}
                  </svg>
                </div>
              </div>

              {/* Blueprint Measurement Modal */}
              {measuringBlueprint && (
                <BlueprintMeasureModal 
                  item={measuringBlueprint} 
                  onClose={() => setMeasuringBlueprint(null)} 
                />
              )}

              {/* Fabrication Station Modal */}
              {fabricatingMaterial && (
                <FabricationStation 
                  type={fabricatingMaterial}
                  onClose={() => setFabricatingMaterial(null)}
                  onComplete={handleFabricationComplete}
                />
              )}

            </div>
          );
        }

        // --- Subcomponents ---

        // Simplified modal for measuring blueprints only
        function BlueprintMeasureModal({ item, onClose }) {
          const tapeRef = useRef(null);
          const [dragX, setDragX] = useState(40);
          const [isDragging, setIsDragging] = useState(false);
          
          const displayPX = item.length * CM_TO_PX * MODAL_SCALE;
          const currentMeasurement = Math.max(0, Math.round(dragX / (CM_TO_PX * MODAL_SCALE)));
          const outStyle = OUTLINE_STYLES[item.type] || OUTLINE_STYLES['wood'];

          useEffect(() => {
            if (!isDragging) return;

            const handlePointerMove = (e) => {
              if (!tapeRef.current) return;
              const rect = tapeRef.current.getBoundingClientRect();
              const clientX = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
              setDragX(Math.max(0, Math.min(clientX - rect.left, displayPX + 120))); 
            };

            const handlePointerUp = () => {
              setIsDragging(false);
            };

            window.addEventListener('pointermove', handlePointerMove);
            window.addEventListener('pointerup', handlePointerUp);
            return () => {
              window.removeEventListener('pointermove', handlePointerMove);
              window.removeEventListener('pointerup', handlePointerUp);
            };
          }, [isDragging, displayPX]);

          const ticks = [];
          for (let i = 0; i <= Math.ceil(dragX / (CM_TO_PX * MODAL_SCALE)); i++) {
            const xPos = i * (CM_TO_PX * MODAL_SCALE);
            if (xPos > dragX) break;
            ticks.push(
              <g key={i} transform={`translate(${xPos}, 0)`}>
                <line x1="0" y1="0" x2="0" y2={i % 5 === 0 ? 15 : 8} stroke="black" strokeWidth="2" />
                {i > 0 && i % 5 === 0 && <text x="0" y="30" textAnchor="middle" fontSize="14" fontWeight="bold" fill="black">{i}</text>}
              </g>
            );
          }

          return (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 touch-none">
              <div className="bg-white rounded-[32px] shadow-2xl p-8 max-w-4xl w-full relative overflow-hidden border-8 border-blue-900 text-stone-800">
                
                <button onClick={onClose} className="absolute top-4 right-4 bg-stone-100 p-2 rounded-full hover:bg-red-100 hover:text-red-600 transition-colors z-50"><X size={24} /></button>
                <h2 className="text-4xl font-black text-blue-950 mb-1 text-center uppercase tracking-wide">Measuring Blueprint Gap</h2>
                <p className="text-center text-stone-500 font-bold mb-4">Drag the tape measure body from the zero line to the right edge to find the required length.</p>
                
                {/* Clear, colorful, highly educational material type badge inside the measuring modal */}
                <div className="flex justify-center mb-8">
                  <span className={`px-5 py-2.5 rounded-2xl text-sm font-black uppercase tracking-widest shadow-sm ${
                    item.type === 'wood' ? 'bg-amber-100 text-amber-800 border-2 border-amber-300' :
                    item.type === 'pipe' ? 'bg-cyan-100 text-cyan-850 border-2 border-cyan-300' :
                    item.type === 'chain' ? 'bg-slate-200 text-slate-850 border-2 border-slate-400' :
                    'bg-red-100 text-red-800 border-2 border-red-300'
                  }`}>
                    Material Needed: {MATERIAL_NAMES[item.type]}
                  </span>
                </div>

                <div className="flex justify-center mb-12 h-16">
                  {currentMeasurement > 0 && <div className="bg-blue-100 text-blue-900 px-8 py-3 rounded-2xl font-black text-4xl shadow-md border-4 border-blue-300">{currentMeasurement} cm</div>}
                </div>

                <div className="relative h-64 flex items-center justify-start ml-16" ref={tapeRef}>
                  <div className="absolute h-[60px] rounded-[12px] top-1/2 -translate-y-1/2 border-4 border-dashed" 
                       style={{ width: `${displayPX}px`, left: 0, backgroundColor: outStyle.fill, borderColor: outStyle.stroke }}>
                     <div className="w-full h-full flex items-center justify-center font-black uppercase tracking-widest opacity-80" style={{ color: outStyle.text }}>Blueprint Gap</div>
                     <div className="absolute left-[-2px] top-[-30px] bottom-[-30px] w-1 bg-red-500 z-10 flex items-start justify-center">
                        <span className="bg-red-500 text-white text-xs font-bold px-2 py-1 rounded -translate-y-full mt-[-4px]">0 cm</span>
                     </div>
                  </div>

                  <div className="absolute top-1/2 -translate-y-1/2 w-[20px] h-[60px] bg-stone-300 border-2 border-stone-500 rounded-l-lg shadow-md flex items-center justify-center z-30" style={{ left: '-20px' }}>
                    <div className="w-1 h-10 bg-stone-400 rounded-full"></div>
                  </div>

                  {dragX > 0 && (
                    <div className="absolute h-[40px] top-1/2 -translate-y-1/2 overflow-hidden bg-yellow-400 border-y-2 border-yellow-600 z-20 origin-left" style={{ width: `${dragX}px`, left: '0px' }}>
                      <svg width="100%" height="100%">{ticks}<line x1="0" y1="20" x2="100%" y2="20" stroke="rgba(0,0,0,0.1)" strokeWidth="1" /></svg>
                    </div>
                  )}

                  <div className="absolute top-1/2 -translate-y-1/2 w-[110px] h-[100px] bg-yellow-500 rounded-2xl shadow-xl border-4 border-yellow-600 flex items-center justify-center z-40 cursor-ew-resize hover:bg-yellow-400 touch-none"
                    style={{ left: `${dragX}px` }} onPointerDown={(e) => { e.preventDefault(); setIsDragging(true); }}>
                    <div className="absolute left-[-4px] top-1/2 -translate-y-1/2 w-3 h-[42px] bg-black rounded-l-sm border-y border-l border-stone-700"></div>
                    <div className="w-[70px] h-[70px] bg-stone-800 rounded-full shadow-inner"></div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // Complex modal for Measure -> Mark -> Cut fabrication pipeline
        function FabricationStation({ type, onClose, onComplete }) {
            const [step, setStep] = useState(0); // 0: measure, 1: mark, 2: cut
            
            // Measure State
            const [tapeX, setTapeX] = useState(100);
            const [isDraggingTape, setIsDraggingTape] = useState(false);
            const measureRef = useRef(null);

            // Mark State
            const [drawnX, setDrawnX] = useState(100);
            const [markLine, setMarkLine] = useState([]); // Array of absolute Y-coordinates
            const [isDrawing, setIsDrawing] = useState(false);
            const [cursor, setCursor] = useState({ x: 0, y: 0 });
            const [isHoveringWorkspace, setIsHoveringWorkspace] = useState(false);
            const [fabMessage, setFabMessage] = useState('');
            
            // Cut State (Vertical Feed)
            const [materialY, setMaterialY] = useState(170); // Starts at bottom
            const [isDraggingMaterial, setIsDraggingMaterial] = useState(false);
            const [hasCut, setHasCut] = useState(false);
            const [sparks, setSparks] = useState([]); // Flying particles
            
            const currentMeasurement = Math.max(0, Math.round(tapeX / (CM_TO_PX * MODAL_SCALE)));
            const SAW_Y = 120; // Y coordinate of saw blade
            const SAW_X = 400; // X coordinate of saw blade
            const lastClientY = useRef(0);
            const workspaceSvgRef = useRef(null);

            // -- Coordinate Translation for Workstation Svg --
            const getWorkspacePoint = (e) => {
                const svg = workspaceSvgRef.current;
                if (!svg) return { x: 0, y: 0 };
                const pt = svg.createSVGPoint();
                pt.x = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                pt.y = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
                return pt.matrixTransform(svg.getScreenCTM().inverse());
            };

            // -- Live Pencil Pointer Move Handlers --
            const handleWorkspacePointerMove = (e) => {
                const pt = getWorkspacePoint(e);
                setCursor({ x: pt.x, y: pt.y });
                setIsHoveringWorkspace(true);
                
                if (isDrawing && step === 1) {
                    setMarkLine(prev => [...prev, pt.y]);
                }
            };

            // -- Step 0 Dragging Effect --
            useEffect(() => {
                if (!isDraggingTape || step !== 0) return;

                const handleTapeMove = (e) => {
                    if (!measureRef.current) return;
                    const rect = measureRef.current.getBoundingClientRect();
                    const clientX = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                    setTapeX(Math.max(20, Math.min(clientX - rect.left - 50, 50 * CM_TO_PX * MODAL_SCALE)));
                };

                const handleTapeUp = () => {
                    setIsDraggingTape(false);
                };

                window.addEventListener('pointermove', handleTapeMove);
                window.addEventListener('pointerup', handleTapeUp);
                return () => {
                    window.removeEventListener('pointermove', handleTapeMove);
                    window.removeEventListener('pointerup', handleTapeUp);
                };
            }, [isDraggingTape, step]);

            // -- Step 1 Draw Handlers --
            const handleMarkDown = (e) => {
                if (step !== 1) return;
                e.preventDefault();
                setIsDrawing(true);
                const pt = getWorkspacePoint(e);
                setMarkLine([pt.y]);
                setDrawnX(pt.x - 50);
            };

            const handleMarkUp = () => {
                if (!isDrawing || step !== 1) return;
                setIsDrawing(false);
                
                if (markLine.length > 5) {
                    const minY = Math.min(...markLine);
                    const maxY = Math.max(...markLine);
                    const span = maxY - minY;
                    
                    if (span > 35) {
                        const diff = Math.abs(drawnX - tapeX);
                        if (diff <= 25) {
                            setStep(2); // Success! Transition to cut
                        } else {
                            setMarkLine([]); 
                            setFabMessage("Draw your mark right at the end of the tape measure!");
                            setTimeout(() => setFabMessage(''), 4500);
                        }
                    } else {
                        setMarkLine([]); 
                    }
                }
            };

            // -- Step 2 Cut Logic (Vertical Feed) --
            const triggerCut = () => {
                setHasCut(true);
                setIsDraggingMaterial(false);
                setMaterialY(SAW_Y - 60); // Fully passed blade
                setSparks([]);
                setTimeout(() => {
                    onComplete(currentMeasurement, type);
                }, 1500);
            };

            const handleMaterialDown = (e) => {
                if (step !== 2 || hasCut) return;
                const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
                lastClientY.current = clientY;
                setIsDraggingMaterial(true);
            };

            useEffect(() => {
                if (!isDraggingMaterial || step !== 2 || hasCut) return;

                const handleMaterialMove = (e) => {
                    const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
                    if (lastClientY.current === 0) {
                        lastClientY.current = clientY;
                        return;
                    }
                    const dy = clientY - lastClientY.current;
                    lastClientY.current = clientY;

                    setMaterialY(prev => {
                        const next = Math.max(50, Math.min(170, prev + dy));

                        // Generate particles (sparks) when material is crossing the blade
                        if (next <= 140 && next >= 70) {
                            // Custom spark/shaving color for each material!
                            const matColor = type === 'wood' ? '#d97706' : type === 'plastic' ? '#f87171' : type === 'pipe' ? '#22d3ee' : '#f97316';
                            const newSparks = Array.from({ length: 4 }).map(() => ({
                                id: Math.random(),
                                x: SAW_X + (Math.random() - 0.5) * 15,
                                y: SAW_Y + (Math.random() - 0.5) * 10,
                                vx: (Math.random() - 0.3) * 6,
                                vy: -(Math.random() * 5 + 3),
                                size: Math.random() * 4 + 2,
                                color: matColor
                            }));
                            setSparks(prevSparks => [...prevSparks.slice(-20), ...newSparks]);
                        } else {
                            setSparks([]);
                        }

                        // Complete cut once bottom of material (Y + 60) passes the saw slot (Y = 120)
                        if (next + 60 <= SAW_Y) {
                            setTimeout(() => triggerCut(), 0);
                        }
                        return next;
                    });
                };

                const handleMaterialUp = () => {
                    setIsDraggingMaterial(false);
                    setSparks([]);
                };

                window.addEventListener('pointermove', handleMaterialMove);
                window.addEventListener('pointerup', handleMaterialUp);
                return () => {
                    window.removeEventListener('pointermove', handleMaterialMove);
                    window.removeEventListener('pointerup', handleMaterialUp);
                };
            }, [isDraggingMaterial, step, hasCut, drawnX, type]);

            // Update spark positions over time
            useEffect(() => {
                if (sparks.length === 0) return;
                const timer = setInterval(() => {
                    setSparks(prev => prev.map(s => ({
                        ...s,
                        x: s.x + s.vx,
                        y: s.y + s.vy,
                        vy: s.vy + 0.3 // gravity
                    })).filter(s => s.y < 256));
                }, 30);
                return () => clearInterval(timer);
            }, [sparks]);

            const ticks = [];
            for (let i = 0; i <= Math.ceil(tapeX / (CM_TO_PX * MODAL_SCALE)); i++) {
              const xPos = i * (CM_TO_PX * MODAL_SCALE);
              if (xPos > tapeX) break;
              ticks.push(
                <g key={i} transform={`translate(${xPos}, 0)`}>
                  <line x1="0" y1="0" x2="0" y2={i % 5 === 0 ? 15 : 8} stroke="black" strokeWidth="2" />
                  {i > 0 && i % 5 === 0 && <text x="0" y="30" textAnchor="middle" fontSize="14" fontWeight="bold" fill="black">{i}</text>}
                </g>
              );
            }

            const matStyle = MATERIAL_STYLES[type];
            const matLabel = RAW_MATERIALS.find(m => m.type === type).label;

            return (
               <div className="fixed inset-0 bg-stone-900/95 backdrop-blur-sm z-50 flex items-center justify-center p-4 touch-none select-none text-stone-100">
                  <div className="w-full max-w-5xl h-[520px] relative bg-stone-950 p-6 rounded-[36px] border-8 border-amber-900 shadow-2xl">
                     
                     {/* Close Button */}
                     <button onClick={onClose} className="absolute top-4 right-4 bg-stone-700 text-white p-3 rounded-full hover:bg-red-500 transition-colors z-50">
                       <X size={24} />
                     </button>

                     {/* Header */}
                     <div className="text-center mb-8 animate-pop-in">
                        <h2 className="text-4xl font-black text-white mb-1 uppercase tracking-widest drop-shadow">FABRICATION STATION: {matLabel}</h2>
                        {step === 0 && <p className="text-xl text-yellow-400 font-bold">Step 1: Pull tape measure to the required length.</p>}
                        {step === 1 && (
                            <p className="text-xl text-amber-400 font-bold animate-pulse">
                                {fabMessage ? fabMessage : "Step 2: Drag the pencil down to draw a clear cut line!"}
                            </p>
                        )}
                        {step === 2 && !hasCut && <p className="text-xl text-red-500 font-bold animate-pulse">Step 3: Drag your material UP through the saw!</p>}
                        {step === 2 && hasCut && <p className="text-xl text-green-400 font-bold animate-bounce">Cut successful!</p>}
                     </div>

                     {/* Work Area */}
                     <div className="w-full h-64 relative bg-stone-800 rounded-3xl overflow-hidden border-8 border-stone-700 shadow-inner"
                          ref={measureRef}
                     >
                         {/* Common Background Grid (Measurement Ruler Bench) */}
                         <div className="absolute inset-0 opacity-10 pointer-events-none" style={{backgroundImage: 'radial-gradient(#fff 2px, transparent 2px)', backgroundSize: '30px 30px'}}></div>

                         {/* SVG Workspace */}
                         <svg 
                              ref={workspaceSvgRef}
                              className="w-full h-full overflow-visible" 
                              style={{ cursor: step === 1 ? 'none' : 'default' }}
                              onPointerMove={handleWorkspacePointerMove}
                              onPointerLeave={() => setIsHoveringWorkspace(false)}
                              onPointerEnter={() => setIsHoveringWorkspace(true)}
                         >
                            <defs>
                              <pattern id="wood-texture" patternUnits="userSpaceOnUse" width="100" height="100"><rect width="100" height="100" fill="#DEB887" /><path d="M0 10 Q 25 5 50 15 T 100 10 M0 30 Q 30 35 60 25 T 100 30 M0 50 Q 20 45 50 55 T 100 50 M0 70 Q 40 75 70 65 T 100 70 M0 90 Q 25 85 50 95 T 100 90" fill="none" stroke="#CD853F" strokeWidth="1" opacity="0.5"/></pattern>
                              <pattern id="chain-pattern" patternUnits="userSpaceOnUse" width="20" height="20">
                                <rect width="20" height="20" fill="#334155" />
                                <rect x="3" y="5" width="14" height="10" rx="5" fill="none" stroke="#0f172a" strokeWidth="2.5"/>
                                <rect x="4" y="6" width="12" height="8" rx="4" fill="none" stroke="#cbd5e1" strokeWidth="1"/>
                                <circle cx="10" cy="10" r="3" fill="#1e293b" stroke="#94a3b8" strokeWidth="1" />
                              </pattern>
                              <linearGradient id="pipe-grad" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#93c5fd" />
                                <stop offset="25%" stopColor="#f8fafc" />
                                <stop offset="50%" stopColor="#64748b" />
                                <stop offset="75%" stopColor="#475569" />
                                <stop offset="100%" stopColor="#1e293b" />
                              </linearGradient>
                              <linearGradient id="plastic-grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#fca5a5" /><stop offset="50%" stopColor="#ef4444" /><stop offset="100%" stopColor="#b91c1c" /></linearGradient>
                            </defs>

                            {/* --- STEP 2: Top-down Table Saw Bench --- */}
                            {step === 2 && (
                                <g>
                                    {/* Table Body */}
                                    <rect x="0" y="0" width="1000" height="256" fill="#292524" />
                                    {/* Silver Steel guide plate */}
                                    <rect x="250" y="0" width="300" height="256" fill="#44403c" />
                                    
                                    {/* Blade slot Track */}
                                    <line x1={SAW_X} y1="0" x2={SAW_X} y2="256" stroke="#0c0a09" strokeWidth="6" />
                                    
                                    {/* Safety Lines warning */}
                                    <line x1={SAW_X - 60} y1="0" x2={SAW_X - 60} y2="256" stroke="#eab308" strokeWidth="3" strokeDasharray="5 5" />
                                    <line x1={SAW_X + 60} y1="0" x2={SAW_X + 60} y2="256" stroke="#eab308" strokeWidth="3" strokeDasharray="5 5" />
                                </g>
                            )}

                            {/* --- The Material Group (Moves vertically in Step 2) --- */}
                            <g transform={`translate(${step === 2 ? (SAW_X - drawnX) : 50}, ${step === 2 ? materialY : 98})`}>
                                
                                {/* Left half (Keep / Cut Part) */}
                                <rect 
                                    x="0" y="0" width={drawnX} height="60" 
                                    fill={matStyle.fill} stroke={matStyle.stroke} strokeWidth="3" 
                                    className={step === 2 && !hasCut ? "cursor-ns-resize animate-pulse" : ""}
                                    onPointerDown={handleMaterialDown}
                                />
                                
                                {/* Right half (Falls away when cut) */}
                                <rect 
                                    x={drawnX} y="0" width={1000 - drawnX} height="60" 
                                    fill={matStyle.fill} stroke={matStyle.stroke} strokeWidth="3" 
                                    className={step === 2 && !hasCut ? "cursor-ns-resize" : ""}
                                    onPointerDown={handleMaterialDown}
                                    style={hasCut ? {
                                        transformOrigin: `${drawnX}px 30px`,
                                        transform: 'translate(50px, 160px) rotate(55deg)',
                                        opacity: 0,
                                        transition: 'transform 1.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 1.3s'
                                    } : {}}
                                />

                                {/* Zero line */}
                                <rect x="-2" y="-10" width="4" height="80" fill="#ef4444" />
                                
                                {/* Pencil Mark */}
                                {(step === 1 || step === 2) && markLine.length > 0 && (
                                    <line 
                                        x1={drawnX} y1={0} 
                                        x2={drawnX} y2={Math.min(60, Math.max(0, Math.max(...markLine) - 98))} 
                                        stroke={type === 'wood' ? '#1c1917' : '#ef4444'} 
                                        strokeWidth="5" strokeLinecap="round" 
                                    />
                                )}
                            </g>

                            {/* --- STEP 0 & 1: Tape Measure Overlay --- */}
                            {(step === 0 || step === 1) && (
                                <g transform="translate(50, 98)">
                                    {/* Hook */}
                                    <rect x="-10" y="0" width="10" height="60" fill="#cbd5e1" stroke="#475569" strokeWidth="2" rx="2" />
                                    
                                    {/* Extracted Tape */}
                                    <g transform="translate(0, 10)">
                                        <rect x="0" y="0" width={tapeX} height="40" fill="#fbbf24" stroke="#d97706" strokeWidth="2.5" />
                                        <svg width={tapeX} height="40">{ticks}</svg>
                                        <line x1="0" y1="20" x2={tapeX} y2="20" stroke="rgba(0,0,0,0.15)" strokeWidth="1.5" />
                                    </g>

                                    {/* Tape Body */}
                                    <g transform={`translate(${tapeX}, 0)`}>
                                        <rect x="0" y="-20" width="100" height="100" fill="#eab308" stroke="#ca8a04" strokeWidth="4" rx="20" />
                                        <circle cx="50" cy="30" r="30" fill="#1c1917" />
                                        <circle cx="50" cy="30" r="12" fill="#9ca3af" />
                                        {/* Drag Handle Overlay */}
                                        {step === 0 && (
                                            <rect x="0" y="-20" width="100" height="100" fill="white" opacity="0" pointerEvents="all"
                                                  className="cursor-ew-resize"
                                                  onPointerDown={(e) => { e.preventDefault(); setIsDraggingTape(true); }} 
                                            />
                                        )}
                                    </g>
                                </g>
                            )}

                            {/* --- STEP 1: Interactive Marking Layer --- */}
                            {step === 1 && (
                                <rect 
                                   x="0" y="0" width="100%" height="100%" 
                                   fill="transparent"
                                   className="cursor-none"
                                   onPointerDown={handleMarkDown}
                                   onPointerUp={handleMarkUp}
                                />
                            )}

                            {/* --- STEP 1: Pencil Overlay following mouse --- */}
                            {step === 1 && isHoveringWorkspace && (
                                <g transform={`translate(${cursor.x}, ${cursor.y}) rotate(-30)`} style={{ pointerEvents: 'none' }}>
                                   <path d="M -5 -55 A 5 5 0 0 1 5 -55 Z" fill="#f472b6" />
                                   <rect x="-5" y="-55" width="10" height="7" fill="#9ca3af" />
                                   <line x1="-5" y1="-51" x2="5" y2="-51" stroke="#4b5563" strokeWidth="1" />
                                   <rect x="-5" y="-48" width="10" height="38" fill="#eab308" />
                                   <rect x="-2" y="-48" width="4" height="38" fill="#facc15" />
                                   <polygon points="-5,-10 5,-10 0,0" fill="#ffedd5" />
                                   <polygon points="-1.5,-3 1.5,-3 0,0" fill="#1f2937" />
                                 </g>
                            )}

                            {/* --- STEP 2: Saw Blade Front Overlay (Circular top-down blade) --- */}
                            {step === 2 && (
                                <g>
                                    {/* Squashed circular saw to look 3D flat on table slot */}
                                    <g transform={`translate(${SAW_X}, ${SAW_Y}) scale(0.25, 1.2)`}>
                                        <g className="animate-spin-fast" style={{ transformOrigin: '0px 0px' }}>
                                             <circle r="45" fill="#9ca3af" stroke="#374151" strokeWidth="2" />
                                             {/* Circular Blur teeth indicators */}
                                             <circle r="43" fill="none" stroke="#4b5563" strokeWidth="3" strokeDasharray="8 4" />
                                             <circle r="38" fill="none" stroke="#1f2937" strokeWidth="1" strokeDasharray="12 8" />
                                             <circle r="12" fill="#4b5563" />
                                        </g>
                                    </g>
                                    {/* Metal blade guard tips */}
                                    <rect x={SAW_X - 4} y={SAW_Y - 58} width="8" height="12" fill="#78716c" rx="2" />
                                    <rect x={SAW_X - 4} y={SAW_Y + 46} width="8" height="12" fill="#78716c" rx="2" />
                                </g>
                            )}

                            {/* --- Spark Particles --- */}
                            {step === 2 && sparks.map(s => (
                                <circle key={s.id} cx={s.x} cy={s.y} r={s.size} fill={s.color} opacity={0.9} />
                            ))}
                         </svg>
                     </div>

                     {/* Controls Footer */}
                     <div className="mt-8 flex justify-center">
                         {step === 0 && (
                             <button 
                                onClick={() => { setDrawnX(tapeX); setStep(1); }}
                                className="bg-green-500 hover:bg-green-400 text-white px-8 py-4 rounded-2xl font-black text-2xl shadow-[0_8px_0_#166534] hover:translate-y-1 hover:shadow-[0_4px_0_#166534] active:translate-y-2 active:shadow-none transition-all"
                             >
                                LOCK LENGTH: {currentMeasurement}cm
                             </button>
                         )}
                     </div>

                  </div>
               </div>
            );
        }

        // --- Render App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
