<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Pulse</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap');

        :root {
            --color-correct: #00E5FF; /* Electric Teal */
            --color-present: #FF9100; /* Neon Orange */
            --color-absent: #1E2A38;  /* Dark Blue-Grey */
            --color-tile-border: #3A506B;
            --color-bg-start: #0B132B; /* Deep Space Blue */
            --color-bg-end: #1C2541;   
            --color-text: #FFFFFF;
            --color-key: #2a3b4c;
            --color-key-shadow: #111820;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--color-bg-start) 0%, var(--color-bg-end) 100%);
            background-attachment: fixed;
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* Cool Gradient Heading */
        h1 {
            margin: 10px 0 15px 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00E5FF, #FF9100);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(0, 229, 255, 0.2);
            font-weight: 800;
            text-align: center;
        }

        #message {
            height: 25px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #FFF;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 20px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }

        #message.show {
            opacity: 1;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 8px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 8px;
        }

        .tile {
            width: 55px;
            height: 55px;
            border: 2px solid var(--color-tile-border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            background-color: transparent;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.15s, background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .tile.filled {
            border-color: rgba(0, 229, 255, 0.5);
            transform: scale(1.05);
        }

        .tile.correct {
            background-color: var(--color-correct);
            border-color: var(--color-correct);
            color: #0B132B;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            transform: scale(1);
        }

        .tile.present {
            background-color: var(--color-present);
            border-color: var(--color-present);
            color: #0B132B;
            box-shadow: 0 0 20px rgba(255, 145, 0, 0.5);
            transform: scale(1);
        }

        .tile.absent {
            background-color: var(--color-absent);
            border-color: var(--color-absent);
            color: #5A7184;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.5);
            transform: scale(1);
        }

        #keyboard {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            gap: 8px;
        }

        .key-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        button {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            border: none;
            padding: 0;
            height: 55px;
            border-radius: 8px;
            cursor: pointer;
            background-color: var(--color-key);
            color: var(--color-text);
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            font-size: 1.2rem;
            box-shadow: 0 4px 0 var(--color-key-shadow);
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.3s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        button.wide {
            flex: 1.5;
            font-size: 1rem;
        }

        button.correct { 
            background-color: var(--color-correct); 
            color: #0B132B;
            box-shadow: 0 4px 0 #008fa3;
        }
        button.present { 
            background-color: var(--color-present); 
            color: #0B132B;
            box-shadow: 0 4px 0 #b36600;
        }
        button.absent { 
            background-color: var(--color-absent); 
            color: #5A7184;
            box-shadow: 0 4px 0 #0c1218;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent;
        }

        @media (max-width: 450px) {
            .tile { width: 45px; height: 45px; font-size: 1.8rem; }
            button { height: 45px; font-size: 1rem; border-radius: 6px; }
            #board { padding: 10px; grid-gap: 6px; }
            .row { grid-gap: 6px; }
            h1 { font-size: 2rem; margin-top: 5px; }
        }

        /* Simple Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <h1>WORD PULSE</h1>
    <div id="message"></div>
    <div id="board"></div>
    <div id="keyboard"></div>

    <script>
        // 100 Kid-friendly 5-letter words
        const WORDS = [
            "APPLE", "BEACH", "CHAIR", "DANCE", "EAGLE", "FROST", "GRAPE", "HOUSE", "IGLOO", "JUICE",
            "KNIFE", "LEMON", "MOUSE", "NIGHT", "OCEAN", "PIZZA", "QUEEN", "RIVER", "SNAKE", "TRAIN",
            "UNCLE", "VOICE", "WATER", "YACHT", "ZEBRA", "ALIEN", "BREAD", "CLOUD", "DREAM", "EARTH",
            "FLAME", "GHOST", "HEART", "INDEX", "JELLY", "KITES", "LIGHT", "MONEY", "NURSE", "ONION",
            "PLANT", "QUILT", "ROBOT", "SHEEP", "TIGER", "UNDER", "VIDEO", "WHEEL", "YOUTH", "ACORN",
            "BRUSH", "CANDY", "DRINK", "EIGHT", "FAIRY", "GOOSE", "HORSE", "JUMBO", "KOALA", "LUNCH",
            "MAGIC", "NOISE", "OVEN", "PAINT", "QUICK", "RADIO", "SMILE", "TOOTH", "UNITY", "VIRUS",
            "WATCH", "YOUNG", "ALARM", "BLOCK", "CLOCK", "DRUMS", "EMPTY", "FRUIT", "GIANT", "HONEY",
            "INPUT", "JEWEL", "KNEEL", "LAUGH", "MELON", "NINJA", "ORGAN", "PANDA", "QUIET", "ROUND",
            "SPOON", "TABLE", "UPSET", "VOCAL", "WORLD", "YEARS", "ANGLE", "BRAIN", "CRASH", "HAPPY"
        ];

        // Game State
        let secretWord = WORDS[Math.floor(Math.random() * WORDS.length)];
        let currentRow = 0;
        let currentTile = 0;
        let isGameOver = false;

        const board = document.getElementById("board");
        const keyboard = document.getElementById("keyboard");
        const messageDisplay = document.getElementById("message");

        const keys = [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
            ['ENTER', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', '⌫']
        ];

        // Initialize Board
        function initBoard() {
            for (let r = 0; r < 6; r++) {
                let row = document.createElement("div");
                row.classList.add("row");
                row.id = `row-${r}`;
                for (let c = 0; c < 5; c++) {
                    let tile = document.createElement("div");
                    tile.classList.add("tile");
                    tile.id = `tile-${r}-${c}`;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        // Initialize Keyboard
        function initKeyboard() {
            keys.forEach(row => {
                let rowDiv = document.createElement("div");
                rowDiv.classList.add("key-row");
                row.forEach(key => {
                    let button = document.createElement("button");
                    button.textContent = key;
                    button.id = `key-${key}`;
                    if (key === 'ENTER' || key === '⌫') {
                        button.classList.add("wide");
                    }
                    button.addEventListener("click", () => handleKeyPress(key));
                    rowDiv.appendChild(button);
                });
                keyboard.appendChild(rowDiv);
            });
        }

        let messageTimeout;
        function showMessage(msg) {
            messageDisplay.textContent = msg;
            messageDisplay.classList.add("show");
            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => { 
                if (!isGameOver) messageDisplay.classList.remove("show"); 
            }, 2500);
        }

        function handleKeyPress(key) {
            if (isGameOver) return;

            if (key === '⌫' || key === 'Backspace') {
                if (currentTile > 0) {
                    currentTile--;
                    let tile = document.getElementById(`tile-${currentRow}-${currentTile}`);
                    tile.textContent = '';
                    tile.classList.remove('filled');
                }
                return;
            }

            if (key === 'ENTER' || key === 'Enter') {
                if (currentTile < 5) {
                    showMessage("Not enough letters!");
                    return;
                }
                checkGuess();
                return;
            }

            if (currentTile < 5 && /^[A-Z]$/i.test(key) && key.length === 1) {
                let upperKey = key.toUpperCase();
                let tile = document.getElementById(`tile-${currentRow}-${currentTile}`);
                tile.textContent = upperKey;
                tile.classList.add('filled');
                
                // Pop animation reset
                tile.style.transform = 'scale(1.1)';
                setTimeout(() => { tile.style.transform = 'scale(1)'; }, 100);
                
                currentTile++;
            }
        }

        function checkGuess() {
            let guess = "";
            let rowTiles = [];
            for (let i = 0; i < 5; i++) {
                let tile = document.getElementById(`tile-${currentRow}-${i}`);
                guess += tile.textContent;
                rowTiles.push(tile);
            }

            let secretArray = secretWord.split("");
            let guessArray = guess.split("");
            let tileClasses = Array(5).fill("absent");

            // First pass: Perfect matches
            for (let i = 0; i < 5; i++) {
                if (guessArray[i] === secretArray[i]) {
                    tileClasses[i] = "correct";
                    secretArray[i] = null; 
                    guessArray[i] = null;
                }
            }

            // Second pass: Wrong position
            for (let i = 0; i < 5; i++) {
                if (guessArray[i] !== null && secretArray.includes(guessArray[i])) {
                    tileClasses[i] = "present";
                    secretArray[secretArray.indexOf(guessArray[i])] = null; 
                }
            }

            // Apply classes with a slight delay for cool cascade effect
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    rowTiles[i].classList.add(tileClasses[i]);
                    updateKeyboardColor(guess[i], tileClasses[i]);
                }, i * 200); // 200ms delay per tile
            }

            setTimeout(() => {
                if (guess === secretWord) {
                    showMessage("EPIC WIN!");
                    fireConfetti();
                    isGameOver = true;
                    return;
                }

                currentRow++;
                currentTile = 0;

                if (currentRow === 6) {
                    showMessage(`Game over! Word was ${secretWord}`);
                    isGameOver = true;
                }
            }, 5 * 200 + 100);
        }

        function updateKeyboardColor(letter, colorClass) {
            let keyBtn = document.getElementById(`key-${letter}`);
            if (!keyBtn) return;
            
            if (keyBtn.classList.contains("correct")) return;
            if (keyBtn.classList.contains("present") && colorClass === "absent") return;

            keyBtn.classList.remove("present", "absent", "correct");
            keyBtn.classList.add(colorClass);
        }

        // Listen for physical keyboard
        document.addEventListener("keydown", (e) => {
            // Ignore if modifier keys are pressed
            if (e.ctrlKey || e.altKey || e.metaKey) return;
            handleKeyPress(e.key);
        });

        // Basic Confetti logic for win
        function fireConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let particles = [];
            let colors = ['#00E5FF', '#FF9100', '#FFFFFF', '#5BC0BE'];
            
            for(let i=0; i<100; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2 + 100,
                    r: Math.random() * 6 + 2,
                    dx: Math.random() * 10 - 5,
                    dy: Math.random() * -10 - 5,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }

            function animate() {
                requestAnimationFrame(animate);
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    p.x += p.dx;
                    p.y += p.dy;
                    p.dy += 0.2; // gravity
                });
            }
            animate();
            setTimeout(() => { canvas.style.display = 'none'; }, 4000);
        }

        // Start
        initBoard();
        initKeyboard();
    </script>
</body>
</html>
