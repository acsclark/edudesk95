<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Pulse</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap');

        :root {
            --color-correct: #00E5FF;
            --color-present: #FF9100;
            --color-absent: #1E2A38;
            --color-tile-border: #3A506B;
            --color-bg-start: #0B132B;
            --color-bg-end: #1C2541;
            --color-text: #FFFFFF;
            --color-key: #2a3b4c;
            --color-key-shadow: #111820;
            --color-action: #E0245E;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--color-bg-start) 0%, var(--color-bg-end) 100%);
            background-attachment: fixed;
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* Top Bar for Classroom Timer */
        #top-bar {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 12px;
            box-sizing: border-box;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-btn {
            background-color: var(--color-action);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 15px;
            height: 35px;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 3px 0 #90163b;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 transparent;
        }

        #timer-display {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--color-correct);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
            font-variant-numeric: tabular-nums;
        }

        h1 {
            margin: 5px 0 15px 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00E5FF, #FF9100);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(0, 229, 255, 0.2);
            font-weight: 800;
            text-align: center;
        }

        #message {
            height: 25px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #FFF;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 20px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }

        #message.show { opacity: 1; }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 8px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .row { display: grid; grid-template-columns: repeat(5, 1fr); grid-gap: 8px; }

        .tile {
            width: 55px;
            height: 55px;
            border: 2px solid var(--color-tile-border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            background-color: transparent;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.15s, background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .tile.filled { border-color: rgba(0, 229, 255, 0.5); transform: scale(1.05); }
        .tile.correct { background-color: var(--color-correct); border-color: var(--color-correct); color: #0B132B; box-shadow: 0 0 20px rgba(0, 229, 255, 0.5); }
        .tile.present { background-color: var(--color-present); border-color: var(--color-present); color: #0B132B; box-shadow: 0 0 20px rgba(255, 145, 0, 0.5); }
        .tile.absent { background-color: var(--color-absent); border-color: var(--color-absent); color: #5A7184; box-shadow: inset 0 4px 6px rgba(0,0,0,0.5); }

        #keyboard { display: flex; flex-direction: column; width: 100%; max-width: 500px; gap: 8px; margin-bottom: 20px; }
        .key-row { display: flex; justify-content: center; gap: 6px; }

        .key-btn {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            border: none;
            padding: 0;
            height: 55px;
            border-radius: 8px;
            cursor: pointer;
            background-color: var(--color-key);
            color: var(--color-text);
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            font-size: 1.2rem;
            box-shadow: 0 4px 0 var(--color-key-shadow);
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.3s;
            user-select: none;
        }

        .key-btn.wide { flex: 1.5; font-size: 1rem; }
        .key-btn.correct { background-color: var(--color-correct); color: #0B132B; }
        .key-btn.present { background-color: var(--color-present); color: #0B132B; }
        .key-btn.absent { background-color: var(--color-absent); color: #5A7184; }

        .key-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }

        #play-again-btn { display: none; width: 100%; max-width: 300px; height: 50px; font-size: 1.2rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <button class="action-btn" onclick="startTimer()">START TIMER</button>
        <div id="timer-display">30s</div>
    </div>

    <h1>WORD PULSE</h1>
    <div id="message"></div>
    <div id="board"></div>
    <div id="keyboard"></div>
    
    <button id="play-again-btn" class="action-btn" onclick="resetGame()">PLAY AGAIN</button>

    <script>
        // --- Timer Logic ---
        let timerInterval;
        let timeLeft = 30;

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 30;
            updateTimerDisplay(timeLeft);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay(timeLeft);
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        function updateTimerDisplay(secs) {
            document.getElementById('timer-display').textContent = secs + "s";
        }

        // --- Game Logic ---
        const WORDS = ["APPLE", "BEACH", "CHAIR", "DANCE", "EAGLE", "FROST", "GRAPE", "HOUSE", "IGLOO", "JUICE"];
        let secretWord = WORDS[Math.floor(Math.random() * WORDS.length)];
        let currentRow = 0;
        let currentTile = 0;
        let isGameOver = false;

        const board = document.getElementById("board");
        const keyboard = document.getElementById("keyboard");
        const messageDisplay = document.getElementById("message");
        const playAgainBtn = document.getElementById("play-again-btn");

        const keys = [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
            ['ENTER', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', '⌫']
        ];

        function initBoard() {
            board.innerHTML = "";
            for (let r = 0; r < 6; r++) {
                let row = document.createElement("div"); row.classList.add("row");
                for (let c = 0; c < 5; c++) {
                    let tile = document.createElement("div"); tile.classList.add("tile"); tile.id = `tile-${r}-${c}`;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        function initKeyboard() {
            keyboard.innerHTML = "";
            keys.forEach(row => {
                let rowDiv = document.createElement("div"); rowDiv.classList.add("key-row");
                row.forEach(key => {
                    let button = document.createElement("button");
                    button.textContent = key; button.id = `key-${key}`; button.classList.add("key-btn");
                    if (key === 'ENTER' || key === '⌫') button.classList.add("wide");
                    button.addEventListener("click", () => handleKeyPress(key));
                    rowDiv.appendChild(button);
                });
                keyboard.appendChild(rowDiv);
            });
        }

        function showMessage(msg) { messageDisplay.textContent = msg; messageDisplay.classList.add("show"); setTimeout(() => messageDisplay.classList.remove("show"), 2000); }

        function handleKeyPress(key) {
            if (isGameOver) return;
            if (key === '⌫') { if (currentTile > 0) { currentTile--; document.getElementById(`tile-${currentRow}-${currentTile}`).textContent = ''; } }
            else if (key === 'ENTER') { if (currentTile === 5) checkGuess(); }
            else if (currentTile < 5) { document.getElementById(`tile-${currentRow}-${currentTile}`).textContent = key; currentTile++; }
        }

        function checkGuess() {
            let guess = "";
            for (let i = 0; i < 5; i++) guess += document.getElementById(`tile-${currentRow}-${i}`).textContent;
            
            for (let i = 0; i < 5; i++) {
                let tile = document.getElementById(`tile-${currentRow}-${i}`);
                if (guess[i] === secretWord[i]) tile.classList.add("correct");
                else if (secretWord.includes(guess[i])) tile.classList.add("present");
                else tile.classList.add("absent");
            }
            if (guess === secretWord) { showMessage("YOU WIN!"); endGame(); }
            else { currentRow++; currentTile = 0; if (currentRow === 6) { showMessage("GAME OVER!"); endGame(); } }
        }

        function endGame() { isGameOver = true; playAgainBtn.style.display = 'block'; }
        function resetGame() {
            isGameOver = false; currentRow = 0; currentTile = 0;
            secretWord = WORDS[Math.floor(Math.random() * WORDS.length)];
            playAgainBtn.style.display = 'none';
            initBoard();
            initKeyboard();
        }

        initBoard(); initKeyboard();
    </script>
</body>
</html>
