<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Pulse</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap');

        :root {
            --color-correct: #00E5FF;
            --color-present: #FF9100;
            --color-absent: #1E2A38;
            --color-tile-border: #3A506B;
            --color-bg-start: #0B132B;
            --color-bg-end: #1C2541;
            --color-text: #FFFFFF;
            --color-key: #2a3b4c;
            --color-key-shadow: #111820;
            --color-action: #E0245E;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--color-bg-start) 0%, var(--color-bg-end) 100%);
            background-attachment: fixed;
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        #top-bar {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 12px;
            box-sizing: border-box;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-btn {
            background-color: var(--color-action);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 15px;
            height: 35px;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 3px 0 #90163b;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 transparent;
        }

        #timer-display {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--color-correct);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
            font-variant-numeric: tabular-nums;
        }

        h1 {
            margin: 5px 0 15px 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00E5FF, #FF9100);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(0, 229, 255, 0.2);
            font-weight: 800;
            text-align: center;
        }

        #message {
            height: 25px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #FFF;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 20px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }

        #message.show { opacity: 1; }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 8px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .row { display: grid; grid-template-columns: repeat(5, 1fr); grid-gap: 8px; }

        .tile {
            width: 55px;
            height: 55px;
            border: 2px solid var(--color-tile-border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            background-color: transparent;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.15s, background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .tile.filled { border-color: rgba(0, 229, 255, 0.5); transform: scale(1.05); }
        .tile.correct { background-color: var(--color-correct); border-color: var(--color-correct); color: #0B132B; box-shadow: 0 0 20px rgba(0, 229, 255, 0.5); }
        .tile.present { background-color: var(--color-present); border-color: var(--color-present); color: #0B132B; box-shadow: 0 0 20px rgba(255, 145, 0, 0.5); }
        .tile.absent { background-color: var(--color-absent); border-color: var(--color-absent); color: #5A7184; box-shadow: inset 0 4px 6px rgba(0,0,0,0.5); }

        #keyboard { display: flex; flex-direction: column; width: 100%; max-width: 500px; gap: 8px; margin-bottom: 20px; }
        .key-row { display: flex; justify-content: center; gap: 6px; }

        .key-btn {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            border: none;
            padding: 0;
            height: 55px;
            border-radius: 8px;
            cursor: pointer;
            background-color: var(--color-key);
            color: var(--color-text);
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            font-size: 1.2rem;
            box-shadow: 0 4px 0 var(--color-key-shadow);
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.3s;
            user-select: none;
        }

        .key-btn.wide { flex: 1.5; font-size: 1rem; }
        .key-btn.correct { background-color: var(--color-correct); color: #0B132B; }
        .key-btn.present { background-color: var(--color-present); color: #0B132B; }
        .key-btn.absent { background-color: var(--color-absent); color: #5A7184; }

        .key-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }

        #play-again-btn { display: none; width: 100%; max-width: 300px; height: 50px; font-size: 1.2rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <button class="action-btn" onclick="startTimer()">START TIMER</button>
        <div id="timer-display">30s</div>
    </div>

    <h1>WORD PULSE</h1>
    <div id="message"></div>
    <div id="board"></div>
    <div id="keyboard"></div>
    
    <button id="play-again-btn" class="action-btn" onclick="resetGame()">PLAY AGAIN</button>

    <script>
        // --- Timer Logic ---
        let timerInterval;
        let timeLeft = 30;

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 30;
            updateTimerDisplay(timeLeft);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay(timeLeft);
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        function updateTimerDisplay(secs) {
            document.getElementById('timer-display').textContent = secs + "s";
        }

        // --- Game Logic ---
        const WORDS = [
            "APPLE", "BEACH", "CHAIR", "DANCE", "EAGLE", "FROST", "GRAPE", "HOUSE", "IGLOO", "JUICE", "PAPER",
            "ABOUT", "ALERT", "ARGUE", "BAKER", "BLAME", "BLEND", "BRAVE", "BRICK", "BRING", "BROAD",
            "BROKE", "BROWN", "BUILD", "BUYER", "CATCH", "CAUSE", "CHAIN", "CHASE", "CHEAP", "CHECK",
            "CHIEF", "CHILD", "CHINA", "CLAIM", "CLASS", "CLEAN", "CLEAR", "CLOCK", "CLOSE", "COACH",
            "COAST", "COUNT", "COURT", "COVER", "CREAM", "CRIME", "CROSS", "CROWD", "CROWN", "CURVE",
            "CYCLE", "DAILY", "DEALT", "DEATH", "DELAY", "DEPTH", "DOING", "DOUBT", "DOZEN", "DRAFT",
            "DRAMA", "DRAWN", "DREAM", "DRESS", "DRILL", "DRINK", "DRIVE", "DYING", "EAGER", "EARLY",
            "EARTH", "EIGHT", "ELITE", "EMPTY", "ENEMY", "ENJOY", "ENTER", "ENTRY", "EQUAL", "ERROR",
            "EVENT", "EXACT", "EXIST", "EXTRA", "FAITH", "FALSE", "FAULT", "FIBER", "FIELD", "FIFTH",
            "FIFTY", "FIGHT", "FINAL", "FIRST", "FIXED", "FLASH", "FLEET", "FLOOR", "FLUID", "FOCUS",
            "FORCE", "FORTH", "FORTY", "FORUM", "FOUND", "FRAME", "FRANK", "FRAUD", "FRESH", "FRONT",
            "FRUIT", "FULLY", "FUNNY", "GIANT", "GIVEN", "GLASS", "GLOBE", "GOING", "GRACE", "GRAND",
            "GRANT", "GRASS", "GREAT", "GREEN", "GROSS", "GROUP", "GROWN", "GUARD", "GUESS", "GUEST",
            "GUIDE", "HAPPY", "HEART", "HEAVY", "HENCE", "HORSE", "HOTEL", "HUMAN", "IDEAL", "IMAGE",
            "INDEX", "INNER", "INPUT", "ISSUE", "JOINT", "JUDGE", "KNOWN", "LABEL", "LARGE", "LASER",
            // 100+ New Added Words below:
            "LEMON", "LOCAL", "LOGIC", "MAGIC", "MAJOR", "MAKER", "MARCH", "MATCH", "MAYOR", "MEANT",
            "METAL", "MINOR", "MODEL", "MONEY", "MONTH", "MORAL", "MOTOR", "MOUNT", "MOUSE", "MOUTH",
            "MOVIE", "MUSIC", "NEEDS", "NEVER", "NEWLY", "NIGHT", "NOISE", "NORTH", "NOTED", "NOVEL",
            "NURSE", "OCCUR", "OCEAN", "OFFER", "OFTEN", "ORDER", "OTHER", "OUGHT", "PAINT", "PANEL",
            "PARTY", "PEACE", "PHASE", "PHONE", "PIECE", "PILOT", "PITCH", "PLACE", "PLAIN", "PLANE",
            "PLANT", "PLATE", "POINT", "POUND", "POWER", "PRESS", "PRICE", "PRIDE", "PRIME", "PRINT",
            "PRIOR", "PRIZE", "PROOF", "PROUD", "PROVE", "QUEEN", "QUICK", "QUIET", "QUITE", "RADIO",
            "RAISE", "RANGE", "RAPID", "RATIO", "REACH", "READY", "REFER", "RIGHT", "RIVER", "ROBOT",
            "ROUGH", "ROUND", "ROUTE", "ROYAL", "RURAL", "SCALE", "SCENE", "SCORE", "SENSE", "SERVE",
            "SEVEN", "SHADE", "SHAKE", "SHALL", "SHAPE", "SHARE", "SHARP", "SHEET", "SHELF", "SHELL",
            "SHIFT", "SHIRT", "SHOCK", "SHOOT", "SHORT", "SHOWN", "SIGHT", "SINCE", "SKILL", "SLEEP",
            "SLICE", "SMALL", "SMART", "SMILE", "SMITH", "SMOKE", "SOLID", "SOLVE", "SORRY", "SOUND",
            "SOUTH", "SPACE", "SPARE", "SPEAK", "SPEED", "SPEND", "SPENT", "SPLIT", "SPOKE", "SPORT",
            "STAFF", "STAGE", "STAND", "START", "STATE", "STEAM", "STEEL", "STICK", "STILL", "STOCK",
            "STONE", "STOOD", "STORE", "STORM", "STORY", "STRIP", "STUCK", "STUDY", "STUFF", "STYLE",
            "SUGAR", "SUITE", "SUPER", "SWEET", "TABLE", "TASTE", "TAXES", "TEACH", "TEETH", "TEXAS",
            "THANK", "THEFT", "THEIR", "THEME", "THERE", "THESE", "THICK", "THING", "THINK", "THIRD",
            "THOSE", "THREE", "THREW", "THROW", "TIGHT", "TITLE", "TODAY", "TOPIC", "TOTAL", "TOUCH",
            "TOUGH", "TOWER", "TRACK", "TRADE", "TRAIN", "TREAT", "TREND", "TRIAL", "TRIED", "TRIES",
            "TRUCK", "TRULY", "TRUST", "TRUTH", "TWICE", "UNDER", "UNDUE", "UNION", "UNITY", "UNTIL",
            "UPPER", "UPSET", "URBAN", "USAGE", "USUAL", "VALID", "VALUE", "VIDEO", "VIRUS", "VISIT",
            "VITAL", "VOICE", "WATER", "WHERE", "WHICH", "WHILE", "WHITE", "WHOLE", "WHOSE", "WOMAN",
            "WOMEN", "WORLD", "WORRY", "WORSE", "WORST", "WORTH", "WOULD", "WOUND", "WRITE", "WRONG",
            "YIELD", "YOUNG", "YOUTH", "ZEBRA"
        ];
        
        let secretWord = WORDS[Math.floor(Math.random() * WORDS.length)];
        let currentRow = 0;
        let currentTile = 0;
        let isGameOver = false;

        const board = document.getElementById("board");
        const keyboard = document.getElementById("keyboard");
        const messageDisplay = document.getElementById("message");
        const playAgainBtn = document.getElementById("play-again-btn");

        const keys = [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
            ['ENTER', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', '⌫']
        ];

        function initBoard() {
            board.innerHTML = "";
            for (let r = 0; r < 6; r++) {
                let row = document.createElement("div"); row.classList.add("row");
                for (let c = 0; c < 5; c++) {
                    let tile = document.createElement("div"); tile.classList.add("tile"); tile.id = `tile-${r}-${c}`;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        function initKeyboard() {
            keyboard.innerHTML = "";
            keys.forEach(row => {
                let rowDiv = document.createElement("div"); rowDiv.classList.add("key-row");
                row.forEach(key => {
                    let button = document.createElement("button");
                    button.textContent = key; button.id = `key-${key}`; button.classList.add("key-btn");
                    if (key === 'ENTER' || key === '⌫') button.classList.add("wide");
                    button.addEventListener("click", () => handleKeyPress(key));
                    rowDiv.appendChild(button);
                });
                keyboard.appendChild(rowDiv);
            });
        }

        function showMessage(msg) { 
            messageDisplay.textContent = msg; 
            messageDisplay.classList.add("show"); 
            setTimeout(() => messageDisplay.classList.remove("show"), 2500); 
        }

        function handleKeyPress(key) {
            if (isGameOver) return;
            if (key === '⌫') { 
                if (currentTile > 0) { 
                    currentTile--; 
                    let tile = document.getElementById(`tile-${currentRow}-${currentTile}`);
                    tile.textContent = ''; 
                    tile.classList.remove('filled');
                } 
            }
            else if (key === 'ENTER') { 
                if (currentTile === 5) checkGuess(); 
                else showMessage("Not enough letters!");
            }
            else if (currentTile < 5) { 
                let tile = document.getElementById(`tile-${currentRow}-${currentTile}`);
                tile.textContent = key; 
                tile.classList.add('filled');
                currentTile++; 
            }
        }

        function checkGuess() {
            let guess = "";
            let rowTiles = [];
            for (let i = 0; i < 5; i++) {
                let tile = document.getElementById(`tile-${currentRow}-${i}`);
                guess += tile.textContent;
                rowTiles.push(tile);
            }

            let secretArray = secretWord.split("");
            let guessArray = guess.split("");
            let tileClasses = Array(5).fill("absent");

            // Pass 1: Find exact matches (correct/teal)
            for (let i = 0; i < 5; i++) {
                if (guessArray[i] === secretArray[i]) {
                    tileClasses[i] = "correct";
                    secretArray[i] = null; // Consume the letter in secret word
                    guessArray[i] = null;  // Prevent second pass from checking this
                }
            }

            // Pass 2: Find present matches (orange)
            for (let i = 0; i < 5; i++) {
                if (guessArray[i] !== null && secretArray.includes(guessArray[i])) {
                    tileClasses[i] = "present";
                    // Consume the letter so duplicate letters in guess aren't both marked orange
                    secretArray[secretArray.indexOf(guessArray[i])] = null; 
                }
            }

            // Apply classes to tiles and keyboard
            for (let i = 0; i < 5; i++) {
                rowTiles[i].classList.add(tileClasses[i]);
                updateKeyboardColor(guess[i], tileClasses[i]);
            }

            if (guess === secretWord) { 
                showMessage("YOU WIN!"); 
                endGame(); 
            } else { 
                currentRow++; 
                currentTile = 0; 
                if (currentRow === 6) { 
                    showMessage("GAME OVER! Word was " + secretWord); 
                    endGame(); 
                } 
            }
        }

        function updateKeyboardColor(letter, colorClass) {
            let keyBtn = document.getElementById(`key-${letter}`);
            if (!keyBtn) return;
            // Don't downgrade a correct key to present/absent
            if (keyBtn.classList.contains("correct")) return;
            // Don't downgrade a present key to absent
            if (keyBtn.classList.contains("present") && colorClass === "absent") return;
            
            keyBtn.classList.remove("present", "absent", "correct");
            keyBtn.classList.add(colorClass);
        }

        function endGame() { isGameOver = true; playAgainBtn.style.display = 'block'; }
        
        function resetGame() {
            isGameOver = false; currentRow = 0; currentTile = 0;
            secretWord = WORDS[Math.floor(Math.random() * WORDS.length)];
            playAgainBtn.style.display = 'none';
            initBoard();
            initKeyboard();
        }

        // --- Physical Keyboard Support ---
        document.addEventListener("keydown", (e) => {
            if (e.ctrlKey || e.altKey || e.metaKey) return;
            let key = e.key.toUpperCase();
            if (key === 'ENTER') handleKeyPress('ENTER');
            else if (key === 'BACKSPACE') handleKeyPress('⌫');
            else if (/^[A-Z]$/.test(key)) handleKeyPress(key);
        });

        initBoard(); initKeyboard();
    </script>
</body>
</html>
