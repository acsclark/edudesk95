<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Facts</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --t1: #2563eb; --t1-light: #dbeafe; --t1-mid: #93c5fd;
    --t2: #16a34a; --t2-light: #dcfce7; --t2-mid: #86efac;
    --t3: #ea580c; --t3-light: #ffedd5; --t3-mid: #fdba74;
    --t4: #7c3aed; --t4-light: #ede9fe; --t4-mid: #c4b5fd;
    --accent: #2563eb;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --radius: 16px;
    --timer-color: #2563eb;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 20px 16px 40px;
    color: var(--text);
  }

  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 24px;
    letter-spacing: -0.5px;
  }

  /* ── SETUP SCREEN ── */
  .setup-screen { max-width: 540px; margin: 0 auto; }

  .section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .term-tabs {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .term-btn {
    padding: 12px 28px;
    border-radius: 50px;
    border: 2.5px solid transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
  }

  .term-btn[data-term="1"] { background: var(--t1-light); color: var(--t1); border-color: var(--t1-mid); }
  .term-btn[data-term="2"] { background: var(--t2-light); color: var(--t2); border-color: var(--t2-mid); }
  .term-btn[data-term="3"] { background: var(--t3-light); color: var(--t3); border-color: var(--t3-mid); }
  .term-btn[data-term="4"] { background: var(--t4-light); color: var(--t4); border-color: var(--t4-mid); }

  .term-btn[data-term="1"].active, .term-btn[data-term="1"]:hover { background: var(--t1); color: #fff; }
  .term-btn[data-term="2"].active, .term-btn[data-term="2"]:hover { background: var(--t2); color: #fff; }
  .term-btn[data-term="3"].active, .term-btn[data-term="3"]:hover { background: var(--t3); color: #fff; }
  .term-btn[data-term="4"].active, .term-btn[data-term="4"]:hover { background: var(--t4); color: #fff; }

  .week-tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
    min-height: 44px;
  }

  .week-btn {
    padding: 9px 18px;
    border-radius: 50px;
    border: 2px solid var(--border);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    background: var(--card);
    color: var(--muted);
    transition: all 0.18s;
  }

  .week-btn:hover { border-color: #94a3b8; color: var(--text); }
  .week-btn.active { color: #fff; border-color: transparent; }

  .term-1 .week-btn.active { background: var(--t1); }
  .term-2 .week-btn.active { background: var(--t2); }
  .term-3 .week-btn.active { background: var(--t3); }
  .term-4 .week-btn.active { background: var(--t4); }

  .start-wrap {
    display: flex;
    justify-content: center;
    margin-top: 8px;
  }

  .start-btn {
    padding: 16px 52px;
    border-radius: 50px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 20px rgba(37,99,235,0.35);
    transition: all 0.2s;
    transform: scale(1);
  }

  .start-btn:hover:not(:disabled) {
    box-shadow: 0 6px 28px rgba(37,99,235,0.45);
    transform: scale(1.04);
  }

  .start-btn:disabled {
    background: #cbd5e1;
    color: #94a3b8;
    cursor: not-allowed;
    box-shadow: none;
  }

  .pick-prompt {
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    font-weight: 600;
    margin-top: 16px;
    min-height: 24px;
  }

  /* ── QUIZ SCREEN ── */
  .quiz-screen {
    max-width: 600px;
    margin: 0 auto;
    display: none;
  }

  .quiz-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
  }

  .quiz-meta {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
  }

  .quiz-meta strong {
    color: var(--text);
    font-size: 15px;
  }

  /* Timer */
  .timer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .timer-ring-wrap {
    position: relative;
    width: 72px;
    height: 72px;
  }

  .timer-ring-wrap svg {
    transform: rotate(-90deg);
  }

  .timer-track { fill: none; stroke: var(--border); stroke-width: 5; }
  .timer-progress {
    fill: none;
    stroke: var(--timer-color);
    stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 188.5;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }

  .timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 900;
    color: var(--text);
  }

  .timer-low .timer-progress { stroke: #ef4444; }
  .timer-low .timer-text { color: #ef4444; }

  /* Progress bar */
  .progress-bar-wrap {
    margin-bottom: 20px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .progress-bar-bg {
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  /* Question card */
  .q-stage {
    perspective: 1000px;
    margin-bottom: 24px;
  }

  .q-card-big {
    background: var(--card);
    border-radius: 24px;
    border: 2.5px solid var(--border);
    padding: 40px 32px 32px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-8px); }
    40%     { transform: translateX(8px); }
    60%     { transform: translateX(-6px); }
    80%     { transform: translateX(6px); }
  }

  .q-card-big.wrong-shake {
    animation: shake 0.35s ease;
    border-color: #fca5a5;
    background: #fff5f5;
  }

  .q-number {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .q-equation {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--text);
    margin-bottom: 28px;
  }

  .q-input-wrap {
    display: flex;
    justify-content: center;
    gap: 10px;
    align-items: center;
  }

  .q-answer-input {
    width: 120px;
    height: 56px;
    border: 2.5px solid var(--border);
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 26px;
    font-weight: 900;
    text-align: center;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .q-answer-input::-webkit-outer-spin-button,
  .q-answer-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .q-answer-input:focus { border-color: var(--accent); background: #fff; }

  .submit-btn {
    height: 56px;
    padding: 0 28px;
    border-radius: 14px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    transition: all 0.15s;
  }

  .submit-btn:hover { opacity: 0.9; transform: scale(1.02); }

  .feedback-msg {
    margin-top: 14px;
    font-size: 16px;
    font-weight: 800;
    min-height: 22px;
    color: transparent;
    transition: color 0.2s;
  }
  .feedback-msg.correct { color: #16a34a; }
  .feedback-msg.wrong   { color: #dc2626; }

  /* ── SUMMARY SCREEN ── */
  .summary-screen {
    max-width: 480px;
    margin: 0 auto;
    display: none;
    text-align: center;
  }

  .summary-emoji {
    font-size: 72px;
    line-height: 1;
    margin-bottom: 16px;
    animation: bounceIn 0.5s ease;
  }

  @keyframes bounceIn {
    0%   { transform: scale(0.5); opacity: 0; }
    70%  { transform: scale(1.1); }
    100% { transform: scale(1);   opacity: 1; }
  }

  .summary-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 8px;
  }

  .summary-sub {
    font-size: 15px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 32px;
  }

  .summary-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 32px;
  }

  .summary-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 20px 12px;
  }

  .summary-card .sc-num {
    font-size: 38px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 4px;
  }

  .summary-card .sc-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .summary-card.correct-card .sc-num { color: #16a34a; }
  .summary-card.wrong-card .sc-num   { color: #dc2626; }
  .summary-card.time-card .sc-num    { color: var(--accent); }
  .summary-card.pct-card .sc-num     { color: var(--text); }

  .score-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 16px 20px;
    margin-bottom: 12px;
    text-align: left;
  }

  .score-row .sr-icon { font-size: 22px; }
  .score-row .sr-text { font-size: 15px; font-weight: 700; color: var(--text); }
  .score-row .sr-val  { margin-left: auto; font-size: 17px; font-weight: 900; }
  .score-row.correct .sr-val { color: #16a34a; }
  .score-row.wrong   .sr-val { color: #dc2626; }

  .try-again-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 900;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px rgba(37,99,235,0.3);
    transition: all 0.2s;
    margin-bottom: 12px;
  }
  .try-again-btn:hover { opacity: 0.9; transform: scale(1.01); }

  .back-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 2px solid var(--border);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
  }
  .back-btn:hover { border-color: #94a3b8; color: var(--text); }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    .q-equation { font-size: 42px; }
    .summary-cards { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<h1>🧮 Basic Facts</h1>

<!-- ══ SETUP SCREEN ══ -->
<div class="setup-screen" id="setupScreen">
  <p class="section-label" style="text-align:center">Choose your term</p>
  <div class="term-tabs">
    <button class="term-btn" data-term="1" onclick="selectTerm(1)">Term 1</button>
    <button class="term-btn" data-term="2" onclick="selectTerm(2)">Term 2</button>
    <button class="term-btn" data-term="3" onclick="selectTerm(3)">Term 3</button>
    <button class="term-btn" data-term="4" onclick="selectTerm(4)">Term 4</button>
  </div>

  <p class="section-label" style="text-align:center" id="weekLabel">Choose your week</p>
  <div class="week-tabs" id="weekTabs"></div>

  <div class="start-wrap">
    <button class="start-btn" id="startBtn" onclick="startQuiz()" disabled>Start Quiz ▶</button>
  </div>
  <p class="pick-prompt" id="pickPrompt">Select a term to begin</p>
</div>

<!-- ══ QUIZ SCREEN ══ -->
<div class="quiz-screen" id="quizScreen">
  <div class="quiz-top">
    <div class="quiz-meta">
      <div id="quizTitle">Term 1 — Week 1</div>
    </div>
    <div class="timer-wrap">
      <div class="timer-ring-wrap" id="timerRingWrap">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="timer-track" cx="36" cy="36" r="30"/>
          <circle class="timer-progress" id="timerArc" cx="36" cy="36" r="30"/>
        </svg>
        <div class="timer-text" id="timerText">5:00</div>
      </div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-meta">
      <span id="progressLabel">Question 1 of 100</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="q-stage">
    <div class="q-card-big" id="qCard">
      <div class="q-number" id="qNumber">Question 1</div>
      <div class="q-equation" id="qEquation">3 + 4 = ?</div>
      <div class="q-input-wrap">
        <input class="q-answer-input" id="answerInput" type="number" placeholder="?" autocomplete="off" inputmode="numeric">
        <button class="submit-btn" onclick="submitAnswer()">Go →</button>
      </div>
      <div class="feedback-msg" id="feedbackMsg"></div>
    </div>
  </div>
</div>

<!-- ══ SUMMARY SCREEN ══ -->
<div class="summary-screen" id="summaryScreen">
  <div class="summary-emoji" id="summaryEmoji">🎉</div>
  <div class="summary-title" id="summaryTitle">Quiz Complete!</div>
  <div class="summary-sub" id="summarySub">Here's how you did</div>

  <div class="summary-cards">
    <div class="summary-card correct-card">
      <div class="sc-num" id="sumCorrect">0</div>
      <div class="sc-label">Correct</div>
    </div>
    <div class="summary-card wrong-card">
      <div class="sc-num" id="sumWrong">0</div>
      <div class="sc-label">Wrong</div>
    </div>
    <div class="summary-card pct-card">
      <div class="sc-num" id="sumPct">0%</div>
      <div class="sc-label">Score</div>
    </div>
    <div class="summary-card time-card" id="sumTimeCard">
      <div class="sc-num" id="sumTime">—</div>
      <div class="sc-label">Time taken</div>
    </div>
  </div>

  <button class="try-again-btn" onclick="tryAgain()">Try Again 🔁</button>
  <button class="back-btn" onclick="goSetup()">← Choose a different week</button>
</div>

function solveQ(q) {
  q = q.trim();
  let m;
  if ((m = q.match(/^(\d+)\+(\d+)$/))) return parseInt(m[1]) + parseInt(m[2]);
  if ((m = q.match(/^(\d+)-(\d+)$/)))  return parseInt(m[1]) - parseInt(m[2]);
  if ((m = q.match(/^(\d+)x(\d+)$/)))  return parseInt(m[1]) * parseInt(m[2]);
  if ((m = q.match(/^(\d+)÷(\d+)$/)))  return parseInt(m[1]) / parseInt(m[2]);
  return null;
}

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let currentTerm = null;
let currentWeek = null;
let questions = [];
let currentIndex = 0;
let correct = 0;
let wrong = 0;
let timerInterval = null;
let secondsLeft = 300; // 5 minutes
let startTime = null;

const TOTAL_SECONDS = 300;
const CIRCUMFERENCE = 2 * Math.PI * 30; // r=30

/* ════════════════════════════════════════
   SETUP
════════════════════════════════════════ */
function selectTerm(t) {
  currentTerm = t;
  currentWeek = null;
  document.querySelectorAll('.term-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.term-btn[data-term="${t}"]`).classList.add('active');
  document.getElementById('startBtn').disabled = true;
  document.getElementById('pickPrompt').textContent = 'Now select a week';
  renderWeeks();

  // update accent color
  const colors = {1:'#2563eb',2:'#16a34a',3:'#ea580c',4:'#7c3aed'};
  document.documentElement.style.setProperty('--accent', colors[t]);
}

function renderWeeks() {
  const wt = document.getElementById('weekTabs');
  wt.innerHTML = '';
  wt.className = `week-tabs term-${currentTerm}`;
  const weeks = Object.keys(data[currentTerm]).map(Number).sort((a,b)=>a-b);
  weeks.forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'week-btn';
    btn.textContent = `Week ${w}`;
    btn.onclick = () => selectWeek(w, btn);
    wt.appendChild(btn);
  });
}

function selectWeek(w, btn) {
  currentWeek = w;
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const count = data[currentTerm][w].length;
  document.getElementById('startBtn').disabled = false;
  document.getElementById('pickPrompt').textContent = `${count} questions — ready when you are!`;
}

/* ════════════════════════════════════════
   QUIZ
════════════════════════════════════════ */
function startQuiz() {
  questions = [...data[currentTerm][currentWeek]];
  currentIndex = 0;
  correct = 0;
  wrong = 0;
  secondsLeft = TOTAL_SECONDS;
  startTime = Date.now();

  // Update title
  document.getElementById('quizTitle').textContent = `Term ${currentTerm} — Week ${currentWeek}`;

  // Switch screens
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('summaryScreen').style.display = 'none';

  updateTimerDisplay();
  startTimer();
  showQuestion();
}

function showQuestion() {
  if (currentIndex >= questions.length) {
    endQuiz(false);
    return;
  }
  const q = questions[currentIndex];
  const total = questions.length;

  // Progress
  document.getElementById('progressLabel').textContent = `Question ${currentIndex + 1} of ${total}`;
  const pct = Math.round((currentIndex / total) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  // Question card
  document.getElementById('qNumber').textContent = `Question ${currentIndex + 1}`;
  document.getElementById('qEquation').textContent = formatQ(q);

  const inp = document.getElementById('answerInput');
  inp.value = '';
  inp.focus();

  document.getElementById('feedbackMsg').textContent = '';
  document.getElementById('feedbackMsg').className = 'feedback-msg';

  // Reset card state
  const card = document.getElementById('qCard');
  card.className = 'q-card-big';
}

function formatQ(q) {
  // Format nicely: "3 + 4 = ?"
  return q.replace(/x/g, '×').replace(/÷/g, '÷').replace(/([+\-×÷])/g, ' $1 ') + ' = ?';
}

function submitAnswer() {
  const inp = document.getElementById('answerInput');
  const val = inp.value.trim();
  if (val === '') return;

  const q = questions[currentIndex];
  const ans = solveQ(q);
  const userAns = parseFloat(val);
  const card = document.getElementById('qCard');
  const fb = document.getElementById('feedbackMsg');

  if (userAns === ans) {
    correct++;
    fb.textContent = '✓ Correct!';
    fb.className = 'feedback-msg correct';
    currentIndex++;
    setTimeout(showQuestion, 500);
  } else {
    wrong++;
    fb.textContent = `✗ The answer is ${ans}`;
    fb.className = 'feedback-msg wrong';
    card.className = 'q-card-big wrong-shake';
    currentIndex++;
    setTimeout(showQuestion, 900);
  }
}

// Allow Enter key to submit
document.getElementById('answerInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitAnswer();
});

/* ════════════════════════════════════════
   TIMER
════════════════════════════════════════ */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      endQuiz(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const mins = Math.floor(secondsLeft / 60);
  const secs = secondsLeft % 60;
  document.getElementById('timerText').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;

  const fraction = secondsLeft / TOTAL_SECONDS;
  const offset = CIRCUMFERENCE * (1 - fraction);
  document.getElementById('timerArc').style.strokeDashoffset = offset;

  const wrap = document.getElementById('timerRingWrap');
  if (secondsLeft <= 60) {
    wrap.classList.add('timer-low');
  } else {
    wrap.classList.remove('timer-low');
  }
}

/* ════════════════════════════════════════
   END
════════════════════════════════════════ */
function endQuiz(timedOut) {
  clearInterval(timerInterval);

  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const answered = correct + wrong;
  const total = questions.length;
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;

  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('summaryScreen').style.display = 'block';

  // Emoji & title
  let emoji, title, sub;
  if (timedOut) {
    emoji = pct >= 80 ? '⏱️' : '⏰';
    title = "Time's Up!";
    sub = `You answered ${answered} of ${total} questions`;
  } else {
    if (pct === 100) { emoji = '🏆'; title = 'Perfect Score!'; }
    else if (pct >= 80) { emoji = '🎉'; title = 'Great Work!'; }
    else if (pct >= 60) { emoji = '👍'; title = 'Good Effort!'; }
    else { emoji = '💪'; title = 'Keep Practising!'; }
    sub = `Answered all ${total} questions`;
  }

  document.getElementById('summaryEmoji').textContent = emoji;
  document.getElementById('summaryTitle').textContent = title;
  document.getElementById('summarySub').textContent = sub;
  document.getElementById('sumCorrect').textContent = correct;
  document.getElementById('sumWrong').textContent = wrong;
  document.getElementById('sumPct').textContent = pct + '%';

  if (!timedOut) {
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('sumTime').textContent = m > 0 ? `${m}m ${s}s` : `${s}s`;
  } else {
    document.getElementById('sumTime').textContent = '5:00';
  }
}

function tryAgain() {
  startQuiz();
}

function goSetup() {
  document.getElementById('summaryScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'block';
}
</script>
