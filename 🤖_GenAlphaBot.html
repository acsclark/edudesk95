<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen AlphaBot Learning Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255,220,230,0.6) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(200,230,255,0.5) 0%, transparent 50%),
                linear-gradient(170deg, #f0e4e8 0%, #e8dce4 30%, #dce8f0 70%, #f0ebe4 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center; cursor: none;
        }

        #custom-cursor {
            position: fixed; width: 108px; height: 108px; pointer-events: none; z-index: 9999;
            filter: drop-shadow(0 0 10px rgba(168, 230, 255, 0.5));
            transform: translate(0, 0);
        }

        #custom-cursor.bouncy {
            animation: cursor-bounce 0.6s infinite ease-in-out;
        }

        @keyframes cursor-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .cursor-arrow { stroke: #0d1117; stroke-width: 2; fill: #a8e6ff; }
        #botCanvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; }

        .overlay {
            position: fixed; inset: 0; background: rgba(13, 17, 23, 0.4); backdrop-filter: blur(12px);
            display: flex; justify-content: center; align-items: center; z-index: 100;
            opacity: 0; pointer-events: none; transition: all 0.4s ease;
        }
        .overlay.active { opacity: 1; pointer-events: all; }

        .card {
            background: #0d1117; padding: 35px; border-radius: 32px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.4); width: 420px; text-align: center;
            color: #a8e6ff; border: 1px solid rgba(168, 230, 255, 0.2);
        }

        h2 { font-size: 1.5rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        p { color: rgba(168, 230, 255, 0.7); margin-bottom: 25px; line-height: 1.4; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .choice-btn {
            padding: 15px; background: rgba(168, 230, 255, 0.08); border: 1px solid rgba(168, 230, 255, 0.2);
            border-radius: 16px; color: #a8e6ff; font-weight: 700; cursor: none; transition: all 0.2s;
        }
        .choice-btn:hover { background: rgba(168, 230, 255, 0.2); transform: translateY(-2px); border-color: #a8e6ff; }

        .game-box {
            font-family: 'Courier New', Courier, monospace; font-size: 1.8rem;
            background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px;
            margin-bottom: 20px; min-height: 100px; display: flex; align-items: center; justify-content: center;
            border: 2px dashed rgba(168,230,255,0.2);
        }

        input {
            width: 100%; padding: 15px; background: #161b22; border: 1px solid rgba(168,230,255,0.2);
            border-radius: 12px; color: #fff; font-size: 1.1rem; outline: none; cursor: none; margin-bottom: 15px;
        }

        .feedback { font-weight: bold; margin-bottom: 15px; min-height: 24px; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .hidden { display: none !important; }
        .hint { position: absolute; bottom: 30px; color: rgba(0,0,0,0.2); font-weight: bold; pointer-events: none; z-index: 5; }

        .spinner {
            width: 30px; height: 30px; border: 3px solid rgba(168, 230, 255, 0.1);
            border-top-color: #a8e6ff; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="custom-cursor">
        <svg width="108" height="108" viewBox="0 0 24 24"><path class="cursor-arrow" d="M4.5,4.5 L20,11.5 L12.5,12.5 L11.5,20 L4.5,4.5 Z" /></svg>
    </div>

    <canvas id="botCanvas"></canvas>
    <div class="hint">CLICK MY CHEST SCREEN TO WAKE ME UP</div>

    <div class="overlay" id="mainOverlay">
        <!-- Main Menu -->
        <div class="card" id="menuCard">
            <h2>System Ready</h2>
            <p>Yo! I am Gen AlphaBot. What are we locking in on today?</p>
            <div class="btn-grid">
                <button class="choice-btn" onclick="showStep('spellingCard')">Spelling</button>
                <button class="choice-btn" onclick="startMathQuiz()">Math</button>
            </div>
            <button class="choice-btn" style="width:100%; margin-top:15px; background:transparent; border:none;" onclick="closeAll()">Go Back</button>
        </div>

        <!-- Spelling Mode -->
        <div class="card hidden" id="spellingCard">
            <h2>Spelling Bee</h2>
            <p>Drop a word for me to spell!</p>
            <input type="text" id="spellInput" placeholder="Enter word..." onkeydown="if(event.key === 'Enter') setupSpelling()">
            <button class="choice-btn" style="width:100%" onclick="setupSpelling()">Spell it, Gen AlphaBot!</button>
        </div>

        <!-- Math Quiz Mode -->
        <div class="card hidden" id="mathQuizCard">
            <h2 id="mathQuizTitle">Math Master</h2>
            <div class="game-box" style="flex-direction: column;">
                <span id="mathVisualContent"></span>
                <div id="mathAudioStatus" class="hidden" style="margin-top: 15px; font-size: 1rem; color: rgba(168, 230, 255, 0.7);">
                    <div class="spinner" style="width:16px; height:16px; border-width:2px; vertical-align: middle;"></div> 
                    <span style="vertical-align: middle; margin-left: 5px;">Speaking...</span>
                </div>
            </div>
            <input type="number" id="mathAnswerInput" placeholder="Your answer..." autocomplete="off" onkeydown="if(event.key === 'Enter') submitMathAnswer()">
            <div id="mathFeedback" class="feedback"></div>
            <button class="choice-btn" style="width:100%" onclick="submitMathAnswer()">Submit Answer</button>
            <button class="choice-btn" style="width:100%; margin-top:10px; background:transparent; border:none;" onclick="showStep('menuCard')">Exit Quiz</button>
        </div>

        <!-- Game Active -->
        <div class="card hidden" id="activeCard">
            <h2 id="modeTitle">Practice</h2>
            <div class="game-box">
                <div id="audioStatus" class="hidden"><div class="spinner"></div></div>
                <span id="visualContent"></span>
            </div>
            <p id="instructionText">Find the cap and fix it!</p>
            <div class="btn-grid">
                <button class="choice-btn" onclick="playAudio()">Listen Again</button>
                <button class="choice-btn" id="toggleVisBtn" onclick="toggleVisibility()">Show Visual</button>
            </div>
            <div class="btn-grid" style="margin-top:10px;">
                <input type="text" id="userInputWrong" placeholder="The Error" style="margin:0" autocomplete="off">
                <input type="text" id="userInputRight" placeholder="The Correct" style="margin:0" autocomplete="off" onkeydown="if(event.key === 'Enter') submitAnswer()">
            </div>
            <div id="gameFeedback" class="feedback"></div>
            <button class="choice-btn" style="width:100%" onclick="submitAnswer()">Fix Gen AlphaBot!</button>
        </div>
    </div>

    <script>
        const apiKey = ""; // API key populated by environment
        const canvas = document.getElementById('botCanvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('custom-cursor');
        const overlay = document.getElementById('mainOverlay');

        let width, height, time = 0;
        let mouseX = 0, mouseY = 0, targetMouseX = 0, targetMouseY = 0;
        let zoom = 1.6, targetZoom = 1.6, isZoomed = false, zoomOffY = 0, targetZoomOffY = 0;
        let tickleFactor = 0, targetTickle = 0;

        // Interaction Locks
        let isProcessingMath = false;
        let isProcessingSpelling = false;

        // Game State
        let currentMode = ""; // "spelling" or "math"
        let solution = { wrong: "", right: "", audio: "", word: "" };
        let mathQuestionCount = 0;
        let currentMathQ = { a: 0, b: 0, ans: 0, display: "", audio: "" };
        let availablePraises = [];

        const theme = { 
            base: '#e8a0a0', 
            dark: '#c87878', 
            screen: '#0d1117', 
            accent: '#a8e6ff',
            rosy: 'rgba(255, 120, 150, 0.4)' 
        };

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * devicePixelRatio; canvas.height = height * devicePixelRatio;
            ctx.scale(devicePixelRatio, devicePixelRatio);
            if(!isZoomed) targetZoom = width < 600 ? 1.2 : 1.6;
        }
        window.onresize = resize; resize();

        document.onmousemove = (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            const dx = e.clientX - width/2;
            const dy = e.clientY - height/2;

            if(!isZoomed) {
                targetMouseX = dx / 50;
                targetMouseY = dy / 50;
                
                // Bouncy effect over chest screen
                if (Math.abs(dx) < 60 * zoom && Math.abs(dy - 30 * zoom) < 50 * zoom) {
                    cursor.classList.add('bouncy');
                } else {
                    cursor.classList.remove('bouncy');
                }

                // Tickle/Hover over face
                const headCenterY = -135 * zoom;
                if (Math.abs(dx) < 95 * zoom && Math.abs(dy - headCenterY) < 100 * zoom) {
                    targetTickle = 1;
                } else {
                    targetTickle = 0;
                }
            }
        };

        // --- Audio Context & TTS (Restored Cloud API for HTML Embed compatibility) ---
        let globalSpeakId = 0;
        let activeAudio = null;

        async function speak(text, statusId = 'audioStatus', contentId = 'visualContent') {
            const currentSpeakId = ++globalSpeakId;
            const statusEl = statusId ? document.getElementById(statusId) : null;
            const contentEl = contentId ? document.getElementById(contentId) : null;

            // Stop any currently playing audio so it doesn't overlap
            if (activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
                activeAudio = null;
            }

            if(statusEl) {
                statusEl.classList.remove('hidden');
                // Deep reset of the spinner HTML in case a previous error overwrote it
                statusEl.innerHTML = '<div class="spinner" style="width:16px; height:16px; border-width:2px; vertical-align: middle; display:inline-block;"></div><span style="vertical-align: middle; margin-left: 5px;">Speaking...</span>';
            }
            if(contentEl) contentEl.classList.add('hidden');
            
            const payload = {
                contents: [{ parts: [{ text }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                },
                model: "gemini-2.5-flash-preview-tts" 
            };

            const delays = [1000, 2000, 4000, 8000, 16000];
            let base64 = null;

            for (let i = 0; i < 5; i++) {
                if (globalSpeakId !== currentSpeakId) return; // Silent abort if a new speech was requested

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    
                    if (data.candidates?.[0]?.content?.parts?.[0]?.inlineData) {
                        base64 = data.candidates[0].content.parts[0].inlineData.data;
                        break;
                    } else if (data.error) {
                        throw new Error(data.error.message);
                    }
                } catch (e) {
                    if (i === 4) {
                        console.error("Audio API Error:", e);
                        if(statusEl && globalSpeakId === currentSpeakId) statusEl.innerHTML = "Audio Error";
                        return;
                    }
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }

            if (base64 && globalSpeakId === currentSpeakId) {
                try {
                    activeAudio = new Audio(URL.createObjectURL(pcmToWav(base64, 24000)));
                    activeAudio.onended = () => {
                        // Only hide the spinner if this is still the active speech request
                        if(statusEl && globalSpeakId === currentSpeakId) {
                            statusEl.classList.add('hidden');
                        }
                    };
                    await activeAudio.play();
                } catch(e) {
                    console.error("Playback error:", e);
                    if(statusEl && globalSpeakId === currentSpeakId) statusEl.innerHTML = "Audio Error";
                }
            } else if (globalSpeakId === currentSpeakId && statusEl) {
                statusEl.classList.add('hidden'); // Fallback cleanup
            }
        }

        function pcmToWav(b64, rate) {
            const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0)).buffer;
            const view = new DataView(new ArrayBuffer(44 + buf.byteLength));
            const s = (o, str) => { for(let i=0; i<str.length; i++) view.setUint8(o+i, str.charCodeAt(i)); };
            s(0, 'RIFF'); view.setUint32(4, 36 + buf.byteLength, true);
            s(8, 'WAVE'); s(12, 'fmt '); view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, rate, true); view.setUint32(28, rate*2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            s(36, 'data'); view.setUint32(40, buf.byteLength, true);
            new Uint8Array(view.buffer, 44).set(new Uint8Array(buf));
            return new Blob([view], { type: 'audio/wav' });
        }


        // --- Interaction Logic ---
        canvas.onclick = (e) => {
            if(isZoomed) return;
            const dx = e.clientX - width/2;
            const dy = e.clientY - height/2;
            
            // Chest Screen Check
            if(Math.abs(dx) < 60 * zoom && Math.abs(dy - 30 * zoom) < 50 * zoom) {
                isZoomed = true; targetZoom = 3.2; targetZoomOffY = -40;
                cursor.classList.remove('bouncy');
                targetTickle = 0; // Reset tickle when zooming
                overlay.classList.add('active');
                
                // Greeting (passing nulls so it doesn't mess with the game spinners)
                speak("Yo chat! I am Gen AlphaBot. Ready to lock in?", null, null);
            }
        };

        function showStep(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function closeAll() {
            overlay.classList.remove('active');
            isZoomed = false; targetZoom = width < 600 ? 1.2 : 1.6; targetZoomOffY = 0;
        }

        // --- Game Mechanics ---
        function setupSpelling() {
            const word = document.getElementById('spellInput').value.toLowerCase().trim();
            if(!word) return;
            currentMode = "spelling";
            let chars = word.split('');
            let idx = Math.floor(Math.random() * chars.length);
            let originalChar = chars[idx];
            let alphabet = "abcdefghijklmnopqrstuvwxyz";
            let wrongChar = alphabet[Math.floor(Math.random() * 26)];
            while(wrongChar === originalChar) wrongChar = alphabet[Math.floor(Math.random() * 26)];
            
            chars[idx] = wrongChar;
            solution = { 
                wrong: wrongChar, 
                right: originalChar, 
                word: word, 
                display: chars.join('-').toUpperCase(),
                audio: `Bet. The word is ${word}. I spell it: ${chars.join(', ')}.`
            };
            startPractice("Spelling Bee");
        }

        // --- Math Quiz Logic ---
        function startMathQuiz() {
            mathQuestionCount = 0;
            currentMode = "math";

            const allPraises = [
                "Big W!", 
                "You are literally goated!", 
                "Sigma behavior!", 
                "No cap, that's right!", 
                "You ate that up, no crumbs!", 
                "Common W!",
                "You cooked with that one!",
                "Valid answer, bet!",
                "High key genius!",
                "Main character energy right there!"
            ];
            // Shuffle the array so the 5 praises used in this round are guaranteed unique
            availablePraises = allPraises.sort(() => Math.random() - 0.5);

            showStep('mathQuizCard');
            nextMathQuestion();
        }

        function nextMathQuestion() {
            if (mathQuestionCount >= 5) {
                document.getElementById('mathVisualContent').innerText = "Quiz Complete!";
                speak("You ate that up, no crumbs! All five questions done, absolute sigma!", "mathAudioStatus", null);
                setTimeout(() => showStep('menuCard'), 3000);
                return;
            }
            
            mathQuestionCount++;
            let a = Math.floor(Math.random() * 11) + 2; // 2 to 12
            let b = Math.floor(Math.random() * 11) + 2; // 2 to 12
            currentMathQ = {
                a: a,
                b: b,
                ans: a * b,
                display: `${a} × ${b} = ?`,
                audio: `${a} times ${b}?`
            };

            document.getElementById('mathQuizTitle').innerText = `Math Master (${mathQuestionCount}/5)`;
            document.getElementById('mathVisualContent').innerText = currentMathQ.display;
            document.getElementById('mathVisualContent').classList.remove('hidden'); // Ensure text remains visible
            document.getElementById('mathFeedback').innerText = "";
            document.getElementById('mathAnswerInput').value = "";
            document.getElementById('mathAnswerInput').focus();

            playMathAudio();
        }

        function playMathAudio() { 
            // Passing `null` as the 3rd argument forces the text to remain visible
            speak(currentMathQ.audio, "mathAudioStatus", null); 
        }

        function submitMathAnswer() {
            if (isProcessingMath) return; // Prevent spamming 'Enter'
            
            const inputVal = document.getElementById('mathAnswerInput').value;
            if(inputVal === "") return;
            
            isProcessingMath = true;
            const input = parseInt(inputVal, 10);
            const feedback = document.getElementById('mathFeedback');

            if (input === currentMathQ.ans) {
                // Pull a unique phrase from the shuffled deck
                const randomPraise = availablePraises.pop() || "Correct!";

                feedback.innerText = randomPraise;
                feedback.className = "feedback success";
                speak(randomPraise, "mathAudioStatus", null);
                
                setTimeout(() => {
                    isProcessingMath = false;
                    nextMathQuestion();
                }, 2000);
            } else {
                feedback.innerText = "That's cap. Try again!";
                feedback.className = "feedback error";
                speak("Oof, that's cap. Try again, bro.", "mathAudioStatus", null);
                document.getElementById('mathAnswerInput').value = ""; // Clear input for the retry
                
                setTimeout(() => {
                    isProcessingMath = false; // Briefly unlock so they can retry
                }, 1000); 
            }
        }

        function startPractice(title) {
            document.getElementById('modeTitle').innerText = title;
            document.getElementById('visualContent').innerText = solution.display;
            document.getElementById('visualContent').classList.add('hidden');
            document.getElementById('toggleVisBtn').innerText = "Show Visual";
            document.getElementById('gameFeedback').innerText = "";
            document.getElementById('userInputWrong').value = "";
            document.getElementById('userInputRight').value = "";
            showStep('activeCard');
            playAudio();
        }

        function playAudio() { speak(solution.audio); }

        function toggleVisibility() {
            const vc = document.getElementById('visualContent');
            const btn = document.getElementById('toggleVisBtn');
            if(vc.classList.contains('hidden')) {
                vc.classList.remove('hidden'); btn.innerText = "Hide Visual";
            } else {
                vc.classList.add('hidden'); btn.innerText = "Show Visual";
            }
        }

        function submitAnswer() {
            if (isProcessingSpelling) return;

            const w = document.getElementById('userInputWrong').value.toLowerCase().trim();
            const r = document.getElementById('userInputRight').value.toLowerCase().trim();
            if(w === "" || r === "") return;

            isProcessingSpelling = true;
            const feedback = document.getElementById('gameFeedback');

            if(w === solution.wrong && r === solution.right) {
                feedback.innerText = "HUGE W! You cooked!";
                feedback.className = "feedback success";
                speak("Sheesh! Huge W, you literally cooked!");
                setTimeout(() => {
                    isProcessingSpelling = false;
                    showStep('menuCard');
                }, 2000);
            } else {
                feedback.innerText = "MAJOR L: Try again.";
                feedback.className = "feedback error";
                speak("Bruh, major L. That ain't it. Try again.");
                document.getElementById('userInputWrong').value = "";
                document.getElementById('userInputRight').value = "";
                
                setTimeout(() => {
                    isProcessingSpelling = false;
                }, 1000);
            }
        }

        // --- Render Loop ---
        function drawRoundRect(x, y, w, h, r) {
            ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
        }

        let blinkScaleY = 1;
        function blink() {
            blinkScaleY = 0.1;
            setTimeout(() => blinkScaleY = 1, 150);
            setTimeout(blink, Math.random() * 4000 + 2000);
        }
        blink();

        function render(timestamp) {
            time = timestamp || 0;
            ctx.clearRect(0, 0, width, height);
            
            mouseX += (targetMouseX - mouseX) * 0.1;
            mouseY += (targetMouseY - mouseY) * 0.1;
            zoom += (targetZoom - zoom) * 0.1;
            zoomOffY += (targetZoomOffY - zoomOffY) * 0.1;
            tickleFactor += (targetTickle - tickleFactor) * 0.15;

            ctx.save();
            ctx.translate(width/2, height/2 + zoomOffY);
            ctx.scale(zoom, zoom);

            // Breathing Animation 
            const breathe = Math.sin(time * 0.002) * -3;

            // Legs
            [-1, 1].forEach(side => {
                ctx.save();
                ctx.translate(side * 45, 140);
                ctx.fillStyle = theme.base;
                drawRoundRect(-30, -50, 60, 100, 25);
                ctx.restore();
            });

            // Body
            ctx.save();
            ctx.translate(0, breathe);
            ctx.fillStyle = theme.dark; drawRoundRect(-25, -50, 50, 30, 10); // Neck
            ctx.fillStyle = theme.base; drawRoundRect(-80, -35, 160, 145, 35); // Torso
            
            // Chest Screen
            ctx.fillStyle = theme.screen; drawRoundRect(-50, -10, 100, 80, 14);
            ctx.fillStyle = theme.accent; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
            ctx.fillText('GEN ALPHABOT', 0, 25);
            ctx.font = '6px monospace'; ctx.fillText(isZoomed ? 'LEARNING...' : 'SYSTEM IDLE', 0, 45);

            // Head (With Shake Jitter from Tickle)
            ctx.save();
            let jitterX = Math.sin(time * 0.05) * 3 * tickleFactor;
            let jitterY = Math.cos(time * 0.04) * 2 * tickleFactor;
            ctx.translate(mouseX * 8 + jitterX, -135 + mouseY * 5 + jitterY);
            
            ctx.fillStyle = theme.base; drawRoundRect(-95, -85, 190, 170, 40); // Head Base
            
            ctx.fillStyle = theme.screen; drawRoundRect(-75, -55, 150, 110, 20); // Face Screen
            
            // Rosy Cheeks (Moved to render *after* the face screen so they show up)
            if (tickleFactor > 0.01) {
                ctx.save(); ctx.globalAlpha = tickleFactor; ctx.fillStyle = theme.rosy;
                ctx.beginPath(); ctx.arc(-55, 30, 15, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(55, 30, 15, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            }
            
            // Eyes
            ctx.fillStyle = theme.accent;
            [-1, 1].forEach(side => {
                ctx.save(); ctx.translate(side * 35 + mouseX*2, mouseY*2);
                ctx.scale(1, blinkScaleY);
                
                if (tickleFactor > 0.5) {
                    // Squinting eyes when tickled
                    ctx.beginPath(); ctx.arc(0, 5, 14, Math.PI, 0, false);
                    ctx.lineWidth = 5; ctx.strokeStyle = theme.accent; ctx.stroke();
                } else {
                    // Normal eyes
                    ctx.beginPath(); ctx.ellipse(0, 0, 14, 18, 0, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            });
            ctx.restore();

            // Arms (With Tickle/Shy logic to cover eyes & jitter)
            [-1, 1].forEach(side => {
                ctx.save();
                ctx.translate(side * 105, 15);
                const armSway = Math.sin(time * 0.0015) * 0.05;
                const baseRot = side * 0.05 + armSway * side;
                const shyRot = side * -1.8;
                ctx.rotate(baseRot + (shyRot - baseRot) * tickleFactor);
                
                ctx.fillStyle = theme.dark; ctx.beginPath(); ctx.arc(-side * 5, 0, 25, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = theme.base;
                
                const armJitter = Math.sin(time * 0.1) * 3 * tickleFactor;
                const scoot = 30 * tickleFactor * -side;
                drawRoundRect(-20 + armJitter + scoot, 0, 40, 105, 20);
                ctx.restore();
            });

            ctx.restore(); ctx.restore();
            requestAnimationFrame(render);
        }
        requestAnimationFrame(render); // Start with timestamp injected
    </script>
</body>
</html>
