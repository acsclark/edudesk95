<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cyber-Duck Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@600&family=Share+Tech+Mono&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #020205;
            color: #0ff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
            overflow: hidden; /* Prevents scrollbars in the iframe */
        }

        /* The wrapper now uses transform scaling to fit any iframe */
        #game-wrapper {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #0ff;
            width: 950px; 
            background-color: #020205;
            transform-origin: center center;
        }

        #marquee {
            background: #050510;
            border-bottom: 3px solid #0ff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .stat-box {
            background: #000;
            border: 1px solid #0ff;
            padding: 10px;
            border-radius: 3px;
            text-align: center;
            min-width: 90px;
            z-index: 2;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .stat-label { font-size: 12px; color: #0ff; text-transform: uppercase; letter-spacing: 2px; }
        .stat-value { font-size: 24px; font-family: 'Orbitron', sans-serif; color: #fff; text-shadow: 0 0 8px #0ff; }

        #word-area { display: flex; flex-direction: column; align-items: center; z-index: 2; }

        #target-word-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            letter-spacing: 8px;
            color: #0f0;
            background: #000;
            padding: 5px 20px;
            border-radius: 3px;
            border: 1px solid #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            margin-bottom: 5px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 320px;
            text-shadow: 0 0 10px #0f0;
        }

        #tracker-bar {
            background: #050510;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 30px;
            border-bottom: 2px solid #0ff;
            height: 50px;
        }
        
        #stage-indicator { font-size: 18px; color: #0ff; font-family: 'Orbitron', sans-serif; }
        #spelled-tracker { font-size: 36px; letter-spacing: 8px; font-family: 'Orbitron', monospace; text-shadow: 0 0 10px #fff; }
        #modifier-tag { font-size: 14px; color: #000; background: #0ff; padding: 2px 10px; border-radius: 2px; font-weight: bold; box-shadow: 0 0 8px #0ff;}

        #booth {
            width: 100%;
            height: 500px;
            background:
                linear-gradient(transparent 48%, rgba(0, 255, 255, 0.15) 50%, transparent 52%),
                linear-gradient(90deg, transparent 48%, rgba(0, 255, 255, 0.15) 50%, transparent 52%);
            background-size: 50px 50px;
            background-color: #020205;
            position: relative;
            cursor: none;
            overflow: hidden;
        }

        .shelf {
            position: absolute; width: 100%; height: 15px; background: #000;
            border-top: 2px solid #0ff; border-bottom: 1px solid #005555;
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
        }
        #shelf-1 { top: 120px; }
        #shelf-2 { top: 280px; }
        #shelf-3 { top: 440px; }

        .duck {
            position: absolute; bottom: 10px; width: 95px; height: 95px; font-size: 85px;
            display: flex; justify-content: center; align-items: center; cursor: none;
            filter: drop-shadow(0 0 10px #0ff) hue-rotate(120deg) saturate(150%);
        }

        .duck-letter {
            position: absolute; background: #000; color: #0ff; border: 3px solid #0ff;
            border-radius: 50%; width: 65px; height: 65px; font-size: 38px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            top: 10px; left: 12px; font-family: 'Orbitron', sans-serif;
            box-shadow: inset 0 0 10px #0ff, 0 0 10px #0ff; pointer-events: none;
        }

        #crosshair {
            position: absolute; width: 50px; height: 50px; border: 2px solid #0ff; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.8); display: none;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #0ff; }
        #crosshair::before { top: 50%; left: -10px; right: -10px; height: 2px; transform: translateY(-50%); }
        #crosshair::after { left: 50%; top: -10px; bottom: -10px; width: 2px; transform: translateX(-50%); }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 5, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; text-align: center; padding: 20px; border: 1px solid #0ff;
        }
        .overlay h1 { font-family: 'Orbitron'; font-size: 50px; color: #0ff; margin-bottom: 30px; }
        
        .level-btn { 
            background: rgba(0, 255, 255, 0.1); color: #0ff; border: 1px solid #0ff; 
            padding: 15px 30px; font-family: 'Orbitron'; cursor: pointer; margin: 10px; 
            font-size: 18px; transition: 0.2s; 
        }
        .level-btn:hover { background: #0ff; color: #000; box-shadow: 0 0 15px #0ff; }
        
        .hidden { display: none !important; }
        #flash { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #0ff; opacity: 0; pointer-events: none; z-index: 50; transition: opacity 0.05s; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="marquee">
            <div class="stat-box"><div class="stat-label">Hits</div><div class="stat-value" id="hits-display">0</div></div>
            <div id="word-area">
                <div id="target-word-display">SYSTEM READY</div>
            </div>
            <div class="stat-box"><div class="stat-label">Mode</div><div class="stat-value" id="mode-display">--</div></div>
        </div>
        <div id="tracker-bar">
            <div id="stage-indicator">TARGET:</div>
            <div id="spelled-tracker">AWAITING INPUT</div>
            <div id="modifier-tag">STANDBY</div>
        </div>

        <div id="booth">
            <div class="shelf" id="shelf-1"></div>
            <div class="shelf" id="shelf-2"></div>
            <div class="shelf" id="shelf-3"></div>
            
            <div id="crosshair"></div>
            <div id="flash"></div>

            <div id="mode-screen" class="overlay">
                <h1>SELECT PROTOCOL</h1>
                <button class="level-btn" onclick="startSpelling()">SPELLING DRILL</button>
                <button class="level-btn" onclick="startMathChallenge()">MATH (X12) PROTOCOL</button>
            </div>
        </div>
    </div>

    <script>
        // --- Auto-Scaler for Iframes ---
        function resizeGame() {
            const wrapper = document.getElementById('game-wrapper');
            const targetWidth = 960; 
            const targetHeight = 650;
            
            // Calculate how much to shrink the game to fit the current window/iframe
            let scaleX = window.innerWidth / targetWidth;
            let scaleY = window.innerHeight / targetHeight;
            let scale = Math.min(scaleX, scaleY);
            
            // Only scale down, don't stretch it huge on big screens
            if (scale > 1) scale = 1;
            
            wrapper.style.transform = `scale(${scale})`;
        }
        
        window.addEventListener('resize', resizeGame);
        resizeGame(); // Call immediately on load

        // --- Game Logic ---
        let gameMode = "";
        let isPlaying = false;
        let isPausedForMessage = false;
        let ducks = [];
        let mathSolvedCount = 0;
        let currentMathAnswer = 0;
        let spellingTarget = "";
        let spellingCurrent = "";
        let lastTime = 0;
        let duckTimer = 0;
        let totalHits = 0;

        const words = ["CYBER", "NEON", "HACK", "GHOST", "NINJA", "SYSTEM", "GLITCH"];
        const booth = document.getElementById('booth');
        const crosshair = document.getElementById('crosshair');
        const flash = document.getElementById('flash');

        booth.addEventListener('mousemove', (e) => {
            if(!isPlaying || isPausedForMessage) return;
            crosshair.style.display = 'block';
            const rect = booth.getBoundingClientRect();
            crosshair.style.left = (e.clientX - rect.left) + 'px';
            crosshair.style.top = (e.clientY - rect.top) + 'px';
        });

        booth.addEventListener('mouseleave', () => { crosshair.style.display = 'none'; });

        function startSpelling() {
            gameMode = "SPELLING";
            document.getElementById('mode-display').innerText = "SPL";
            document.getElementById('modifier-tag').innerText = "ACTIVE";
            spellingTarget = words[Math.floor(Math.random() * words.length)];
            document.getElementById('target-word-display').innerText = spellingTarget;
            document.getElementById('target-word-display').style.color = "#0f0";
            spellingCurrent = "";
            document.getElementById('spelled-tracker').innerText = "_ ".repeat(spellingTarget.length).trim();
            startGame();
        }

        function startMathChallenge() {
            gameMode = "MATH";
            document.getElementById('mode-display').innerText = "MTH";
            document.getElementById('modifier-tag').innerText = "ACTIVE";
            document.getElementById('target-word-display').innerText = "SOLVE EQUATION";
            document.getElementById('target-word-display').style.color = "#0f0";
            mathSolvedCount = 0;
            nextMathQuestion();
            startGame();
        }

        function nextMathQuestion() {
            let a = Math.floor(Math.random() * 12) + 1;
            let b = Math.floor(Math.random() * 12) + 1;
            currentMathAnswer = a * b;
            document.getElementById('spelled-tracker').innerText = `${a} × ${b}`;
        }

        function startGame() {
            document.getElementById('mode-screen').classList.add('hidden');
            isPlaying = true;
            isPausedForMessage = false;
            totalHits = 0;
            document.getElementById('hits-display').innerText = totalHits;
            
            ducks.forEach(d => d.el.remove());
            ducks = [];
            
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function spawnDuck() {
            if (!isPlaying || isPausedForMessage) return;
            
            const duck = document.createElement('div');
            duck.className = 'duck';
            duck.innerHTML = '🦆';
            const badge = document.createElement('div');
            badge.className = 'duck-letter';

            let val = "";
            if (gameMode === "MATH") {
                val = (Math.random() < 0.3) ? currentMathAnswer : Math.floor(Math.random() * 144) + 1;
            } else {
                if (Math.random() < 0.4 && spellingCurrent.length < spellingTarget.length) {
                    val = spellingTarget[spellingCurrent.length];
                } else {
                    val = String.fromCharCode(65 + Math.floor(Math.random() * 26)); 
                }
            }
            
            badge.innerText = val;
            duck.appendChild(badge);
            
            let shelfNum = Math.floor(Math.random() * 3) + 1;
            document.getElementById('shelf-' + shelfNum).appendChild(duck);
            
            let speed = Math.random() * 2 + 1.5;
            duck.style.left = '-100px';
            ducks.push({ el: duck, x: -100, speed: speed, val: val.toString() });
        }

        function gameLoop(currentTime) {
            if (!isPlaying) return;
            
            let deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            if(!isPausedForMessage) {
                duckTimer += deltaTime;
                if (duckTimer > 800) {
                    spawnDuck();
                    duckTimer = 0;
                }

                for (let i = ducks.length - 1; i >= 0; i--) {
                    let d = ducks[i];
                    d.x += d.speed * (deltaTime / 16); 
                    d.el.style.left = d.x + 'px';
                    
                    if (d.x > 950) { 
                        d.el.remove(); 
                        ducks.splice(i, 1); 
                    }
                }
            }
            requestAnimationFrame(gameLoop);
        }

        // --- Custom Success Message (Bypasses Iframe Restrictions) ---
        function triggerSuccess(msg) {
            isPausedForMessage = true;
            crosshair.style.display = 'none';
            
            let display = document.getElementById('target-word-display');
            display.innerText = msg;
            display.style.color = "#ff00ff"; // Pink success flash
            
            setTimeout(() => {
                endGame();
            }, 2500); // Wait 2.5 seconds then return to menu
        }

        booth.onmousedown = (e) => {
            if (!isPlaying || isPausedForMessage) return;
            
            flash.style.opacity = 0.8;
            setTimeout(() => flash.style.opacity = 0, 50);

            let target = e.target.closest('.duck');
            if (target) {
                let dIndex = ducks.findIndex(item => item.el === target);
                if (dIndex > -1) {
                    let d = ducks[dIndex];
                    
                    if (gameMode === "MATH") {
                        if (d.val === currentMathAnswer.toString()) {
                            mathSolvedCount++;
                            totalHits++;
                            document.getElementById('hits-display').innerText = totalHits;
                            
                            if (mathSolvedCount >= 10) { 
                                triggerSuccess("STAGE CLEARED!");
                            } else {
                                nextMathQuestion();
                            }
                        }
                    } else if (gameMode === "SPELLING") {
                        if (d.val === spellingTarget[spellingCurrent.length]) {
                            spellingCurrent += d.val;
                            let displayStr = spellingCurrent.split('').join(' ') + ' ' + "_ ".repeat(spellingTarget.length - spellingCurrent.length).trim();
                            document.getElementById('spelled-tracker').innerText = displayStr;
                            totalHits++;
                            document.getElementById('hits-display').innerText = totalHits;

                            if (spellingCurrent === spellingTarget) {
                                triggerSuccess("WORD COMPLETE!");
                            }
                        }
                    }
                    
                    target.remove();
                    ducks.splice(dIndex, 1);
                }
            }
        };

        function endGame() {
            isPlaying = false;
            isPausedForMessage = false;
            document.getElementById('mode-screen').classList.remove('hidden');
            document.getElementById('target-word-display').innerText = "SYSTEM READY";
            document.getElementById('target-word-display').style.color = "#0f0";
            document.getElementById('spelled-tracker').innerText = "AWAITING INPUT";
            document.getElementById('modifier-tag').innerText = "STANDBY";
            crosshair.style.display = 'none';
            
            // Clean up remaining ducks
            ducks.forEach(d => d.el.remove());
            ducks = [];
        }
    </script>
</body>
</html>
