<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cyber-Duck Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@600&family=Share+Tech+Mono&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #020205;
            color: #0ff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        #game-wrapper {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #0ff;
        }

        #marquee {
            background: #050510;
            border-bottom: 3px solid #0ff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        #marquee::before, #marquee::after {
            content: '////////////////////////////////////////////////////////////////';
            position: absolute;
            color: #0ff;
            font-size: 14px;
            letter-spacing: 5px;
            opacity: 0.3;
            top: 5px;
            left: 15px;
            white-space: nowrap;
            overflow: hidden;
            width: 100%;
            font-family: 'Orbitron', sans-serif;
        }
        #marquee::after { top: auto; bottom: 5px; }

        .stat-box {
            background: #000;
            border: 1px solid #0ff;
            padding: 10px;
            border-radius: 3px;
            text-align: center;
            min-width: 90px;
            z-index: 2;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .stat-label { font-size: 12px; color: #0ff; text-transform: uppercase; letter-spacing: 2px; }
        .stat-value { font-size: 24px; font-family: 'Orbitron', sans-serif; color: #fff; text-shadow: 0 0 8px #0ff; }

        #word-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        #target-word-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            letter-spacing: 8px;
            color: #0f0;
            background: #000;
            padding: 5px 20px;
            border-radius: 3px;
            border: 1px solid #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            margin-bottom: 5px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 280px;
            text-shadow: 0 0 10px #0f0;
        }

        #reveal-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.1s;
        }

        #reveal-btn:active { background: #0ff; color: #000; }

        #tracker-bar {
            background: #050510;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 30px;
            border-bottom: 2px solid #0ff;
        }
        #stage-indicator { font-size: 18px; color: #0ff; font-family: 'Orbitron', sans-serif; }
        #spelled-tracker { font-size: 36px; letter-spacing: 12px; font-family: 'Orbitron', monospace; text-shadow: 0 0 10px #fff; }
        #modifier-tag { font-size: 14px; color: #000; background: #0ff; padding: 2px 10px; border-radius: 2px; font-weight: bold; box-shadow: 0 0 8px #0ff;}

        #booth {
            width: 950px;
            height: 550px;
            background:
                linear-gradient(transparent 48%, rgba(0, 255, 255, 0.15) 50%, transparent 52%),
                linear-gradient(90deg, transparent 48%, rgba(0, 255, 255, 0.15) 50%, transparent 52%);
            background-size: 50px 50px;
            background-color: #020205;
            position: relative;
            cursor: none;
            overflow: hidden;
        }

        .shelf {
            position: absolute;
            width: 100%;
            height: 15px;
            background: #000;
            border-top: 2px solid #0ff;
            border-bottom: 1px solid #005555;
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
        }
        #shelf-1 { top: 140px; }
        #shelf-2 { top: 300px; }
        #shelf-3 { top: 460px; }

        .duck {
            position: absolute;
            bottom: 10px;
            width: 95px;
            height: 95px;
            font-size: 85px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: none;
            filter: drop-shadow(0 0 10px #0ff) hue-rotate(120deg) saturate(150%);
        }
        .duck.decoy { filter: drop-shadow(0 0 15px #ff00ff) hue-rotate(240deg) saturate(300%) brightness(1.2); }

        .duck-letter {
            position: absolute;
            background: #000;
            color: #0ff;
            border: 2px solid #0ff;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            top: 25px;
            left: 15px;
            font-family: 'Share Tech Mono', monospace; 
            box-shadow: inset 0 0 5px #0ff;
            pointer-events: none;
        }
        .duck.decoy .duck-letter { color: #ff00ff; border-color: #ff00ff; box-shadow: inset 0 0 5px #ff00ff; }

        @keyframes letterSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotating .duck-letter { animation: letterSpin 1.5s linear infinite; }

        @keyframes fallOff { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(600px) rotate(180deg); opacity: 0; } }
        .falling { animation: fallOff 0.6s forwards; pointer-events: none; }

        #crosshair {
            position: absolute; width: 50px; height: 50px; border: 2px solid #0ff; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.8), inset 0 0 10px rgba(0, 255, 255, 0.4); display: none;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #0ff; }
        #crosshair::before { top: 50%; left: -10px; right: -10px; height: 2px; transform: translateY(-50%); }
        #crosshair::after { left: 50%; top: -10px; bottom: -10px; width: 2px; transform: translateX(-50%); }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 5, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; text-align: center; padding: 20px; border: 1px solid #0ff;
        }
        .overlay h1 { font-family: 'Orbitron'; font-size: 50px; color: #0ff; }
        .level-btn { background: rgba(0, 255, 255, 0.1); color: #0ff; border: 1px solid #0ff; padding: 12px 25px; font-family: 'Orbitron'; cursor: pointer; margin: 10px; }
        .level-btn:hover { background: #0ff; color: #000; }
        .hidden { display: none !important; }
        #flash { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #0ff; opacity: 0; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="marquee">
            <div class="stat-box"><div class="stat-label">Timer</div><div class="stat-value" id="timer-display">--</div></div>
            <div id="word-area">
                <div id="target-word-display">READY</div>
                <button id="reveal-btn">SCAN TARGET (-1 AMMO)</button>
            </div>
            <div class="stat-box"><div class="stat-label">Energy</div><div class="stat-value" id="ammo-display">--</div></div>
        </div>
        <div id="tracker-bar"><div id="stage-indicator">STAGE 1/5</div><div id="spelled-tracker">INITIALIZE</div><div id="modifier-tag">STANDBY</div></div>

        <div id="booth">
            <div class="shelf" id="shelf-1"></div><div class="shelf" id="shelf-2"></div><div class="shelf" id="shelf-3"></div>
            <div id="crosshair"></div><div id="flash"></div>

            <div id="mode-screen" class="overlay">
                <h1>SELECT PROTOCOL</h1>
                <button class="level-btn" onclick="openSpelling()">SPELLING DRILL</button>
                <button class="level-btn" onclick="startMathChallenge()">MATH (X12) PROTOCOL</button>
            </div>

            <div id="spelling-screen" class="overlay hidden">
                <h1>SPELLING SELECT</h1>
                <button class="level-btn" onclick="startSpelling(4)">YR 4</button>
                <button class="level-btn" onclick="startSpelling(5)">YR 5</button>
                <button class="level-btn" onclick="startSpelling(6)">YR 6</button>
            </div>
        </div>
    </div>

    <script>
        let gameMode = "SPELLING", currentWordIndex = 0, mathQuestionsSolved = 0, targetVal = "", currentProgress = 0, time = 45, ammo = 20, isPlaying = false, ducks = [];

        const targetDisplay = document.getElementById('target-word-display');
        const spelledDisplay = document.getElementById('spelled-tracker');
        const crosshair = document.getElementById('crosshair');

        booth.addEventListener('mousemove', (e) => {
            if(!isPlaying) return;
            crosshair.style.display = 'block';
            const rect = booth.getBoundingClientRect();
            crosshair.style.left = (e.clientX - rect.left) + 'px';
            crosshair.style.top = (e.clientY - rect.top) + 'px';
        });

        document.getElementById('reveal-btn').onclick = () => {
            if(ammo > 0) { ammo--; targetDisplay.innerText = targetVal; setTimeout(() => targetDisplay.innerText = "*****", 1000); updateUI(); }
        };

        function openSpelling() { document.getElementById('mode-screen').classList.add('hidden'); document.getElementById('spelling-screen').classList.remove('hidden'); }

        function startMathChallenge() {
            gameMode = "MATH";
            document.getElementById('mode-screen').classList.add('hidden');
            beginStage();
        }

        function startSpelling(yr) {
            document.getElementById('spelling-screen').classList.add('hidden');
            beginStage();
        }

        function beginStage() {
            isPlaying = true;
            mathQuestionsSolved = 0;
            currentProgress = 0;
            setupNextTask();
            setInterval(spawnDuck, 800);
        }

        function setupNextTask() {
            if(gameMode === "MATH") {
                let a = Math.floor(Math.random()*12)+1;
                let b = Math.floor(Math.random()*12)+1;
                targetVal = (a * b).toString();
                targetDisplay.innerText = "*****";
                spelledDisplay.innerText = `${a} × ${b}`;
            }
        }

        function spawnDuck() {
            if(!isPlaying) return;
            const duck = document.createElement('div');
            duck.className = 'duck';
            duck.innerHTML = '🦆';
            const badge = document.createElement('div');
            badge.className = 'duck-letter';
            
            // 30% chance for correct answer
            if(Math.random() < 0.3) {
                badge.innerText = targetVal;
            } else {
                badge.innerText = Math.floor(Math.random()*144)+1;
            }

            duck.appendChild(badge);
            document.getElementById('shelf-' + (Math.floor(Math.random()*3)+1)).appendChild(duck);
            
            let pos = -100;
            let speed = Math.random()*2+2;
            let move = setInterval(() => {
                pos += speed;
                duck.style.left = pos + 'px';
                if(pos > 950) { duck.remove(); clearInterval(move); }
            }, 20);

            duck.onclick = () => {
                if(badge.innerText === targetVal) {
                    if(gameMode === "MATH") {
                        mathQuestionsSolved++;
                        if(mathQuestionsSolved >= 10) {
                            alert("STAGE CLEARED!");
                            mathQuestionsSolved = 0;
                        }
                        setupNextTask();
                    }
                    duck.remove();
                    clearInterval(move);
                }
            };
        }

        function updateUI() {
            document.getElementById('timer-display').innerText = time;
            document.getElementById('ammo-display').innerText = ammo;
        }

    </script>
</body>
</html>
