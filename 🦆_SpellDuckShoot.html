<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cyber-Duck Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@600&family=Share+Tech+Mono&display=swap');

        /* Added 100vw and overflow: hidden to prevent iframe scrolling/black screen issues */
        body {
            margin: 0;
            padding: 0;
            background-color: #020205;
            color: #0ff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
            overflow: hidden; 
        }

        /* Added transform-origin for auto-scaling */
        #game-wrapper {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #0ff;
            width: 950px;
            transform-origin: center center;
            background-color: #020205;
        }

        /* Futuristic Header */
        #marquee {
            background: #050510;
            border-bottom: 3px solid #0ff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        #marquee::before, #marquee::after {
            content: '////////////////////////////////////////////////////////////////';
            position: absolute;
            color: #0ff;
            font-size: 14px;
            letter-spacing: 5px;
            opacity: 0.3;
            top: 5px;
            left: 15px;
            white-space: nowrap;
            overflow: hidden;
            width: 100%;
            font-family: 'Orbitron', sans-serif;
        }
        #marquee::after { top: auto; bottom: 5px; }

        .stat-box {
            background: #000;
            border: 1px solid #0ff;
            padding: 10px;
            border-radius: 3px;
            text-align: center;
            min-width: 90px;
            z-index: 2;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .stat-label { font-size: 12px; color: #0ff; text-transform: uppercase; letter-spacing: 2px; }
        .stat-value { font-size: 24px; font-family: 'Orbitron', sans-serif; color: #fff; text-shadow: 0 0 8px #0ff; }

        #word-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        #target-word-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            letter-spacing: 8px;
            color: #0f0;
            background: #000;
            padding: 5px 20px;
            border-radius: 3px;
            border: 1px solid #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            margin-bottom: 5px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 280px;
            text-shadow: 0 0 10px #0f0;
        }

        #reveal-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            z-index: 10;
        }

        #reveal-btn:active {
            background: #0ff;
            color: #000;
        }

        /* Spelled Word Tracker Bar */
        #tracker-bar {
            background: #050510;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 30px;
            border-bottom: 2px solid #0ff;
        }
        
        #stage-indicator { font-size: 18px; color: #0ff; font-family: 'Orbitron', sans-serif; display: flex; align-items: center; gap: 15px; }
        #spelled-tracker { font-size: 36px; letter-spacing: 12px; font-family: 'Orbitron', monospace; text-shadow: 0 0 10px #fff; }
        #modifier-tag { font-size: 14px; color: #000; background: #0ff; padding: 2px 10px; border-radius: 2px; font-weight: bold; box-shadow: 0 0 8px #0ff;}

        /* Exit Button */
        #exit-btn {
            background: rgba(255, 0, 85, 0.1); color: #ff0055; border: 1px solid #ff0055;
            padding: 3px 10px; font-family: 'Orbitron'; font-size: 12px; font-weight: bold;
            cursor: pointer; border-radius: 3px; transition: 0.2s;
        }
        #exit-btn:hover { background: #ff0055; color: #000; box-shadow: 0 0 10px #ff0055; }
        #exit-btn.hidden { display: none; }

        /* Cyberpunk Grid Background */
        #booth {
            width: 950px;
            height: 550px;
            background:
                linear-gradient(transparent 48%, rgba(0, 255, 255, 0.15) 50%, transparent 52%),
                linear-gradient(90deg, transparent 48%, rgba(0, 255, 255, 0.15) 50%, transparent 52%);
            background-size: 50px 50px;
            background-color: #020205;
