<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word of the Day — Writing Warm-up</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #faf8f3;
    --warm: #f5f0e8;
    --accent: #c8593a;
    --accent-light: #f2e8e4;
    --teal: #2a7c6f;
    --teal-light: #e0efed;
    --gold: #d4a843;
    --gold-light: #faf3e0;
    --muted: #7a7570;
    --border: #e0dbd2;
    --success: #2a7c6f;
    --success-light: #e0efed;
    --danger: #c8593a;
    --danger-light: #f2e8e4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  .app-header {
    background: var(--ink);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .app-title {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--paper);
    letter-spacing: 0.01em;
  }

  .app-subtitle {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    margin-top: 1px;
  }

  .timer-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.9rem;
    font-weight: 500;
    color: #fff;
    cursor: pointer;
    transition: background 0.2s;
  }

  .timer-pill:hover { background: rgba(255,255,255,0.2); }

  .timer-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold);
    animation: pulse 1.5s infinite;
  }

  .timer-dot.stopped { animation: none; background: var(--muted); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ── Main layout ── */
  .main {
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── Word hero ── */
  .word-hero {
    background: var(--ink);
    border-radius: 16px;
    padding: 2.5rem 2.5rem 2rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .word-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(200, 89, 58, 0.12);
  }

  .word-hero::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 30%;
    width: 250px; height: 250px;
    border-radius: 50%;
    background: rgba(42, 124, 111, 0.08);
  }

  .word-eyebrow {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .word-display {
    font-family: 'Fraunces', serif;
    font-size: clamp(2.8rem, 8vw, 4.5rem);
    font-weight: 700;
    color: var(--paper);
    line-height: 1;
    margin-bottom: 0.6rem;
    position: relative;
    z-index: 1;
  }

  .word-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .word-type-badge {
    font-size: 0.75rem;
    font-style: italic;
    color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 3px 12px;
  }

  .syllable-hint {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    font-family: 'Fraunces', serif;
    font-style: italic;
  }

  .new-word-btn {
    position: absolute;
    top: 1.5rem; right: 1.5rem;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    transition: all 0.2s;
    z-index: 2;
  }

  .new-word-btn:hover {
    background: rgba(255,255,255,0.18);
    color: #fff;
  }

  /* Progress strip */
  .step-progress {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .prog-dot {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.4s;
  }

  .prog-dot.active { background: var(--accent); }
  .prog-dot.done { background: var(--teal); }

  /* ── Step cards ── */
  .step-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.4rem 1.5rem;
    margin-bottom: 1rem;
    opacity: 0;
    transform: translateY(16px);
    animation: slideIn 0.4s forwards;
  }

  @keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .step-card:nth-child(1) { animation-delay: 0.05s; }
  .step-card:nth-child(2) { animation-delay: 0.12s; }
  .step-card:nth-child(3) { animation-delay: 0.19s; }
  .step-card:nth-child(4) { animation-delay: 0.26s; }
  .step-card:nth-child(5) { animation-delay: 0.33s; }

  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.9rem;
  }

  .step-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--warm);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    flex-shrink: 0;
  }

  .step-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .step-icon {
    margin-left: auto;
    font-size: 1.1rem;
  }

  .step-q {
    font-size: 0.95rem;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 0.8rem;
    font-weight: 400;
  }

  .step-q strong {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-style: italic;
    color: var(--accent);
  }

  textarea {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--warm);
    color: var(--ink);
    resize: vertical;
    line-height: 1.5;
    transition: border-color 0.2s;
    min-height: 64px;
  }

  textarea:focus {
    outline: none;
    border-color: var(--teal);
    background: #fff;
  }

  textarea::placeholder { color: #b0a99e; }

  /* Clue boxes */
  .clue-box {
    border-left: 3px solid var(--teal);
    background: var(--teal-light);
    border-radius: 0 8px 8px 0;
    padding: 0.8rem 1rem;
    margin-bottom: 0.6rem;
    font-size: 0.88rem;
    line-height: 1.55;
    color: var(--ink);
  }

  .clue-box strong {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--teal);
  }

  .clue-prompt {
    font-size: 0.78rem;
    color: var(--teal);
    margin-top: 0.3rem;
    font-weight: 500;
  }

  /* Quiz */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 0.6rem;
  }

  .opt-btn {
    background: var(--warm);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    transition: all 0.2s;
  }

  .opt-btn:hover:not(:disabled) { background: #fff; border-color: var(--teal); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { background: var(--success-light); border-color: var(--success); color: var(--success); font-weight: 500; }
  .opt-btn.wrong { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }

  .quiz-feedback {
    font-size: 0.82rem;
    min-height: 20px;
    padding: 0.3rem 0;
    font-weight: 500;
  }

  .quiz-feedback.good { color: var(--success); }
  .quiz-feedback.bad { color: var(--danger); }

  /* Reveal */
  .reveal-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }

  .reveal-btn:hover { background: var(--warm); color: var(--ink); }

  .reveal-panel {
    display: none;
    margin-top: 0.7rem;
    padding: 0.8rem 1rem;
    background: var(--gold-light);
    border: 1px solid #e8d9a0;
    border-radius: 8px;
    font-size: 0.88rem;
    line-height: 1.55;
    color: var(--ink);
  }

  .reveal-panel.open { display: block; animation: fadeIn 0.25s; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .reveal-panel strong {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: #8a6d1a;
  }

  /* Word family chips */
  .word-family {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 0.5rem;
  }

  .wf-chip {
    background: var(--teal-light);
    border: 1px solid #b0d8d2;
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 0.82rem;
    color: var(--teal);
    font-family: 'Fraunces', serif;
    font-style: italic;
  }

  /* Loading state */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(250,248,243,0.85);
    backdrop-filter: blur(3px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
  }

  .loading-overlay.show { display: flex; }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 1rem;
  }

  /* Error state */
  .error-box {
    background: var(--danger-light);
    border: 1px solid #e8c0b4;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-size: 0.88rem;
    color: var(--accent);
    margin-bottom: 1rem;
    display: none;
  }

  /* Responsive */
  @media (max-width: 500px) {
    .options-grid { grid-template-columns: 1fr; }
    .word-display { font-size: 2.5rem; }
    .main { padding: 1.25rem 1rem 3rem; }
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    padding: 0.6rem 1.2rem;
    border-radius: 999px;
    font-size: 0.82rem;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 300;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="app-title">Word of the Day</div>
    <div class="app-subtitle">Year 5 & 6 Writing Warm-up</div>
  </div>
  <div class="timer-pill" id="timerPill" onclick="toggleTimer()">
    <div class="timer-dot" id="timerDot"></div>
    <span id="timerDisplay">5:00</span>
  </div>
</header>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Finding today's word…</div>
</div>

<div class="toast" id="toast"></div>

<main class="main">

  <div class="error-box" id="errorBox">
    Couldn't fetch a word from the internet — using a word from our built-in list instead.
  </div>

  <div class="word-hero" id="wordHero">
    <div class="word-eyebrow">Today's word</div>
    <div class="word-display" id="wordDisplay">—</div>
    <div class="word-meta">
      <span class="word-type-badge" id="wordType">loading…</span>
      <span class="syllable-hint" id="syllableHint"></span>
    </div>
    <button class="new-word-btn" onclick="loadNewWord()">↻ New word</button>
  </div>

  <div class="step-progress" id="stepProgress">
    <div class="prog-dot" id="pd1"></div>
    <div class="prog-dot" id="pd2"></div>
    <div class="prog-dot" id="pd3"></div>
    <div class="prog-dot" id="pd4"></div>
    <div class="prog-dot" id="pd5"></div>
  </div>

  <div id="stepsContainer"></div>

</main>

<script>
// ── Fallback word bank (rich vocabulary for Y5/6) ──
const fallbackWords = [
  { word: "resilient", type: "adjective", syllables: "re·sil·i·ent",
    sentences: [
      { text: "After the earthquake, the resilient community rebuilt their homes and came back stronger than before.", hint: "What does the community do after something terrible?" },
      { text: "Even though Mia fell off her bike three times, she was so resilient — she just got back up and kept trying.", hint: "How does Mia react to falling?" }
    ],
    options: ["easily upset and gives up quickly", "able to recover quickly from tough times", "very loud and full of energy", "shy and quiet around others"],
    correctIndex: 1,
    definition: "Able to bounce back from difficulties — to recover quickly when things go wrong or get tough.",
    wordFamily: ["resilience", "resiliently"],
    connectionPrompt: "a person, character, or animal who is resilient"
  },
  { word: "baffled", type: "adjective / verb", syllables: "baf·fled",
    sentences: [
      { text: "The detective was completely baffled — she had searched everywhere but could not find a single clue.", hint: "What is the detective unable to do?" },
      { text: "The strange instructions baffled everyone in the class; nobody knew where to begin.", hint: "How did the instructions make people feel?" }
    ],
    options: ["excited and energised", "completely puzzled or confused", "angry and frustrated", "happy and satisfied"],
    correctIndex: 1,
    definition: "To be completely confused or puzzled by something you cannot understand or explain.",
    wordFamily: ["baffle", "baffling", "bafflement"],
    connectionPrompt: "a time when you felt baffled — what happened?"
  },
  { word: "immense", type: "adjective", syllables: "im·mense",
    sentences: [
      { text: "The explorer stood at the edge of the immense canyon, unable to see where it ended.", hint: "What does the canyon feel like?" },
      { text: "Winning the championship brought the team an immense amount of joy.", hint: "How much joy did they feel?" }
    ],
    options: ["tiny and delicate", "very old and ancient", "extremely large or great", "fast and powerful"],
    correctIndex: 2,
    definition: "Extremely large, great, or vast — too big to easily measure or imagine.",
    wordFamily: ["immensely", "immensity"],
    connectionPrompt: "something in your life that feels immense — a place, a feeling, a challenge"
  },
  { word: "reluctant", type: "adjective", syllables: "re·luc·tant",
    sentences: [
      { text: "Jake was reluctant to try the strange new food, pushing it nervously around his plate.", hint: "Does Jake want to eat the food?" },
      { text: "The reluctant hero didn't want to fight the dragon, but knew she had no choice.", hint: "How does the hero feel about their task?" }
    ],
    options: ["eager and enthusiastic", "unwilling or hesitant to do something", "quick to act without thinking", "kind and generous"],
    correctIndex: 1,
    definition: "Not wanting to do something — feeling unwilling or hesitant, often because you are nervous or unsure.",
    wordFamily: ["reluctantly", "reluctance"],
    connectionPrompt: "a character from a book or movie who is reluctant — what are they reluctant to do?"
  },
  { word: "vivid", type: "adjective", syllables: "viv·id",
    sentences: [
      { text: "She painted a vivid picture of the rainforest — every colour so bright it felt real.", hint: "What makes the painting special?" },
      { text: "The writer used vivid language to describe the storm so well that readers could hear the thunder.", hint: "What does vivid language do for the reader?" }
    ],
    options: ["dull and hard to see", "producing clear, bright, powerful images", "quiet and peaceful", "very old and faded"],
    correctIndex: 1,
    definition: "Producing clear, bright, and powerful images or descriptions — so strong they feel real.",
    wordFamily: ["vividly", "vividness"],
    connectionPrompt: "a vivid memory — something you remember with really clear detail"
  },
  { word: "precise", type: "adjective", syllables: "pre·cise",
    sentences: [
      { text: "The surgeon had to be precise — one wrong move could cause serious harm.", hint: "Why does precision matter here?" },
      { text: "Her precise instructions told us exactly where to dig — not two metres left or right, but exactly here.", hint: "What does precise tell us about the instructions?" }
    ],
    options: ["roughly correct, near enough", "exact and perfectly accurate", "very fast and efficient", "confusing and unclear"],
    correctIndex: 1,
    definition: "Exact, accurate, and careful — with no room for error or vagueness.",
    wordFamily: ["precisely", "precision", "imprecise"],
    connectionPrompt: "a job or skill that requires someone to be precise — why does it matter?"
  },
  { word: "surge", type: "noun / verb", syllables: "surge",
    sentences: [
      { text: "A surge of excitement rushed through the crowd as the team scored the winning goal.", hint: "What does the crowd feel — and how sudden is it?" },
      { text: "Flood waters surged through the valley, sweeping away everything in their path.", hint: "How does the water move?" }
    ],
    options: ["a slow, steady trickle", "a sudden, powerful rush or increase", "a quiet, calm feeling", "a long, slow journey"],
    correctIndex: 1,
    definition: "A sudden, powerful rush or rise — of water, feeling, energy, or people.",
    wordFamily: ["surging", "surged"],
    connectionPrompt: "a time you felt a surge of a strong emotion — what caused it?"
  },
  { word: "ominous", type: "adjective", syllables: "om·i·nous",
    sentences: [
      { text: "Dark, ominous clouds gathered on the horizon — the sailors knew a storm was coming.", hint: "What do the clouds suggest is about to happen?" },
      { text: "There was an ominous silence in the house; something didn't feel right.", hint: "Why is the silence described as ominous?" }
    ],
    options: ["bright and cheerful", "suggesting something bad is about to happen", "very beautiful and dramatic", "loud and alarming"],
    correctIndex: 1,
    definition: "Giving a warning sign that something bad or unpleasant is going to happen.",
    wordFamily: ["ominously"],
    connectionPrompt: "an ominous moment in a book or film — what made it feel threatening?"
  },
  { word: "adamant", type: "adjective", syllables: "ad·a·mant",
    sentences: [
      { text: "No matter how much we begged, Mum was adamant — we were not getting a puppy.", hint: "Will Mum change her mind?" },
      { text: "The witness was adamant she had seen the car speeding, and nothing could make her doubt herself.", hint: "How confident is the witness?" }
    ],
    options: ["unsure and easily persuaded", "refusing to change your mind — totally firm", "very kind and easy-going", "confused and uncertain"],
    correctIndex: 1,
    definition: "Refusing to change your mind or position — completely firm and determined.",
    wordFamily: ["adamantly"],
    connectionPrompt: "something you feel adamant about — something you'd never change your mind on"
  },
  { word: "illuminate", type: "verb", syllables: "il·lu·mi·nate",
    sentences: [
      { text: "Hundreds of lanterns illuminated the night sky, turning darkness into a warm golden glow.", hint: "What do the lanterns do to the dark?" },
      { text: "The teacher's explanation illuminated the tricky maths problem — suddenly, it all made sense.", hint: "What does illuminate mean here — is it about light?" }
    ],
    options: ["to make dark and mysterious", "to block or hide something", "to light up, or to make something clear and understandable", "to confuse or trick someone"],
    correctIndex: 2,
    definition: "To light something up — or to make something clear, easy to understand, or known.",
    wordFamily: ["illuminated", "illuminating", "illumination"],
    connectionPrompt: "a person, book, or experience that has illuminated something for you — helped you understand it"
  }
];

// ── App state ──
let currentWord = null;
let timerInterval = null;
let timerSeconds = 300;
let timerRunning = false;
let completedSteps = new Set();

// ── Timer ──
function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timerDot').classList.add('stopped');
  } else {
    timerRunning = true;
    document.getElementById('timerDot').classList.remove('stopped');
    timerInterval = setInterval(() => {
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('timerDisplay').textContent = "Done!";
        showToast("⏰ 5 minutes up! Wrap up your warm-up.");
        return;
      }
      timerSeconds--;
      let m = Math.floor(timerSeconds / 60);
      let s = timerSeconds % 60;
      document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 300;
  document.getElementById('timerDisplay').textContent = "5:00";
  document.getElementById('timerDot').classList.remove('stopped');
}

// ── Word fetching ──
async function fetchWordFromAPI() {
  // Use Datamuse API to get random "interesting" adjectives/verbs for Y5-6 level
  // We'll pick a category randomly and get a word
  const categories = [
    { rel: "rel_jja", word: "bright" },
    { rel: "rel_jja", word: "strong" },
    { rel: "rel_jja", word: "brave" },
    { rel: "rel_jja", word: "dangerous" },
    { rel: "rel_jja", word: "mysterious" },
  ];
  const pick = categories[Math.floor(Math.random() * categories.length)];
  
  // Fetch words related to our seed — filtered to reasonable length (6-12 chars)
  const url = `https://api.datamuse.com/words?${pick.rel}=${pick.word}&md=p&max=50`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error("API fail");
  const words = await resp.json();
  
  // Filter: 5-12 chars, has a part of speech tag, not in fallback list
  const fallbackWordsList = fallbackWords.map(w => w.word);
  const filtered = words.filter(w => {
    const l = w.word.length;
    return l >= 5 && l <= 12 
      && w.tags && w.tags.length > 0
      && !fallbackWordsList.includes(w.word)
      && /^[a-z]+$/.test(w.word);
  });
  
  if (filtered.length === 0) throw new Error("No good words");
  
  // Pick a random one
  const chosen = filtered[Math.floor(Math.random() * filtered.length)];
  
  // Determine type from tags
  let type = "word";
  if (chosen.tags) {
    if (chosen.tags.includes("adj")) type = "adjective";
    else if (chosen.tags.includes("v")) type = "verb";
    else if (chosen.tags.includes("n")) type = "noun";
    else if (chosen.tags.includes("adv")) type = "adverb";
  }
  
  return { word: chosen.word, type, fromAPI: true };
}

async function loadNewWord() {
  resetTimer();
  completedSteps.clear();
  updateProgress();
  
  document.getElementById('loadingOverlay').classList.add('show');
  document.getElementById('errorBox').style.display = 'none';
  
  let wordData = null;
  
  try {
    const apiResult = await fetchWordFromAPI();
    // Use API word + generate activities with Claude
    wordData = await buildWordDataWithClaude(apiResult.word, apiResult.type);
  } catch (e) {
    // Fall back to curated list
    document.getElementById('errorBox').style.display = 'block';
    const used = JSON.parse(localStorage.getItem('usedWords') || '[]');
    const available = fallbackWords.filter(w => !used.includes(w.word));
    const pool = available.length > 0 ? available : fallbackWords;
    wordData = pool[Math.floor(Math.random() * pool.length)];
    
    // Track used words
    const newUsed = [...used, wordData.word].slice(-20);
    localStorage.setItem('usedWords', JSON.stringify(newUsed));
  }
  
  currentWord = wordData;
  document.getElementById('loadingOverlay').classList.remove('show');
  renderWord(wordData);
}

async function buildWordDataWithClaude(word, type) {
  const prompt = `You are creating a vocabulary activity for New Zealand Year 5 and 6 students (ages 9-11).

The word is: "${word}" (${type})

Return ONLY a valid JSON object with this exact structure — no markdown, no explanation:
{
  "word": "${word}",
  "type": "${type}",
  "syllables": "syllable·break·down",
  "sentences": [
    { "text": "A sentence using ${word} with clear context clues, suitable for Year 5-6.", "hint": "A short question guiding students to find the clue (max 10 words)" },
    { "text": "A second different sentence with different context, suitable for Year 5-6.", "hint": "A short question guiding students to the clue (max 10 words)" }
  ],
  "options": ["wrong definition 1", "correct definition (plain language for age 9-11)", "wrong definition 2", "wrong definition 3"],
  "correctIndex": 1,
  "definition": "A clear, plain-English definition for age 9-11 students (2 sentences max).",
  "wordFamily": ["related word 1", "related word 2"],
  "connectionPrompt": "a person, character, or situation that relates to this word"
}

Rules:
- The correct definition must be at correctIndex (shuffle the position randomly, not always index 1)
- All 4 options must be plausible but only one correct
- Sentences must be engaging and age-appropriate
- Definition must use simple language a 10-year-old can understand
- Return ONLY the JSON object`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!response.ok) throw new Error("Claude API error");
  const data = await response.json();
  const text = data.content.map(c => c.text || "").join("");
  const clean = text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

// ── Render ──
function renderWord(w) {
  document.getElementById('wordDisplay').textContent = w.word;
  document.getElementById('wordType').textContent = w.type || "word";
  document.getElementById('syllableHint').textContent = w.syllables || "";
  
  // Animate hero
  const hero = document.getElementById('wordHero');
  hero.style.animation = 'none';
  hero.offsetHeight;
  hero.style.animation = '';
  
  renderSteps(w);
}

function renderSteps(w) {
  const container = document.getElementById('stepsContainer');
  container.innerHTML = '';
  
  // Step 1: Prediction
  container.appendChild(makeCard(1, "Your prediction", "💭",
    `Before we look at any clues — what do you think <strong>${w.word}</strong> might mean? Write your best guess below.`,
    `<textarea rows="2" placeholder="I think it means…" oninput="markStep(1)"></textarea>`
  ));

  // Step 2: Context clues
  const cluesHTML = w.sentences.map(s =>
    `<div class="clue-box">
      ${s.text.replace(new RegExp(`\\b${w.word}\\b`, 'i'), `<strong>${w.word}</strong>`)}
      <div class="clue-prompt">💡 ${s.hint}</div>
    </div>`
  ).join('') +
  `<textarea rows="2" placeholder="The clues that help me are…" oninput="markStep(2)"></textarea>`;
  
  container.appendChild(makeCard(2, "Context clues", "🔍",
    "Read these sentences carefully. What clues help you work out the meaning?",
    cluesHTML
  ));

  // Step 3: Quiz
  const shuffled = [...w.options];
  const correctAnswer = w.options[w.correctIndex];
  
  const optsHTML = `<div class="options-grid">
    ${shuffled.map((opt, i) =>
      `<button class="opt-btn" onclick="checkOpt(this,'${opt === correctAnswer}')">${opt}</button>`
    ).join('')}
  </div>
  <div class="quiz-feedback" id="quizFb"></div>
  <button class="reveal-btn" onclick="toggleReveal('defReveal', this)">Show me the definition ↓</button>
  <div class="reveal-panel" id="defReveal"><strong>${w.word}</strong> — ${w.definition}</div>`;
  
  container.appendChild(makeCard(3, "Quick quiz", "❓",
    "Which of these is closest to the meaning?",
    optsHTML
  ));

  // Step 4: Write a sentence
  container.appendChild(makeCard(4, "Use it!", "✏️",
    `Write your own sentence using <strong>${w.word}</strong>. Make it interesting — really paint a picture for your reader.`,
    `<textarea rows="3" placeholder="Write your sentence here…" oninput="markStep(4)"></textarea>`
  ));

  // Step 5: Word connections
  const familyChips = (w.wordFamily || []).map(fw =>
    `<span class="wf-chip">${fw}</span>`
  ).join('');

  const connHTML = `
    <textarea rows="2" placeholder="e.g. ${w.connectionPrompt || `a time you felt this way`}…" oninput="markStep(5)"></textarea>
    <button class="reveal-btn" onclick="toggleReveal('familyReveal', this)" style="margin-top:0.6rem">Show word family ↓</button>
    <div class="reveal-panel" id="familyReveal">
      <strong>Word family:</strong><div class="word-family">${familyChips}</div>
      <div style="margin-top:0.5rem;font-size:0.83rem;color:#6b5e2a">Using different forms of the word will make your writing more varied and powerful.</div>
    </div>`;
  
  container.appendChild(makeCard(5, "Word connections", "🔗",
    `Can you think of ${w.connectionPrompt || "someone or something that connects to this word"}? Write about it below.`,
    connHTML
  ));
}

function makeCard(num, label, icon, question, bodyHTML) {
  const div = document.createElement('div');
  div.className = 'step-card';
  div.id = `step${num}`;
  div.innerHTML = `
    <div class="step-header">
      <div class="step-num">${num}</div>
      <div class="step-label">${label}</div>
      <div class="step-icon">${icon}</div>
    </div>
    <div class="step-q">${question}</div>
    ${bodyHTML}`;
  return div;
}

function checkOpt(btn, isCorrect) {
  const grid = btn.closest('.options-grid');
  grid.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (b.onclick.toString().includes("'true'")) b.classList.add('correct');
  });
  if (isCorrect === 'false') btn.classList.add('wrong');
  
  const fb = document.getElementById('quizFb');
  if (isCorrect === 'true') {
    fb.textContent = "✓ Great thinking — that's exactly right!";
    fb.className = 'quiz-feedback good';
  } else {
    fb.textContent = "Not quite — look at the green option. Can you see why?";
    fb.className = 'quiz-feedback bad';
  }
  markStep(3);
}

function toggleReveal(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? 'Hide ↑' : btn.textContent.replace('Hide ↑', 'Show ↓');
}

function markStep(n) {
  completedSteps.add(n);
  updateProgress();
}

function updateProgress() {
  for (let i = 1; i <= 5; i++) {
    const dot = document.getElementById(`pd${i}`);
    if (!dot) continue;
    if (completedSteps.has(i)) dot.className = 'prog-dot done';
    else dot.className = 'prog-dot';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── Init ──
loadNewWord();
</script>
