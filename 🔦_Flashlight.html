<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Word Hunter</title>
    <style>
        /* Ultra-minimal CSS to avoid conflicts */
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; user-select: none; -webkit-user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(135deg, #1a1a2e, #16213e); overflow: hidden; cursor: crosshair; }
        
        /* Menus */
        #menu { position: absolute; top:0; left:0; width:100%; height:100%; background: #2c3e50; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; text-align: center; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; transition: transform 0.2s; }
        .btn:active { transform: scale(0.95); }
        .easy { background: #27ae60; }
        .med { background: #f39c12; }
        .hard { background: #c0392b; }
        .crazy { background: #8e44ad; }

        /* Game Elements */
        .word-box { position: absolute; padding: 10px 20px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 8px; color: rgba(255,255,255,0.6); font-weight: bold; font-size: 18px; cursor: pointer; transition: all 0.3s; }
        .word-box:hover { background: rgba(255,255,255,0.2); color: white; }
        .correct { color: #2ecc71 !important; text-shadow: 0 0 10px #2ecc71; border-color: #2ecc71; }
        .wrong { color: #e74c3c !important; animation: shake 0.4s; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* Flashlight & Effects */
        .flashlight { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; mix-blend-mode: multiply; background: radial-gradient(circle 140px at var(--x, 50%) var(--y, 50%), transparent 0%, rgba(0,0,0,0.95) 80%, black 100%); transition: opacity 0.1s; }
        .flickering { animation: flickerAnim 0.1s infinite; }
        @keyframes flickerAnim { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        .dot { position: absolute; width: 8px; height: 8px; background: red; border-radius: 50%; transform: translate(-50%, -50%); z-index: 11; box-shadow: 0 0 5px red; pointer-events: none; }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 8px; color: white; display: none; z-index: 20; font-size: 16px; }
        #battery { position: absolute; top: 20px; right: 20px; width: 100px; height: 20px; border: 2px solid white; border-radius: 4px; overflow: hidden; display: none; z-index: 20; }
        #battery-fill { height: 100%; width: 100%; background: lime; transition: width 0.2s; }
        
        #msg-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 30px; border-radius: 10px; text-align: center; color: white; display: none; z-index: 50; }
    </style>
</head>
<body>

<!-- MENU -->
<div id="menu">
    <h1 style="font-size: 40px; margin-bottom: 30px;">WORD HUNTER</h1>
    <button class="btn easy" onclick="startGame('easy')">Easy</button>
    <button class="btn med" onclick="startGame('medium')">Medium</button>
    <button class="btn hard" onclick="startGame('hard')">Hard</button>
    <button class="btn crazy" onclick="startGame('crazy')">Crazy</button>
</div>

<!-- GAME CONTAINER -->
<div id="game-container">
    <div id="words-area"></div>
    <div class="flashlight" id="flashlight"></div>
    <div class="dot" id="dot"></div>
    
    <div id="hud">
        <span id="score">Score: 0</span> | 
        <span id="found">Found: 0/5</span> | 
        <span id="hint">Find the word!</span>
    </div>
    
    <div id="battery"><div id="battery-fill"></div></div>
    
    <div id="msg-overlay">
        <h2 id="msg-title">You Win!</h2>
        <p id="msg-text">Final Score: 0</p>
        <button class="btn easy" onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
    // Data
    const words = {
        easy: [{t:"friends", w:["freinds","frinds"]}, {t:"because", w:["becuase","becasue"]}, {t:"said", w:["sed","sayed"]}, {t:"would", w:["woudl","woold"]}, {t:"could", w:["coudl","coolld"]}],
        medium: [{t:"beautiful", w:["beautifull","beatiful"]}, {t:"necessary", w:["neccessary","necesary"]}, {t:"separate", w:["seperate","seperat"]}, {t:"definitely", w:["definately","definitly"]}, {t:"receive", w:["recieve","receve"]}],
        hard: [{t:"accommodate", w:["acommodate","accomodate"]}, {t:"environment", w:["enviroment","environement"]}, {t:"maintenance", w:["maintainance","maintanance"]}, {t:"pronunciation", w:["pronounciation","pronuniciation"]}, {t:"calendar", w:["calender","callendar"]}],
        crazy: [{t:"conscience", w:["conciense","consience"]}, {t:"liaison", w:["liason","lisaison"]}, {t:"millennium", w:["milennium","millenium"]}, {t:"phenomenon", w:["phenomena","phenonmenon"]}, {t:"privilege", w:["priviledge","privilage"]}]
    };

    let state = { level: 'easy', found: 0, score: 0, time: 35, active: false, x: 50, y: 50, dead: false };
    let timerId = null;
    let flickerId = null;
    let shadowId = null;
    let currentTarget = "";

    const container = document.getElementById('game-container');
    const flashEl = document.getElementById('flashlight');
    const dotEl = document.getElementById('dot');
    const hud = document.getElementById('hud');
    const battery = document.getElementById('battery');
    const batteryFill = document.getElementById('battery-fill');
    const wordsArea = document.getElementById('words-area');
    const msgOverlay = document.getElementById('msg-overlay');

    function startGame(level) {
        state.level = level;
        state.found = 0;
        state.score = 0;
        state.time = 35;
        state.active = true;
        state.dead = false;
        
        document.getElementById('menu').style.display = 'none';
        hud.style.display = 'block';
        battery.style.display = 'block';
        msgOverlay.style.display = 'none';
        
        loadLevel();
        startTimer();
        startFlicker();
        setupInput();
    }

    function cleanUp() {
        state.active = false;
        if (timerId) clearInterval(timerId);
        if (flickerId) clearInterval(flickerId);
        if (shadowId) clearInterval(shadowId);
        flashEl.classList.remove('flickering');
        container.removeEventListener('mousemove', handleMove);
        container.removeEventListener('touchmove', handleMove);
        container.removeEventListener('mousedown', handleDown);
        window.removeEventListener('mouseup', handleUp);
    }

    function loadLevel() {
        wordsArea.innerHTML = '';
        const data = words[state.level][state.found % words[state.level].length]; // Loop through words safely
        currentTarget = data.t;
        
        // Build word list (Correct + Misspellings)
        let pool = [data.t, ...data.w];
        // Shuffle
        pool.sort(() => Math.random() - 0.5);
        
        // Ensure 5 items
        while(pool.length < 5) pool.push(data.w[Math.floor(Math.random()*data.w.length)]);

        // Create DOM elements
        pool.forEach((txt, i) => {
            const el = document.createElement('div');
            el.className = 'word-box';
            el.textContent = txt;
            el.style.left = (10 + i * 20 + Math.random()*10) + '%';
            el.style.top = (10 + Math.random()*70) + '%';
            
            // Difficulty modifiers
            if (state.found >= 1) el.style.animation = 'pulse 0.8s infinite alternate'; // Glowing effect
            if (state.found >= 2) el.style.transform = 'rotate(5deg)'; // Slight tilt
            
            el.onclick = () => checkWord(el, txt);
            wordsArea.appendChild(el);
        });

        updateHUD();
    }

    function updateHUD() {
        document.getElementById('score').textContent = `Score: ${state.score}`;
        document.getElementById('found').textContent = `Found: ${state.found}/5`;
        const hints = ["Normal", "Glowing!", "Spinning!", "Shadow!", "MAX!"];
        document.getElementById('hint').textContent = hints[Math.min(state.found, 4)];
        
        batteryFill.style.width = (state.time / 35 * 100) + '%';
        batteryFill.style.backgroundColor = state.time < 10 ? 'red' : 'lime';
    }

    function startTimer() {
        if (timerId) clearInterval(timerId);
        timerId = setInterval(() => {
            if (!state.active) return;
            state.time -= 0.1;
            if (state.time <= 0) {
                cleanUp();
                gameOver();
            } else {
                updateHUD();
            }
        }, 100);
    }

    function startFlicker() {
        if (flickerId) clearInterval(flickerId);
        // Safe interval: just toggles a class
        flickerId = setInterval(() => {
            if (!state.active) return;
            flashEl.classList.add('flickering');
            setTimeout(() => { if(state.active) flashEl.classList.remove('flickering'); }, 1500);
        }, 5000);
    }

    function setupInput() {
        // Mouse/Touch movement - STRICTLY on container
        const moveHandler = (e) => {
            if (!state.active || state.dead) return;
            e.preventDefault();
            const rect = container.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            state.x = ((clientX - rect.left) / rect.width) * 100;
            state.y = ((clientY - rect.top) / rect.height) * 100;
            
            flashEl.style.setProperty('--x', `${state.x}%`);
            flashEl.style.setProperty('--y', `${state.y}%`);
            dotEl.style.left = `${state.x}%`;
            dotEl.style.top = `${state.y}%`;
        };

        container.addEventListener('mousemove', moveHandler);
        container.addEventListener('touchmove', moveHandler, { passive: false });
        
        // Click handling via delegation on container
        container.onclick = (e) => {
            if (!state.active || state.dead) return;
            // If clicked on a word box, select it
            const target = e.target.closest('.word-box');
            if (target) {
                checkWord(target, target.textContent);
            } else if (e.target === container) {
                // Fallback: find closest word under mouse? (Simplified: nothing happens if miss)
            }
        };
    }

    function checkWord(el, txt) {
        if (!state.active) return;
        
        if (txt === currentTarget) {
            el.classList.add('correct');
            state.score += 100 + Math.floor(state.time * 2);
            state.found++;
            
            if (state.found >= 5) {
                cleanUp();
                gameWin();
            } else {
                loadLevel();
            }
        } else {
            el.classList.add('wrong');
            state.score = Math.max(0, state.score - 25);
            state.time = Math.max(0, state.time - 2);
            updateHUD();
            setTimeout(() => el.classList.remove('wrong'), 500);
        }
    }

    function gameOver() {
        document.getElementById('msg-title').textContent = "Game Over";
        document.getElementById('msg-text').textContent = `Time ran out! Score: ${state.score}`;
        msgOverlay.style.display = 'block';
    }

    function gameWin() {
        document.getElementById('msg-title').textContent = "YOU WIN!";
        document.getElementById('msg-text').textContent = `Great job! Score: ${state.score}`;
        msgOverlay.style.display = 'block';
    }

    function resetGame() {
        msgOverlay.style.display = 'none';
        document.getElementById('menu').style.display = 'flex';
        hud.style.display = 'none';
        battery.style.display = 'none';
    }
</script>
</body>
</html>
