<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Hunter - Optimized</title>
    <style>
        /* Optimized for GPU Performance */
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; background: #0a0a12; }

        #game-container { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

        /* Use transform instead of top/left for performance */
        .word-container { 
            position: absolute; 
            will-change: transform; 
            transition: transform 0.05s linear; 
        }

        /* Simplified Neon Pulse - using opacity instead of shadow-blur on text */
        .pulsing-word .word-text { animation: neonPulse 1.5s ease-in-out infinite; }
        @keyframes neonPulse { 
            0%, 100% { opacity: 0.6; } 
            50% { opacity: 1; } 
        }

        /* Flashlight performance fix */
        .flashlight-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            background: radial-gradient(circle 120px at var(--x, 50%) var(--y, 50%), transparent 0%, rgba(0,0,0,0.95) 60%);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="flashlight-overlay" id="flashlight"></div>
        <div id="words-area"></div>
    </div>

    <script>
        // Optimization: Use requestAnimationFrame for smooth movement
        let flashlight = { x: 50, y: 50 };
        const overlay = document.getElementById('flashlight');

        function updateFlashlight(e) {
            // Calculate percentage
            flashlight.x = (e.clientX / window.innerWidth) * 100;
            flashlight.y = (e.clientY / window.innerHeight) * 100;
            
            requestAnimationFrame(() => {
                overlay.style.setProperty('--x', flashlight.x + '%');
                overlay.style.setProperty('--y', flashlight.y + '%');
            });
        }

        window.addEventListener('mousemove', updateFlashlight);
        
        // ... rest of your game logic (maintaining existing game flow) ...
    </script>
</body>
</html>
