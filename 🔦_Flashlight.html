<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Grid :: Escape Protocol</title>
    <style>
        :root {
            --bg-color: #050608;
            --panel-bg: #0d1117;
            --accent-laser: #ff003c;  
            --text-main: #dae1ec;
            --success: #22c55e;
            --warning: #e1b341;
            
            /* Dynamic coords */
            --flashlight-x: -500px;
            --flashlight-y: -500px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: none; 
            -webkit-user-select: none;
        }

        /* --- SETUP SCREEN --- */
        #setup-screen {
            text-align: center; background: var(--panel-bg); padding: 40px; border: 2px solid #212631;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9); max-width: 480px; width: 90%; z-index: 100;
        }
        h1 { font-size: 2rem; margin-top: 0; color: #fff; letter-spacing: -1px; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { color: #57606a; margin-bottom: 30px; font-size: 0.9rem; }
        label { display: block; text-align: left; margin-bottom: 8px; color: #8b949e; text-transform: uppercase; font-size: 0.85rem; }

        select {
            width: 100%; padding: 12px; background: #161b22; border: 2px solid #30363d;
            color: #fff; font-family: inherit; font-size: 1rem; font-weight: bold; margin-bottom: 25px; cursor: pointer; outline: none;
        }
        select:focus { border-color: var(--text-main); }
        .start-btn {
            width: 100%; padding: 16px; background: transparent; border: 2px solid var(--text-main);
            color: #fff; font-family: inherit; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
        }
        .start-btn:hover { background: var(--text-main); color: #000; }

        /* --- GAME SCREEN & UI --- */
        #game-screen { display: none; flex-direction: column; width: 100%; height: 100vh; max-width: 1200px; }

        #ui-bar {
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            padding: 15px 25px; background: var(--panel-bg); z-index: 60; border-bottom: 2px solid #212631;
        }

        .ui-group { display: flex; align-items: center; gap: 20px; }
        .ui-center { justify-content: center; font-size: 1.2rem; color: #fff; text-transform: uppercase; }
        .ui-right { justify-content: flex-end; }
        .stat-label { color: #57606a; font-size: 0.8rem; text-transform: uppercase; }
        .stat-value { color: #fff; font-size: 1.1rem; }
        .quit-btn { background: #161b22; border: 1px solid #30363d; color: #8b949e; padding: 6px 12px; cursor: pointer; font-family: inherit; }
        .quit-btn:hover { background: var(--accent-laser); color: #fff; border-color: var(--accent-laser); }

        /* --- SEGMENTED BATTERY HUD --- */
        #battery-header {
            display: flex; align-items: center; justify-content: center; width: 100%;
            background: #000; padding: 15px 25px; z-index: 60; border-bottom: 1px solid #212631;
        }
        #physical-battery {
            display: flex; align-items: center; width: 100%; max-width: 800px; height: 35px;
        }
        #battery-body {
            flex-grow: 1; height: 100%; border: 3px solid #57606a; border-radius: 4px;
            background: #161b22; padding: 3px; position: relative;
        }
        #battery-cap {
            width: 14px; height: 18px; background: #57606a; border-radius: 0 4px 4px 0; border-left: none;
        }
        #battery-fill {
            height: 100%; width: 100%; background-color: var(--success);
            background-image: repeating-linear-gradient(90deg, transparent, transparent calc(10% - 3px), #161b22 calc(10% - 3px), #161b22 10%);
            transition: width 0.3s linear, background-color 0.5s ease;
        }
        #battery-text {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 900; font-size: 1.1rem; letter-spacing: 2px;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        /* --- THE DARK GRID ROOM --- */
        #dark-room {
            flex-grow: 1; position: relative; background-color: #020304; 
            background-image: linear-gradient(rgba(45, 55, 72, 0.4) 1px, transparent 1px), linear-gradient(90deg, rgba(45, 55, 72, 0.4) 1px, transparent 1px);
            background-size: 50px 50px; overflow: hidden; cursor: none;
        }

        #flashlight-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50;
            background: radial-gradient(circle 200px at var(--flashlight-x) var(--flashlight-y), rgba(255, 255, 255, 0.12) 0%, rgba(200, 210, 230, 0.03) 50%, rgba(2, 3, 4, 0.97) 75%, #020304 100%);
        }
        #flashlight-overlay.ambient-flash { background: radial-gradient(circle 250px at var(--flashlight-x) var(--flashlight-y), rgba(255, 255, 255, 0.3) 0%, rgba(2, 3, 4, 0.6) 100%) !important; }

        /* --- CURSOR ELEMENTS --- */
        #laser-dot {
            position: absolute; width: 8px; height: 8px; background-color: var(--accent-laser); border-radius: 50%;
            top: var(--flashlight-y); left: var(--flashlight-x); transform: translate(-50%, -50%); z-index: 55; pointer-events: none;
            box-shadow: 0 0 8px var(--accent-laser), 0 0 15px var(--accent-laser);
        }
        #held-key-cursor { display: none; position: absolute; font-size: 2.5rem; z-index: 56; pointer-events: none; filter: drop-shadow(0 0 8px var(--warning)); }

        /* --- ENTITIES & ANIMATIONS --- */
        @keyframes spider-jitter {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-3px, 2px) rotate(-4deg); }
            40% { transform: translate(2px, -3px) rotate(4deg); }
            60% { transform: translate(-2px, -2px) rotate(-2deg); }
            80% { transform: translate(3px, 1px) rotate(2deg); }
        }

        .target-entity {
            position: absolute; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 40; background: transparent; border: none;
        }
        .target-entity * { pointer-events: none; }
        .spider-entity { animation: spider-jitter 0.4s infinite alternate; }
        .spider-entity:hover { animation-duration: 0.1s; transform: scale(1.1); }
        .spider-icon { font-size: 5rem; line-height: 1; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8)); }
        
        .word-text {
            position: absolute; font-size: 1.2rem; font-weight: 900; color: #fff;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 0 10px var(--accent-laser);
            margin-top: -10px;
        }

        .shadow-anomaly {
            position: absolute; width: 50px; height: 50px; z-index: 35; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; filter: drop-shadow(0 0 15px var(--accent-laser)); animation: spider-jitter 0.2s infinite;
        }

        /* --- OVERLAYS & MODALS --- */
        .modal-box {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0d1117; border: 2px solid var(--accent-laser); padding: 40px; text-align: center;
            z-index: 200; box-shadow: 0 0 50px rgba(0,0,0,0.9); max-width: 450px; width: 90%;
        }
        .modal-box h2 { color: var(--accent-laser); margin-top: 0; font-size: 1.8rem; letter-spacing: 2px; }
        .modal-box p { margin: 15px 0; color: #8b949e; font-size: 1.1rem; }
        .btn-outline { background: transparent; border: 1px solid var(--accent-laser); color: var(--accent-laser); padding: 12px 24px; cursor: pointer; font-family: inherit; margin-top: 15px; text-transform: uppercase; font-weight: bold; transition: 0.2s;}
        .btn-outline:hover { background: var(--accent-laser); color: #fff; }

        /* --- MATH HAZARD SPECIFIC --- */
        #math-equation { font-size: 2.5rem; color: #fff; margin: 20px 0; font-weight: 900; letter-spacing: 2px; }
        #math-timer-display { font-size: 1.5rem; color: var(--accent-laser); font-weight: bold; animation: spider-jitter 0.5s infinite; }
        #math-options { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .math-btn { 
            background: #161b22; border: 2px solid #57606a; color: #fff; padding: 15px 25px; 
            font-size: 1.5rem; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.2s;
        }
        .math-btn:hover { border-color: #fff; transform: scale(1.1); }

        #msg-overlay {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 70; font-size: 1.2rem; font-weight: bold;
            padding: 10px 20px; pointer-events: none; opacity: 0; transition: opacity 0.2s; background: #0d1117; border: 1px solid #30363d;
        }
        .msg-correct { color: var(--success); } .msg-wrong { color: var(--accent-laser); } .msg-system { color: var(--warning); }

        /* --- JUMPSCARE ANIMATION --- */
        #jumpscare-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; align-items: center; justify-content: center; overflow: hidden;
        }
        
        .scare-spider {
            font-size: 5rem;
            will-change: transform, opacity; /* Hardware acceleration for iPad */
            opacity: 0; /* Hidden by default until JS triggers it */
        }

        /* Added webkit prefixes for iOS Safari compatibility */
        @-webkit-keyframes aggressive-zoom {
            0%   { -webkit-transform: scale(0.1) translate(0, 0) rotate(0deg); opacity: 0; }
            10%  { -webkit-transform: scale(2) translate(-20px, 10px) rotate(-10deg); opacity: 1; }
            30%  { -webkit-transform: scale(5) translate(20px, -20px) rotate(15deg); }
            50%  { -webkit-transform: scale(10) translate(-30px, 30px) rotate(-5deg); }
            70%  { -webkit-transform: scale(15) translate(30px, -30px) rotate(10deg); }
            90%  { -webkit-transform: scale(25) translate(-10px, 10px) rotate(-15deg); opacity: 1; }
            100% { -webkit-transform: scale(30) translate(0, 0) rotate(0deg); opacity: 0; }
        }

        @keyframes aggressive-zoom {
            0%   { transform: scale(0.1) translate(0, 0) rotate(0deg); opacity: 0; }
            10%  { transform: scale(2) translate(-20px, 10px) rotate(-10deg); opacity: 1; }
            30%  { transform: scale(5) translate(20px, -20px) rotate(15deg); }
            50%  { transform: scale(10) translate(-30px, 30px) rotate(-5deg); }
            70%  { transform: scale(15) translate(30px, -30px) rotate(10deg); }
            90%  { transform: scale(25) translate(-10px, 10px) rotate(-15deg); opacity: 1; }
            100% { transform: scale(30) translate(0, 0) rotate(0deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>GRID ESCAPE PROTOCOL</h1>
        <p class="subtitle">NZ Curriculum Lexical Database</p>
        
        <label for="year-select">Select Dataset Tier</label>
        <select id="year-select">
            <option value="4">NZ Year Level 4</option>
            <option value="5">NZ Year Level 5</option>
            <option value="6">NZ Year Level 6</option>
            <option value="7">NZ Year Level 7</option>
            <option value="8">NZ Year Level 8</option>
        </select>
        
        <button class="start-btn" onclick="startGame()">Connect Device</button>
    </div>

    <div id="game-screen">
        <div id="battery-header">
            <div id="physical-battery">
                <div id="battery-body">
                    <div id="battery-fill"></div>
                    <div id="battery-text">POWER: 100%</div>
                </div>
                <div id="battery-cap"></div>
            </div>
        </div>
        
        <div id="ui-bar">
            <div class="ui-group">
                <div><span class="stat-label">LOGGED:</span> <span class="stat-value" id="score-display">0</span></div>
                <div><span class="stat-label">PROGRESS:</span> <span class="stat-value" id="progress-display">0/3</span></div>
            </div>
            <div class="ui-center" id="level-display">TIER 1</div>
            <div class="ui-group ui-right">
                <button class="quit-btn" onclick="quitGame()">Abort Protocol</button>
            </div>
        </div>
        
        <div id="dark-room">
            <div id="flashlight-overlay"></div>
            <div id="laser-dot"></div>
            <div id="held-key-cursor">🔑</div>
            <div id="room-content"></div>
            <div id="msg-overlay"></div>
            
            <div id="game-over-modal" class="modal-box">
                <h2>-- LINK CRITICAL --</h2>
                <p>Flashlight battery depleted. You have been consumed by the grid.</p>
                <p>FINAL SCORE: <span id="modal-score">0</span></p>
                <button class="btn-outline" onclick="closeModalAndQuit()">Return to Menu</button>
            </div>

            <div id="math-hazard-modal" class="modal-box">
                <h2>GLITCH DETECTED</h2>
                <p>System override required. Time remaining: <span id="math-timer-display">8</span>s</p>
                <div id="math-equation">? x ? =</div>
                <div id="math-options"></div>
            </div>
        </div>
    </div>

    <div id="jumpscare-overlay">
        <div class="scare-spider">🕷️</div>
    </div>

    <script>
        const wordBank = {
            4: [
                { correct: "because", wrong: ["becos", "becoz"] }, { correct: "beautiful", wrong: ["beautifull", "beutiful"] }, { correct: "caught", wrong: ["cought", "caurt"] }, { correct: "friend", wrong: ["freind", "frend"] }, { correct: "people", wrong: ["peeple", "peaple"] }, { correct: "thought", wrong: ["thort", "thout"] }, { correct: "enough", wrong: ["enuff", "enoughe"] }, { correct: "suddenly", wrong: ["sudenly", "sudenley"] }, { correct: "swimming", wrong: ["swimmin", "swiming"] }, { correct: "animals", wrong: ["animels", "anamals"] }
            ],
            5: [
                { correct: "different", wrong: ["diffrent", "diferent"] }, { correct: "believe", wrong: ["beleive", "belive"] }, { correct: "tomorrow", wrong: ["tommorow", "tomorroww"] }, { correct: "hospital", wrong: ["hospitle", "hosptial"] }, { correct: "library", wrong: ["libary", "librery"] }, { correct: "remember", wrong: ["rember", "remmember"] }, { correct: "carefully", wrong: ["carefuly", "carfully"] }, { correct: "usually", wrong: ["usally", "usualy"] }, { correct: "question", wrong: ["qwestion", "quesion"] }, { correct: "building", wrong: ["bilding", "buiding"] }
            ],
            6: [
                { correct: "favourite", wrong: ["favrit", "faverite"] }, { correct: "experience", wrong: ["experiance", "expirience"] }, { correct: "separate", wrong: ["seperate", "seperit"] }, { correct: "embarrass", wrong: ["embaras", "embarass"] }, { correct: "successful", wrong: ["succesful", "successfull"] }, { correct: "immediately", wrong: ["imediately", "immediatly"] }, { correct: "accidentally", wrong: ["accidently", "acidentally"] }, { correct: "beginning", wrong: ["begining", "beggining"] }, { correct: "restaurant", wrong: ["restarant", "restaraunt"] }, { correct: "temperature", wrong: ["temprature", "tempertaure"] }
            ],
            7: [
                { correct: "environment", wrong: ["enviroment", "envirnment"] }, { correct: "definitely", wrong: ["definately", "definitly"] }, { correct: "disappear", wrong: ["dissappear", "disapear"] }, { correct: "necessary", wrong: ["neccessary", "necesary"] }, { correct: "government", wrong: ["goverment", "govrnment"] }, { correct: "knowledge", wrong: ["nowledge", "knowlege"] }, { correct: "independent", wrong: ["independant", "independint"] }, { correct: "disappoint", wrong: ["dissapoint", "disapoint"] }, { correct: "occasionally", wrong: ["occassionally", "ocasionaly"] }, { correct: "unfortunately", wrong: ["unfortunatly", "unfortunatley"] }
            ],
            8: [
                { correct: "accommodation", wrong: ["accomodation", "acommodation"] }, { correct: "rhythm", wrong: ["rythm", "rhythum"] }, { correct: "conscience", wrong: ["conscense", "concience"] }, { correct: "liaison", wrong: ["liason", "liaisonne"] }, { correct: "privilege", wrong: ["priviledge", "privelege"] }, { correct: "occurrence", wrong: ["occurance", "occurence"] }, { correct: "maintenance", wrong: ["maintainance", "maintenence"] }, { correct: "fascinating", wrong: ["facinating", "fassinating"] }, { correct: "accessible", wrong: ["accessable", "accesible"] }, { correct: "amateur", wrong: ["amature", "ametuer"] }
            ]
        };

        let currentYear = 4, score = 0, gameLevel = 1, battery = 100, levelProgress = 0, gameState = "WORDS"; 
        let gameActive = false, blackoutActive = false;
        let mouseX = -1000, mouseY = -1000;
        let targets = [], anomaly = null, wordPool = [];
        let loopId, batteryId, flickerId;
        
        let mathTimerId, mathTimeLeft = 8, correctMathAnswer = 0;

        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        const darkRoom = document.getElementById('dark-room');
        const roomContent = document.getElementById('room-content');
        const overlay = document.getElementById('flashlight-overlay');
        const msgOverlay = document.getElementById('msg-overlay');
        const gameOverModal = document.getElementById('game-over-modal');
        const mathHazardModal = document.getElementById('math-hazard-modal');
        const heldKeyCursor = document.getElementById('held-key-cursor');
        const jumpscareOverlay = document.getElementById('jumpscare-overlay');
        const scareSpider = document.querySelector('.scare-spider'); // Target specifically for JS animation control
        
        const scoreUI = document.getElementById('score-display');
        const progressUI = document.getElementById('progress-display');
        const levelUI = document.getElementById('level-display');
        const batteryFill = document.getElementById('battery-fill');
        const batteryText = document.getElementById('battery-text');

        function trackInput(e) {
            const rect = darkRoom.getBoundingClientRect();
            let clientX, clientY;
            
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX; clientY = e.clientY;
            }
            
            mouseX = clientX - rect.left; mouseY = clientY - rect.top;
            
            document.documentElement.style.setProperty('--flashlight-x', `${mouseX}px`);
            document.documentElement.style.setProperty('--flashlight-y', `${mouseY}px`);

            heldKeyCursor.style.left = `${mouseX + 15}px`; heldKeyCursor.style.top = `${mouseY + 15}px`;
        }

        darkRoom.addEventListener('mousemove', trackInput);
        darkRoom.addEventListener('touchmove', trackInput, {passive: true});
        darkRoom.addEventListener('touchstart', trackInput, {passive: true});

        function startGame() {
            currentYear = document.getElementById('year-select').value;
            score = 0; gameLevel = 1; battery = 100; levelProgress = 0; gameState = "WORDS";
            gameActive = true; blackoutActive = false; targets = []; anomaly = null;
            heldKeyCursor.style.display = 'none'; 
            
            roomContent.innerHTML = '';
            gameOverModal.style.display = 'none';
            mathHazardModal.style.display = 'none';
            jumpscareOverlay.style.display = 'none';
            scareSpider.style.animation = 'none'; // Ensure reset
            scareSpider.style.webkitAnimation = 'none';
            
            setupScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            
            updateUI();
            wordPool = [...wordBank[currentYear]];
            spawnRound();

            loopId = requestAnimationFrame(gameLoop);
            batteryId = setInterval(drainBattery, 250); 
            flickerId = setInterval(triggerFlickerHelper, 6000); 
        }

        function spawnRound() {
            roomContent.innerHTML = '';
            targets = [];

            if (gameState === "WORDS") {
                progressUI.innerText = `${levelProgress}/3`;
                if (wordPool.length === 0) wordPool = [...wordBank[currentYear]];
                const randIdx = Math.floor(Math.random() * wordPool.length);
                const wordData = wordPool.splice(randIdx, 1)[0];

                let rawList = [{ text: wordData.correct, isCorrect: true }, ...wordData.wrong.map(w => ({ text: w, isCorrect: false }))];
                rawList.sort(() => Math.random() - 0.5);

                const speedMultiplier = 1 + (gameLevel * 0.15);

                rawList.forEach((wordObj) => {
                    const el = document.createElement('div');
                    el.classList.add('target-entity', 'spider-entity');
                    el.innerHTML = `<div class="spider-icon">🕷️</div><div class="word-text">${wordObj.text}</div>`;
                    roomContent.appendChild(el);

                    const w = 80, h = 80; 
                    const angle = Math.random() * Math.PI * 2;
                    const baseSpeed = 0.8 + Math.random() * 0.6;

                    const spiderData = {
                        el: el, x: Math.random() * (darkRoom.clientWidth - w - 40) + 20, y: Math.random() * (darkRoom.clientHeight - h - 40) + 20,
                        vx: Math.cos(angle) * baseSpeed * speedMultiplier, vy: Math.sin(angle) * baseSpeed * speedMultiplier,
                        w: w, h: h, type: "WORD", isCorrect: wordObj.isCorrect
                    };
                    targets.push(spiderData);
                    el.addEventListener('click', () => handleEntityInteraction(spiderData));
                });
            } 
            else if (gameState === "KEY") {
                progressUI.innerText = "FIND KEY"; showFeedback("WORD LIMIT MET: SCAN FOR KEY", "msg-system");
                const el = document.createElement('div'); el.classList.add('target-entity'); 
                el.innerHTML = `<div style="font-size: 4rem; filter: drop-shadow(0 0 15px var(--warning));">🔑</div>`;
                roomContent.appendChild(el);

                const keyData = { el: el, x: Math.random() * (darkRoom.clientWidth - 100) + 20, y: Math.random() * (darkRoom.clientHeight - 100) + 20, vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5, w: 60, h: 60, type: "KEY" };
                targets.push(keyData); el.addEventListener('click', () => handleEntityInteraction(keyData));
            } 
            else if (gameState === "DOOR") {
                progressUI.innerText = "UNLOCK EXIT"; showFeedback("KEY SECURED: UNLOCK EXIT DOOR", "msg-system");
                const el = document.createElement('div'); el.classList.add('target-entity'); 
                el.innerHTML = `<div style="font-size: 5rem; filter: drop-shadow(0 0 15px var(--success));">🚪</div>`;
                roomContent.appendChild(el);

                const doorData = { el: el, x: Math.random() * (darkRoom.clientWidth - 100) + 20, y: Math.random() * (darkRoom.clientHeight - 100) + 20, vx: 0, vy: 0, w: 80, h: 80, type: "DOOR" };
                targets.push(doorData); el.addEventListener('click', () => handleEntityInteraction(doorData));
            }

            if (gameLevel >= 3) {
                const anoEl = document.createElement('div'); anoEl.classList.add('shadow-anomaly'); anoEl.innerText = '💀'; 
                roomContent.appendChild(anoEl);
                const anoAngle = Math.random() * Math.PI * 2; const anoSpeed = 1.5 + (gameLevel * 0.2);
                anomaly = { el: anoEl, x: Math.random() * (darkRoom.clientWidth - 60), y: Math.random() * (darkRoom.clientHeight - 60), vx: Math.cos(anoAngle) * anoSpeed, vy: Math.sin(anoAngle) * anoSpeed, size: 50 };
            } else { anomaly = null; }
        }

        function gameLoop() {
            if (!gameActive || blackoutActive) return requestAnimationFrame(gameLoop);
            const cw = darkRoom.clientWidth, ch = darkRoom.clientHeight;

            targets.forEach(t => {
                t.x += t.vx; t.y += t.vy;
                if (t.x <= 0 || t.x >= cw - t.w) t.vx *= -1;
                if (t.y <= 0 || t.y >= ch - t.h) t.vy *= -1;
                t.el.style.left = `${t.x}px`; t.el.style.top = `${t.y}px`;
            });

            if (anomaly) {
                anomaly.x += anomaly.vx; anomaly.y += anomaly.vy;
                if (anomaly.x <= 0 || anomaly.x >= cw - anomaly.size) anomaly.vx *= -1;
                if (anomaly.y <= 0 || anomaly.y >= ch - anomaly.size) anomaly.vy *= -1;
                anomaly.el.style.left = `${anomaly.x}px`; anomaly.el.style.top = `${anomaly.y}px`;

                const anoCenterX = anomaly.x + (anomaly.size/2), anoCenterY = anomaly.y + (anomaly.size/2);
                const dist = Math.sqrt(Math.pow(mouseX - anoCenterX, 2) + Math.pow(mouseY - anoCenterY, 2));
                if (dist < 80) { triggerMathHazard(); }
            }
            requestAnimationFrame(gameLoop);
        }

        function handleEntityInteraction(targetItem) {
            if (blackoutActive || !gameActive) return;

            if (targetItem.type === "WORD") {
                if (targetItem.isCorrect) {
                    score += 10; levelProgress++; battery = Math.min(100, battery + 15); showFeedback("DATA CORRECT", "msg-correct");
                    if (levelProgress >= 3) gameState = "KEY"; updateUI(); spawnRound();
                } else {
                    battery = Math.max(0, battery - 20); showFeedback("INVALID SYNTAX", "msg-wrong"); updateUI();
                }
            } 
            else if (targetItem.type === "KEY") { battery = Math.min(100, battery + 20); gameState = "DOOR"; heldKeyCursor.style.display = 'block'; spawnRound(); } 
            else if (targetItem.type === "DOOR") { heldKeyCursor.style.display = 'none'; gameLevel++; levelProgress = 0; gameState = "WORDS"; battery = 100; showFeedback(`TRANSITING TO SECTOR TIER ${gameLevel}`, "msg-correct"); updateUI(); spawnRound(); }
        }

        function drainBattery() {
            if (!gameActive || blackoutActive) return; 
            battery -= 0.5 + (gameLevel * 0.1);
            if (battery <= 0) { battery = 0; endGame(); }
            updateBatteryUI();
        }

        function triggerMathHazard() {
            blackoutActive = true; document.body.style.cursor = 'default'; 
            let num1 = Math.floor(Math.random() * 12) + 1; let num2 = Math.floor(Math.random() * 12) + 1; correctMathAnswer = num1 * num2;
            document.getElementById('math-equation').innerText = `${num1} x ${num2} = ?`;
            
            let options = [correctMathAnswer];
            while(options.length < 3) {
                let offset = (Math.floor(Math.random() * 5) + 1) * (Math.random() < 0.5 ? 1 : -1);
                let wrong = correctMathAnswer + offset;
                if(wrong > 0 && !options.includes(wrong)) options.push(wrong);
            }
            options.sort(() => Math.random() - 0.5); 
            
            const optionsContainer = document.getElementById('math-options'); optionsContainer.innerHTML = '';
            options.forEach(opt => {
                let btn = document.createElement('button'); btn.className = 'math-btn'; btn.innerText = opt;
                btn.onclick = () => resolveMathHazard(opt === correctMathAnswer); optionsContainer.appendChild(btn);
            });

            mathTimeLeft = 8; document.getElementById('math-timer-display').innerText = mathTimeLeft; mathHazardModal.style.display = 'block';
            mathTimerId = setInterval(() => {
                mathTimeLeft--; document.getElementById('math-timer-display').innerText = mathTimeLeft;
                if(mathTimeLeft <= 0) resolveMathHazard(false);
            }, 1000);
        }

        function resolveMathHazard(isCorrect) {
            clearInterval(mathTimerId); mathHazardModal.style.display = 'none'; document.body.style.cursor = 'none'; 
            if (isCorrect) { showFeedback("OVERRIDE SUCCESS", "msg-correct"); } 
            else {
                battery = Math.max(0, battery - 30); updateBatteryUI(); showFeedback("CRITICAL FAILURE: -30 POWER", "msg-wrong");
                if (battery <= 0) { endGame(); return; }
            }
            if (anomaly) { anomaly.x = 20; anomaly.y = 20; }
            setTimeout(() => { blackoutActive = false; }, 500);
        }

        function triggerFlickerHelper() {
            if (!gameActive || blackoutActive) return;
            overlay.classList.add('ambient-flash'); setTimeout(() => overlay.classList.remove('ambient-flash'), 80);
        }

        function updateUI() {
            scoreUI.innerText = score; levelUI.innerText = `TIER ${gameLevel}`;
            if (gameState === "WORDS") progressUI.innerText = `${levelProgress}/3`;
            updateBatteryUI();
        }

        function updateBatteryUI() {
            const perc = Math.round(battery);
            batteryFill.style.width = `${perc}%`; batteryText.innerText = `POWER: ${perc}%`;
            if (perc > 60) { batteryFill.style.backgroundColor = 'var(--success)'; } 
            else if (perc > 30) { batteryFill.style.backgroundColor = 'var(--warning)'; } 
            else { batteryFill.style.backgroundColor = 'var(--accent-laser)'; }
        }

        function showFeedback(text, className) {
            msgOverlay.innerText = text; msgOverlay.className = className; msgOverlay.style.opacity = '1';
            clearTimeout(msgOverlay.timeoutId); msgOverlay.timeoutId = setTimeout(() => { msgOverlay.style.opacity = '0'; }, 2000);
        }

        function endGame() {
            gameActive = false; heldKeyCursor.style.display = 'none'; 
            cancelAnimationFrame(loopId); clearInterval(batteryId); clearInterval(flickerId); clearInterval(mathTimerId);
            document.body.style.cursor = 'default';
            document.getElementById('modal-score').innerText = score;
            
            // Show the screen explicitly
            jumpscareOverlay.style.display = 'flex';
            
            // CRITICAL IOS FIX: Force Safari to acknowledge the element is visible before animating
            void scareSpider.offsetWidth; 
            
            // Manually attach animation so it explicitly starts from the beginning
            scareSpider.style.animation = 'aggressive-zoom 1.2s forwards';
            scareSpider.style.webkitAnimation = 'aggressive-zoom 1.2s forwards';
            
            // Wait for animation to finish before showing modal
            setTimeout(() => {
                jumpscareOverlay.style.display = 'none';
                scareSpider.style.animation = 'none'; // reset for next playthrough
                scareSpider.style.webkitAnimation = 'none';
                gameOverModal.style.display = 'block';
            }, 1200);
        }

        function closeModalAndQuit() { gameOverModal.style.display = 'none'; quitGame(); }

        function quitGame() {
            gameActive = false; heldKeyCursor.style.display = 'none'; blackoutActive = false;
            cancelAnimationFrame(loopId); clearInterval(batteryId); clearInterval(flickerId); clearInterval(mathTimerId);
            document.body.style.cursor = 'default';
            jumpscareOverlay.style.display = 'none';
            scareSpider.style.animation = 'none'; 
            scareSpider.style.webkitAnimation = 'none';
            gameScreen.style.display = 'none'; setupScreen.style.display = 'block';
        }
    </script>
</body>
